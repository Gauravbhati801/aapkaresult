            // 15 General Knowledge
            { subject: "General Knowledge", tabId: "tab-GK", q: "मौर्य साम्राज्य के संस्थापक कौन थे?", options: ["बिंदुसार", "अशोक", "चंद्रगुप्त मौर्य", "घनानंद"], correct: 2, solution: "मौर्य साम्राज्य की स्थापना 322 ईसा पूर्व में चंद्रगुप्त मौर्य ने चाणक्य की मदद से नंद वंश के अंतिम शासक घनानंद को हराकर की थी।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "संविधान का अनुच्छेद 17 किससे संबंधित है?", options: ["उपाधियों का अंत", "अस्पृश्यता (छुआछूत) का अंत", "प्रेस की स्वतंत्रता", "समान कार्य के लिए समान वेतन"], correct: 1, solution: "संविधान का अनुच्छेद 17 'अस्पृश्यता' (Untouchability) का अंत करता है और इसका किसी भी रूप में आचरण निषिद्ध करता है। यह एक मौलिक अधिकार है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारत का सबसे लंबा बाँध कौन सा है?", options: ["भाखड़ा नांगल बाँध", "हीराकुंड बाँध", "टिहरी बाँध", "सरदार सरोवर बाँध"], correct: 1, solution: "भारत का सबसे लंबा बाँध 'हीराकुंड बाँध' है, जो ओडिशा राज्य में महानदी पर स्थित है। इसकी कुल लंबाई लगभग 25.8 किलोमीटर है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "कनाडा की राजधानी क्या है?", options: ["टोरंटो", "ओटावा", "वैंकूवर", "मॉन्ट्रियल"], correct: 1, solution: "कनाडा उत्तरी अमेरिका महाद्वीप का एक देश है और इसकी राजधानी 'ओटावा' (Ottawa) है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "गांधीजी की आत्मकथा 'माई एक्सपेरिमेंट्स विद ट्रुथ' मूल रूप से किस भाषा में लिखी गई थी?", options: ["अंग्रेजी", "हिन्दी", "गुजराती", "मराठी"], correct: 2, solution: "महात्मा गांधी की आत्मकथा 'द स्टोरी ऑफ़ माई एक्सपेरिमेंट्स विद ट्रुथ' (सत्य के साथ मेरे प्रयोग) मूल रूप से 'गुजराती' भाषा में लिखी गई थी।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "विश्व का सबसे बड़ा मरुस्थल (Desert) कौन सा है?", options: ["थार", "सहारा", "गोबी", "अटाकामा"], correct: 1, solution: "विश्व का सबसे बड़ा मरुस्थल (रेगिस्तान) 'सहारा मरुस्थल' है, जो अफ्रीका महाद्वीप में स्थित है। थार भारत का सबसे बड़ा मरुस्थल है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारत और चीन के बीच की सीमा रेखा को क्या कहते हैं?", options: ["रेडक्लिफ रेखा", "मैकमोहन रेखा", "डूरंड रेखा", "मैगीनॉट रेखा"], correct: 1, solution: "भारत और चीन के बीच की अंतरराष्ट्रीय सीमा रेखा को 'मैकमोहन रेखा' (McMahon Line) कहा जाता है। इसका निर्धारण 1914 में शिमला समझौते के तहत हुआ था।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारत के राष्ट्रपति पद के लिए न्यूनतम आयु कितनी होनी चाहिए?", options: ["25 वर्ष", "30 वर्ष", "35 वर्ष", "40 वर्ष"], correct: 2, solution: "भारतीय संविधान के अनुच्छेद 58 के अनुसार, राष्ट्रपति पद का चुनाव लड़ने के लिए उम्मीदवार की न्यूनतम आयु 35 वर्ष होनी चाहिए।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "फ्रांस का सर्वोच्च नागरिक सम्मान कौन सा है?", options: ["लीजन ऑफ ऑनर", "प्रेसिडेंशियल मेडल ऑफ फ्रीडम", "निशान-ए-पाकिस्तान", "ऑर्डर ऑफ द ब्रिटिश एम्पायर"], correct: 0, solution: "'लीजन ऑफ ऑनर' (Legion of Honour) फ्रांस का सर्वोच्च नागरिक और सैन्य सम्मान है, जिसकी शुरुआत 1802 में नेपोलियन बोनापार्ट ने की थी।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "तराइन का प्रथम युद्ध (1191 ई.) में पृथ्वीराज चौहान ने किसे हराया था?", options: ["महमूद गजनवी", "मुहम्मद गोरी", "कुतुबुद्दीन ऐबक", "बाबर"], correct: 1, solution: "तराइन का प्रथम युद्ध 1191 ई. में पृथ्वीराज चौहान और मुहम्मद गोरी के बीच लड़ा गया था, जिसमें पृथ्वीराज चौहान ने मुहम्मद गोरी को बुरी तरह हराया था।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारत का राष्ट्रीय गीत 'वंदे मातरम' किस उपन्यास से लिया गया है?", options: ["गीतांजलि", "आनंदमठ", "गोदान", "देवदास"], correct: 1, solution: "राष्ट्रीय गीत 'वंदे मातरम' की रचना बंकिम चंद्र चटर्जी ने की थी और इसे उनके प्रसिद्ध बंगाली उपन्यास 'आनंदमठ' (1882) से लिया गया है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारतीय अंतरिक्ष अनुसंधान संगठन (ISRO) का मुख्यालय कहाँ है?", options: ["श्रीहरिकोटा", "बेंगलुरु", "तिरुवनंतपुरम", "हैदराबाद"], correct: 1, solution: "इसरो (ISRO) की स्थापना 15 अगस्त 1969 को हुई थी और इसका मुख्यालय 'बेंगलुरु' (कर्नाटक) में स्थित है। इसके संस्थापक विक्रम साराभाई थे।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "प्लासी का युद्ध कब हुआ था?", options: ["1757", "1764", "1857", "1526"], correct: 0, solution: "प्लासी का ऐतिहासिक युद्ध 23 जून 1757 को बंगाल के नवाब सिराजुद्दौला और रॉबर्ट क्लाइव के नेतृत्व वाली ब्रिटिश ईस्ट इंडिया कंपनी के बीच लड़ा गया था।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "विश्व जनसंख्या दिवस कब मनाया जाता है?", options: ["5 जून", "11 जुलाई", "1 दिसंबर", "10 दिसंबर"], correct: 1, solution: "बढ़ती जनसंख्या के प्रति जागरूकता बढ़ाने के लिए हर साल 11 जुलाई को 'विश्व जनसंख्या दिवस' (World Population Day) मनाया जाता है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "नोबेल पुरस्कार किनती श्रेणियों (Categories) में दिया जाता है?", options: ["4", "5", "6", "7"], correct: 2, solution: "नोबेल पुरस्कार कुल 6 श्रेणियों में दिया जाता है - शांति, साहित्य, भौतिकी, रसायन विज्ञान, चिकित्सा विज्ञान और अर्थशास्त्र।" },

            // 15 General Science
            { subject: "General Science", tabId: "tab-Science", q: "सापेक्षता का सिद्धांत (Theory of Relativity) किसने दिया था?", options: ["न्यूटन", "गैलीलियो", "अल्बर्ट आइंस्टीन", "नील्स बोर"], correct: 2, solution: "सापेक्षता का सिद्धांत (E=mc²) महान वैज्ञानिक अल्बर्ट आइंस्टीन ने दिया था। इसके लिए वे दुनिया भर में प्रसिद्ध हैं।" },
            { subject: "General Science", tabId: "tab-Science", q: "दाब (Pressure) का SI मात्रक क्या है?", options: ["न्यूटन", "जूल", "पास्कल", "वाट"], correct: 2, solution: "दाब (Pressure) का SI मात्रक 'पास्कल' (Pascal) होता है। इसे बल प्रति इकाई क्षेत्रफल (N/m²) के रूप में भी जाना जाता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "लाफिंग गैस (हंसाने वाली गैस) किसे कहा जाता है?", options: ["नाइट्रिक ऑक्साइड", "नाइट्रस ऑक्साइड (N2O)", "नाइट्रोजन डाइऑक्साइड", "अमोनिया"], correct: 1, solution: "नाइट्रस ऑक्साइड (N2O) को 'लाफिंग गैस' (हंसाने वाली गैस) कहा जाता है। इसे सूंघने पर हल्की हंसी और बेहोशी महसूस होती है।" },
            { subject: "General Science", tabId: "tab-Science", q: "कमरे के तापमान पर द्रव अवस्था में पाई जाने वाली अधातु (Non-metal) कौन सी है?", options: ["ब्रोमीन", "क्लोरीन", "पारा", "आयोडीन"], correct: 0, solution: "ब्रोमीन (Bromine) एकमात्र ऐसी अधातु (Non-metal) है जो कमरे के तापमान (Room temperature) पर तरल (Liquid) अवस्था में रहती है। धातु में पारा (Mercury) तरल होता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "मानव शरीर की 'मास्टर ग्रंथि' किसे कहा जाता है?", options: ["थायराइड", "यकृत", "पीयूष ग्रंथि (Pituitary)", "अग्न्याशय"], correct: 2, solution: "मस्तिष्क में स्थित 'पीयूष ग्रंथि' (Pituitary Gland) को मास्टर ग्रंथि कहा जाता है क्योंकि यह शरीर की अन्य सभी अंतःस्रावी ग्रंथियों के स्राव को नियंत्रित करती है।" },
            { subject: "General Science", tabId: "tab-Science", q: "पृथ्वी के सबसे निकट का ग्रह कौन सा है?", options: ["मंगल", "शुक्र (Venus)", "बुध", "बृहस्पति"], correct: 1, solution: "पृथ्वी के सबसे निकट स्थित ग्रह 'शुक्र' (Venus) है। इसे 'पृथ्वी की जुड़वां बहन' और 'भोर का तारा' भी कहा जाता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "भूकंप की तीव्रता मापने वाला यंत्र कौन सा है?", options: ["बैरोमीटर", "सीस्मोग्राफ", "लैक्टोमीटर", "एनीमोमीटर"], correct: 1, solution: "भूकंप की तीव्रता और उसके झटकों को मापने के लिए 'सीस्मोग्राफ' (Seismograph) नामक यंत्र का उपयोग किया जाता है और इसकी तीव्रता 'रिक्टर स्केल' पर मापी जाती है।" },
            { subject: "General Science", tabId: "tab-Science", q: "भारी जल (Heavy Water) का रासायनिक सूत्र क्या है?", options: ["H2O2", "H2O", "D2O", "DHO"], correct: 2, solution: "भारी जल (Heavy Water) का रासायनिक सूत्र D2O (ड्यूटेरियम ऑक्साइड) है। इसका उपयोग मुख्य रूप से परमाणु रिएक्टरों में मंदक (Moderator) के रूप में किया जाता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "विटामिन E का रासायनिक नाम क्या है?", options: ["रेटिनॉल", "कैल्सीफेरोल", "टोकोफेरोल", "एस्कॉर्बिक एसिड"], correct: 2, solution: "विटामिन E का रासायनिक नाम 'टोकोफेरोल' (Tocopherol) है। यह एक वसा में घुलनशील विटामिन है जो त्वचा और प्रजनन क्षमता के लिए महत्वपूर्ण है।" },
            { subject: "General Science", tabId: "tab-Science", q: "क्लोरोफिल में कौन सी धातु मौजूद होती है?", options: ["लोहा", "मैग्नीशियम", "जस्ता", "कैल्शियम"], correct: 1, solution: "पौधों की पत्तियों के हरे रंग के लिए जिम्मेदार 'क्लोरोफिल' (पर्णहरित) के केंद्र में 'मैग्नीशियम' (Magnesium) धातु मौजूद होती है।" },
            { subject: "General Science", tabId: "tab-Science", q: "एक स्वस्थ मनुष्य का सामान्य रक्तचाप (Blood Pressure) कितना होता है?", options: ["120/80 mmHg", "140/90 mmHg", "80/120 mmHg", "100/60 mmHg"], correct: 0, solution: "एक सामान्य स्वस्थ मनुष्य का रक्तचाप (Blood Pressure) 120/80 mmHg होता है। इसमें 120 सिस्टोलिक (Systolic) और 80 डायस्टोलिक (Diastolic) प्रेशर होता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "ओजोन परत के क्षरण के लिए मुख्य रूप से कौन सी गैस जिम्मेदार है?", options: ["CO2", "SO2", "CFC (क्लोरोफ्लोरोकार्बन)", "CH4"], correct: 2, solution: "वायुमंडल की ओजोन परत को सबसे ज्यादा नुकसान 'CFC' (क्लोरोफ्लोरोकार्बन) गैस से होता है, जो मुख्य रूप से एसी और रेफ्रिजरेटर से निकलती है।" },
            { subject: "General Science", tabId: "tab-Science", q: "मानव शरीर में लाल रक्त कणिकाओं (RBC) का जीवनकाल कितना होता है?", options: ["20-30 दिन", "100-120 दिन", "5-7 दिन", "150 दिन"], correct: 1, solution: "मानव शरीर में लाल रक्त कणिकाओं (RBC - Red Blood Cells) का जीवनकाल लगभग 100 से 120 दिन होता है। इनका निर्माण अस्थि मज्जा (Bone Marrow) में होता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "रेडियोधर्मिता (Radioactivity) की खोज किसने की थी?", options: ["मैडम क्यूरी", "हेनरी बेकरेल", "जे.जे. थॉमसन", "रदरफोर्ड"], correct: 1, solution: "रेडियोधर्मिता (Radioactivity) की खोज 1896 में फ्रांसीसी वैज्ञानिक 'हेनरी बेकरेल' ने की थी, जिसके लिए उन्हें मैडम क्यूरी के साथ नोबेल पुरस्कार मिला था।" },
            { subject: "General Science", tabId: "tab-Science", q: "जल में घुलनशील विटामिन कौन से हैं?", options: ["A और D", "E और K", "B और C", "A और C"], correct: 2, solution: "विटामिन B और C 'जल में घुलनशील' (Water Soluble) विटामिन होते हैं, जबकि विटामिन A, D, E, और K 'वसा में घुलनशील' (Fat Soluble) होते हैं।" },

            // 15 Maths
            { subject: "Maths", tabId: "tab-Maths", q: "एक गोले (Sphere) का आयतन का सूत्र क्या है?", options: ["4/3 πr³", "4πr²", "1/3 πr³", "2/3 πr³"], correct: 0, solution: "एक गोले (Sphere) के आयतन (Volume) का सूत्र 4/3 πr³ होता है। इसका पृष्ठीय क्षेत्रफल 4πr² होता है।" },
            { subject: "Maths", tabId: "tab-Maths", q: "50 लीटर के दूध और पानी के मिश्रण में 10% पानी है। इसमें कितना पानी और मिलाया जाए कि पानी 20% हो जाए?", options: ["5 लीटर", "6.25 लीटर", "10 लीटर", "12.5 लीटर"], correct: 1, solution: "50L में पानी = 5L, दूध = 45L। नया मिश्रण में पानी 20% है, तो दूध 80% होगा। 80% = 45L => 100% = (45/80)*100 = 56.25L। अतः 56.25 - 50 = 6.25 लीटर पानी मिलाना होगा।" },
            { subject: "Maths", tabId: "tab-Maths", q: "यदि A की आय B की आय से 25% अधिक है, तो B की आय A की आय से कितने प्रतिशत कम है?", options: ["20%", "25%", "15%", "30%"], correct: 0, solution: "कमी % = [वृद्धि % / (100 + वृद्धि %)] × 100 => [25 / (100 + 25)] × 100 = (25 / 125) × 100 = 20%।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक समचतुर्भुज (Rhombus) के विकर्ण 16 सेमी और 12 सेमी हैं। इसका क्षेत्रफल क्या होगा?", options: ["192 वर्ग सेमी", "96 वर्ग सेमी", "48 वर्ग सेमी", "144 वर्ग सेमी"], correct: 1, solution: "समचतुर्भुज का क्षेत्रफल = 1/2 × d1 × d2 => 1/2 × 16 × 12 = 96 वर्ग सेमी।" },
            { subject: "Maths", tabId: "tab-Maths", q: "3 आदमियों या 4 औरतों की प्रतिदिन की मजदूरी 480 रु है। 5 आदमी और 6 औरतों की एक दिन की मजदूरी कितनी होगी?", options: ["1200 रु", "1400 रु", "1520 रु", "1600 रु"], correct: 2, solution: "1 आदमी की मजदूरी = 480/3 = 160 रु। 1 औरत की मजदूरी = 480/4 = 120 रु। 5 आदमी और 6 औरतों की मजदूरी = (5 × 160) + (6 × 120) = 800 + 720 = 1520 रु।" },
            { subject: "Maths", tabId: "tab-Maths", q: "10 भुजाओं वाले बहुभुज (Decagon) में विकर्णों (Diagonals) की संख्या कितनी होती है?", options: ["20", "35", "40", "45"], correct: 1, solution: "बहुभुज में विकर्णों की संख्या का सूत्र = n(n-3)/2। 10 भुजाओं के लिए = 10(10-3)/2 = 10 × 7 / 2 = 70 / 2 = 35।" },
            { subject: "Maths", tabId: "tab-Maths", q: "यदि दो संख्याओं का गुणनफल 324 है और उनका HCF 3 है, तो उनका LCM क्या होगा?", options: ["108", "972", "327", "105"], correct: 0, solution: "सूत्र: LCM × HCF = दोनों संख्याओं का गुणनफल। LCM × 3 = 324 => LCM = 324 / 3 = 108।" },
            { subject: "Maths", tabId: "tab-Maths", q: "6, 8, 10, 12, 14 का प्रसरण (Variance) क्या है? (औसत = 10)", options: ["8", "10", "6", "12"], correct: 0, solution: "प्रसरण = ∑(xi - µ)² / n। (6-10)² + (8-10)² + (10-10)² + (12-10)² + (14-10)² = 16 + 4 + 0 + 4 + 16 = 40। 40 / 5 = 8।" },
            { subject: "Maths", tabId: "tab-Maths", q: "x³ - y³ का गुणनखंड (Factor) क्या होता है?", options: ["(x-y)(x²+xy+y²)", "(x-y)(x²-xy+y²)", "(x+y)(x²-xy+y²)", "(x-y)³"], correct: 0, solution: "बीजगणित के सर्वसमिका (Identity) के अनुसार, a³ - b³ का गुणनखंड (a - b)(a² + ab + b²) होता है।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक 150 मीटर लंबी ट्रेन 50 किमी/घंटा की गति से चल रही है। 40 किमी/घंटा की गति से विपरीत दिशा में आ रही 100 मीटर लंबी ट्रेन को पार करने में उसे कितना समय लगेगा?", options: ["10 सेकंड", "15 सेकंड", "20 सेकंड", "25 सेकंड"], correct: 0, solution: "कुल दूरी = 150 + 100 = 250 मी। विपरीत दिशा में सापेक्ष गति = 50 + 40 = 90 किमी/घंटा = 90 × (5/18) = 25 मी/से। समय = दूरी / गति = 250 / 25 = 10 सेकंड।" },
            { subject: "Maths", tabId: "tab-Maths", q: "5 क्रमिक विषम संख्याओं का औसत 25 है। सबसे बड़ी संख्या क्या है?", options: ["27", "29", "31", "33"], correct: 1, solution: "औसत हमेशा बीच की संख्या होती है। पांच संख्याएं होंगी: 21, 23, 25, 27, 29। अतः सबसे बड़ी संख्या 29 है।" },
            { subject: "Maths", tabId: "tab-Maths", q: "कोई धन चक्रवृद्धि ब्याज पर 3 वर्ष में अपने का 8 गुना हो जाता है। दर ज्ञात करें।", options: ["50%", "100%", "200%", "300%"], correct: 1, solution: "सूत्र: A = P(1 + r/100)^n => 8P = P(1 + r/100)³ => 8 = (1 + r/100)³ => 2³ = (1 + r/100)³ => 2 = 1 + r/100 => r/100 = 1 => r = 100%।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक वृत्त की परिधि 88 सेमी है। उसका क्षेत्रफल क्या होगा? (π = 22/7)", options: ["154 वर्ग सेमी", "616 वर्ग सेमी", "308 वर्ग सेमी", "1232 वर्ग सेमी"], correct: 1, solution: "परिधि = 2πr = 88 => 2 × 22/7 × r = 88 => r = 14 सेमी। क्षेत्रफल = πr² = 22/7 × 14 × 14 = 616 वर्ग सेमी।" },
            { subject: "Maths", tabId: "tab-Maths", q: "400 का 15% + 200 का 20% = ?", options: ["80", "100", "120", "140"], correct: 1, solution: "400 का 15% = 60। 200 का 20% = 40। दोनों का योग = 60 + 40 = 100।" },
            { subject: "Maths", tabId: "tab-Maths", q: "12, 21, और 8 का चतुर्थानुपाती (Fourth Proportional) क्या होगा?", options: ["12", "14", "16", "18"], correct: 1, solution: "चतुर्थानुपाती (x) के लिए सूत्र: a : b :: c : x => a/b = c/x => 12/21 = 8/x => x = (21 × 8) / 12 = 168 / 12 = 14।" },

            // 5 Reasoning
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "यदि A + B का अर्थ 'A, B की बहन है' और A × B का अर्थ 'A, B का पति है', तो P + Q × R में P का R से क्या संबंध है?", options: ["सास", "ननद/भाभी (Sister-in-law)", "बहन", "चाची"], correct: 1, solution: "Q × R का अर्थ है Q, R का पति है (यानी R पत्नी है)। P + Q का अर्थ है P, Q की बहन है। अतः P, R के पति (Q) की बहन है, जिसे ननद (Sister-in-law) कहते हैं।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "दी गई श्रृंखला को पूरा करें: A, C, F, J, O, ?", options: ["S", "T", "U", "V"], correct: 2, solution: "वर्णमाला क्रम (Alphabetical order) में पैटर्न: A(+2) = C, C(+3) = F, F(+4) = J, J(+5) = O. अगला अक्षर: O(+6) = U होगा।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "शब्द 'DICTIONARY' के अक्षरों से कौन सा शब्द नहीं बनाया जा सकता?", options: ["NATION", "RADIO", "DIARY", "DAIRY"], correct: 3, solution: "शब्द 'DAIRY' नहीं बनाया जा सकता क्योंकि इसमें 'E' अक्षर है, जबकि मूल शब्द 'DICTIONARY' में कोई 'E' मौजूद नहीं है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एक व्यक्ति दक्षिण की ओर 5 किमी चलता है, फिर दाएँ मुड़कर 3 किमी चलता है, फिर दाएँ मुड़कर 5 किमी चलता है। वह प्रारंभिक बिंदु से किस दिशा में है?", options: ["उत्तर", "दक्षिण", "पूर्व", "पश्चिम"], correct: 3, solution: "वह 5 किमी दक्षिण में गया, फिर दाएँ (पश्चिम) मुड़कर 3 किमी गया, फिर दाएँ (उत्तर) मुड़कर 5 किमी गया। अब वह शुरुआती बिंदु के ठीक सामने पश्चिम (West) दिशा में 3 किमी की दूरी पर है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "असंगत चुनें (Find the odd one out):", options: ["कानपुर", "इलाहाबाद (प्रयागराज)", "वाराणसी", "मथुरा"], correct: 3, solution: "कानपुर, इलाहाबाद और वाराणसी तीनों शहर गंगा नदी के किनारे बसे हैं, जबकि मथुरा यमुना नदी के किनारे स्थित है। इसलिए मथुरा विषम (Odd) है।" }
        ],

        "4": [
            // ================= TEST 4 =================
            // 15 General Knowledge
            { subject: "General Knowledge", tabId: "tab-GK", q: "रामायण के रचयिता कौन हैं?", options: ["तुलसीदास", "वाल्मीकि", "वेदव्यास", "कबीरदास"], correct: 1, solution: "महर्षि वाल्मीकि ने संस्कृत में मूल 'रामायण' की रचना की थी। जबकि गोस्वामी तुलसीदास ने अवधी भाषा में 'रामचरितमानस' की रचना की है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारत का सर्वोच्च नागरिक सम्मान कौन सा है?", options: ["पद्म भूषण", "परमवीर चक्र", "भारत रत्न", "शौर्य चक्र"], correct: 2, solution: "भारत का सर्वोच्च नागरिक सम्मान 'भारत रत्न' है, जिसकी शुरुआत 1954 में हुई थी। यह कला, साहित्य, विज्ञान, सार्वजनिक सेवा और खेल के क्षेत्र में दिया जाता है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "'स्वराज मेरा जन्मसिद्ध अधिकार है' किसने कहा था?", options: ["भगत सिंह", "लाला लाजपत राय", "बाल गंगाधर तिलक", "सुभाष चंद्र बोस"], correct: 2, solution: "यह प्रसिद्ध नारा लोकमान्य 'बाल गंगाधर तिलक' ने दिया था। उन्होंने भारतीय स्वतंत्रता संग्राम में महत्वपूर्ण भूमिका निभाई थी।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "विश्व की सबसे गहरी झील कौन सी है?", options: ["सुपीरियर झील", "विक्टोरिया झील", "बैकाल झील", "चिल्का झील"], correct: 2, solution: "रूस के साइबेरिया क्षेत्र में स्थित 'बैकाल झील' (Lake Baikal) दुनिया की सबसे गहरी और सबसे पुरानी मीठे पानी की झील है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "'पिंक सिटी' (गुलाबी शहर) के नाम से किसे जाना जाता है?", options: ["उदयपुर", "जयपुर", "जोधपुर", "बीकानेर"], correct: 1, solution: "राजस्थान की राजधानी 'जयपुर' को पिंक सिटी (गुलाबी शहर) कहा जाता है। 1876 में प्रिंस ऑफ वेल्स के स्वागत में महाराजा राम सिंह ने इसे गुलाबी रंग से पुतवाया था।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारतीय संविधान के निर्माता कौन माने जाते हैं?", options: ["महात्मा गांधी", "जवाहरलाल नेहरू", "डॉ. राजेंद्र प्रसाद", "डॉ. बी.आर. अंबेडकर"], correct: 3, solution: "डॉ. बी.आर. अंबेडकर को भारतीय संविधान का जनक (Father of Indian Constitution) माना जाता है। वे संविधान सभा की 'प्रारूप समिति' (Drafting Committee) के अध्यक्ष थे।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "पृथ्वी दिवस कब मनाया जाता है?", options: ["22 मार्च", "22 अप्रैल", "5 जून", "11 जुलाई"], correct: 1, solution: "पृथ्वी दिवस (Earth Day) हर साल '22 अप्रैल' को मनाया जाता है। इसका उद्देश्य पर्यावरण संरक्षण के प्रति जागरूकता फैलाना है। (22 मार्च - जल दिवस)।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "'आजाद हिंद फौज' की स्थापना किसने की थी?", options: ["चंद्रशेखर आजाद", "भगत सिंह", "सुभाष चंद्र बोस", "राजगुरु"], correct: 2, solution: "आजाद हिंद फौज (Indian National Army) की स्थापना मूल रूप से 1942 में रास बिहारी बोस और कैप्टन मोहन सिंह ने की थी, लेकिन 1943 में 'सुभाष चंद्र बोस' ने इसका नेतृत्व और पुनर्गठन किया था।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "सबसे छोटा महासागर कौन सा है?", options: ["प्रशांत महासागर", "हिंद महासागर", "आर्कटिक महासागर", "अटलांटिक महासागर"], correct: 2, solution: "विश्व का सबसे छोटा और सबसे उथला महासागर 'आर्कटिक महासागर' है। (सबसे बड़ा और गहरा प्रशांत महासागर है)।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "'मैकमोहन रेखा' किन दो देशों के बीच स्थित है?", options: ["भारत और पाकिस्तान", "भारत और नेपाल", "भारत और चीन", "पाकिस्तान और अफगानिस्तान"], correct: 2, solution: "मैकमोहन रेखा (McMahon Line) 'भारत और चीन' (विशेषकर अरुणाचल प्रदेश क्षेत्र) के बीच की सीमा रेखा है। इसका निर्धारण 1914 में शिमला समझौते के तहत हुआ था।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "अर्जुन पुरस्कार किस क्षेत्र में दिया जाता है?", options: ["सिनेमा", "साहित्य", "खेल", "विज्ञान"], correct: 2, solution: "अर्जुन पुरस्कार भारत सरकार द्वारा 'खेल' (Sports) के क्षेत्र में लगातार उत्कृष्ट प्रदर्शन करने वाले खिलाड़ियों को दिया जाता है। इसकी शुरुआत 1961 में हुई थी।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "राष्ट्रीय गान 'जन गण मन' के रचयिता कौन हैं?", options: ["बंकिम चंद्र चटर्जी", "रवींद्रनाथ टैगोर", "शरद चंद्र चट्टोपाध्याय", "मुंशी प्रेमचंद"], correct: 1, solution: "भारत का राष्ट्रीय गान 'जन गण मन' नोबेल पुरस्कार विजेता 'रवींद्रनाथ टैगोर' द्वारा लिखा गया है। इसे पहली बार 1911 के कांग्रेस के कलकत्ता अधिवेशन में गाया गया था।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारत के पहले उप-प्रधानमंत्री कौन थे?", options: ["मोरारजी देसाई", "सरदार वल्लभभाई पटेल", "लाल कृष्ण आडवाणी", "चौधरी चरण सिंह"], correct: 1, solution: "भारत के प्रथम उप-प्रधानमंत्री और प्रथम गृह मंत्री 'सरदार वल्लभभाई पटेल' थे। उन्हें भारत का 'लौह पुरुष' (Iron Man of India) भी कहा जाता है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "'पंचतंत्र' के लेखक कौन हैं?", options: ["विष्णु शर्मा", "कालिदास", "तुलसीदास", "चाणक्य"], correct: 0, solution: "'पंचतंत्र' प्राचीन भारत का एक प्रसिद्ध कथा संग्रह है, जिसके रचयिता 'विष्णु शर्मा' माने जाते हैं। यह दुनिया में सबसे अधिक अनुवादित भारतीय पुस्तक है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "काजीरंगा राष्ट्रीय उद्यान किस राज्य में है?", options: ["पश्चिम बंगाल", "मध्य प्रदेश", "असम", "उत्तराखंड"], correct: 2, solution: "काजीरंगा राष्ट्रीय उद्यान 'असम' राज्य में स्थित है। यह मुख्य रूप से 'एक सींग वाले गैंडे' (One-horned Rhinoceros) के संरक्षण के लिए विश्व प्रसिद्ध है।" },

            // 15 General Science
            { subject: "General Science", tabId: "tab-Science", q: "प्रकाश वर्ष (Light Year) किसकी इकाई है?", options: ["समय की", "दूरी की", "प्रकाश की गति की", "ऊर्जा की"], correct: 1, solution: "प्रकाश वर्ष (Light Year) 'दूरी' (Distance) की इकाई है। यह प्रकाश द्वारा निर्वात में एक वर्ष में तय की गई दूरी है।" },
            { subject: "General Science", tabId: "tab-Science", q: "विटामिन ए की कमी से कौन सा रोग होता है?", options: ["स्कर्वी", "बेरी-बेरी", "रतौंधी", "रिकेट्स"], correct: 2, solution: "विटामिन ए (रेटिनॉल) की कमी से 'रतौंधी' (Night Blindness) नामक रोग होता है, जिसमें कम रोशनी या रात में दिखाई नहीं देता।" },
            { subject: "General Science", tabId: "tab-Science", q: "ध्वनि की तीव्रता मापने की इकाई क्या है?", options: ["हर्ट्ज़", "डेसिबल", "मीटर", "जूल"], correct: 1, solution: "ध्वनि की तीव्रता (Intensity of Sound) मापने की इकाई 'डेसिबल' (Decibel - dB) है।" },
            { subject: "General Science", tabId: "tab-Science", q: "कौन सा रक्त समूह 'सर्वदाता' (Universal Donor) कहलाता है?", options: ["A", "B", "AB", "O"], correct: 3, solution: "रक्त समूह 'O' (विशेषकर O- नेगेटिव) को 'सर्वदाता' (Universal Donor) कहा जाता है क्योंकि इसमें कोई एंटीजन नहीं होता है और यह किसी भी समूह को रक्त दे सकता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "दूध को दही में बदलने वाला जीवाणु कौन सा है?", options: ["ई. कोलाई", "लैक्टोबैसिलस", "राइज़ोबियम", "यीस्ट"], correct: 1, solution: "'लैक्टोबैसिलस' (Lactobacillus) नामक जीवाणु (Bacteria) दूध में पाई जाने वाली लैक्टोज शर्करा को लैक्टिक अम्ल में बदलकर दूध को दही में जमा देता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "मनुष्य के शरीर में पसलियों (Ribs) की संख्या कितनी होती है?", options: ["20", "22", "24", "26"], correct: 2, solution: "मनुष्य के शरीर में कुल 12 जोड़ी यानी '24' पसलियां (Ribs) होती हैं, जो फेफड़ों और हृदय की रक्षा करती हैं।" },
            { subject: "General Science", tabId: "tab-Science", q: "खाने के नमक का रासायनिक नाम क्या है?", options: ["सोडियम क्लोराइड", "पोटेशियम क्लोराइड", "कैल्शियम कार्बोनेट", "सोडियम बाइकार्बोनेट"], correct: 0, solution: "सामान्य खाने के नमक का रासायनिक नाम 'सोडियम क्लोराइड' है और इसका रासायनिक सूत्र NaCl होता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "बायोगैस का मुख्य घटक क्या है?", options: ["ऑक्सीजन", "मीथेन", "ब्यूटेन", "प्रोपेन"], correct: 1, solution: "बायोगैस (Biogas) या गोबर गैस का मुख्य घटक 'मीथेन' (CH4 - लगभग 55-75%) होता है। यह एक बेहतरीन और स्वच्छ ईंधन है।" },
            { subject: "General Science", tabId: "tab-Science", q: "टेलीविज़न का आविष्कार किसने किया था?", options: ["जे.एल. बेयर्ड", "थॉमस एडिसन", "मारकोनी", "ग्राहम बेल"], correct: 0, solution: "टेलीविज़न (TV) का आविष्कार 1925 में स्कॉटिश इंजीनियर 'जे.एल. बेयर्ड' (John Logie Baird) ने किया था।" },
            { subject: "General Science", tabId: "tab-Science", q: "लोहे पर जंग लगना किसका उदाहरण है?", options: ["भौतिक परिवर्तन", "ऑक्सीकरण", "उर्ध्वपातन", "अपचयन"], correct: 1, solution: "लोहे पर जंग लगना (Rusting of Iron) एक 'ऑक्सीकरण' (Oxidation) और रासायनिक परिवर्तन है। जंग लगने से लोहे का वजन बढ़ जाता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "पत्तियों का हरा रंग किसके कारण होता है?", options: ["जाइलम", "फ्लोएम", "क्लोरोफिल", "स्टोमेटा"], correct: 2, solution: "पौधों की पत्तियों का हरा रंग 'क्लोरोफिल' (पर्णहरित) नामक वर्णक के कारण होता है, जो प्रकाश संश्लेषण में मदद करता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "सबसे भारी धातु कौन सी है?", options: ["सोना", "सीसा", "ऑस्मियम", "पारा"], correct: 2, solution: "प्रकृति में पाई जाने वाली सबसे भारी (सर्वाधिक घनत्व वाली) धातु 'ऑस्मियम' (Osmium - Os) है।" },
            { subject: "General Science", tabId: "tab-Science", q: "इंसुलिन की कमी से कौन सी बीमारी होती है?", options: ["कैंसर", "टीबी", "मधुमेह (Diabetes)", "मलेरिया"], correct: 2, solution: "अग्न्याशय (Pancreas) से स्रावित होने वाले इंसुलिन हार्मोन की कमी से रक्त में शर्करा का स्तर बढ़ जाता है, जिससे 'मधुमेह' (Diabetes) रोग होता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "मानव नेत्र में प्रतिबिंब (Image) कहाँ बनता है?", options: ["कॉर्निया पर", "पुतली पर", "रेटिना पर", "आइरिस पर"], correct: 2, solution: "मानव नेत्र में किसी वस्तु का प्रतिबिंब 'रेटिना' (दृष्टिपटल) पर बनता है। यह प्रतिबिंब हमेशा 'वास्तविक और उल्टा' (Real and Inverted) होता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "सूर्य में ऊर्जा का मुख्य स्रोत क्या है?", options: ["नाभिकीय विखंडन", "नाभिकीय संलयन", "रासायनिक अभिक्रिया", "घर्षण"], correct: 1, solution: "सूर्य और अन्य तारों में ऊर्जा का मुख्य स्रोत 'नाभिकीय संलयन' (Nuclear Fusion) है, जिसमें हाइड्रोजन के हल्के नाभिक जुड़कर हीलियम बनाते हैं।" },

            // 15 Maths
            { subject: "Maths", tabId: "tab-Maths", q: "10, 15 और 30 का LCM (लघुत्तम समापवर्त्य) क्या होगा?", options: ["15", "30", "60", "90"], correct: 1, solution: "LCM वह छोटी से छोटी संख्या होती है जो दी गई सभी संख्याओं से विभाज्य हो। 30, 10 और 15 दोनों के पहाड़े में आता है, अतः LCM = 30।" },
            { subject: "Maths", tabId: "tab-Maths", q: "1200 का 25% कितना होगा?", options: ["250", "300", "400", "500"], correct: 1, solution: "1200 का 25% = 1200 × (25 / 100) = 1200 × (1/4) = 300।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक आयत की लंबाई 10 मी और चौड़ाई 8 मी है, तो उसका क्षेत्रफल क्या होगा?", options: ["18 वर्ग मी", "36 वर्ग मी", "80 वर्ग मी", "100 वर्ग मी"], correct: 2, solution: "आयत का क्षेत्रफल = लंबाई × चौड़ाई। अतः क्षेत्रफल = 10 मी × 8 मी = 80 वर्ग मीटर।" },
            { subject: "Maths", tabId: "tab-Maths", q: "50 + 10 × 2 का मान क्या होगा? (BODMAS नियम)", options: ["120", "100", "70", "80"], correct: 2, solution: "BODMAS नियम के अनुसार, पहले गुणा (Multiply) होगा, फिर जोड़ (Addition)। अतः 50 + (10 × 2) = 50 + 20 = 70।" },
            { subject: "Maths", tabId: "tab-Maths", q: "यदि x/5 = 10 है, तो x का मान क्या है?", options: ["2", "15", "50", "100"], correct: 2, solution: "समीकरण x / 5 = 10 में, 5 का दाईं ओर गुणा होगा। x = 10 × 5 = 50।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक वस्तु को 200 रुपये में खरीदकर 250 रुपये में बेचा गया, लाभ प्रतिशत क्या है?", options: ["20%", "25%", "30%", "50%"], correct: 1, solution: "क्रय मूल्य (CP) = 200 रु, विक्रय मूल्य (SP) = 250 रु। लाभ = 250 - 200 = 50 रु। लाभ % = (लाभ / CP) × 100 = (50 / 200) × 100 = 25%।" },
            { subject: "Maths", tabId: "tab-Maths", q: "1, 3, 5, 7, 9 का औसत (Average) क्या है?", options: ["4", "5", "6", "7"], correct: 1, solution: "औसत = राशियों का योग / राशियों की संख्या। (1+3+5+7+9) / 5 = 25 / 5 = 5। (चूंकि यह एक समानांतर श्रेणी है, ठीक बीच की संख्या 5 ही औसत होगी)।" },
            { subject: "Maths", tabId: "tab-Maths", q: "64 का वर्गमूल (Square root) क्या है?", options: ["6", "8", "12", "16"], correct: 1, solution: "64 का वर्गमूल (√64) 8 होता है, क्योंकि 8 × 8 = 64।" },
            { subject: "Maths", tabId: "tab-Maths", q: "2 घंटे में कितने मिनट होते हैं?", options: ["60", "100", "120", "240"], correct: 2, solution: "1 घंटे में 60 मिनट होते हैं। अतः 2 घंटे में = 2 × 60 = 120 मिनट।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक वृत्त का व्यास 14 सेमी है, तो उसकी त्रिज्या (Radius) कितनी होगी?", options: ["7 सेमी", "14 सेमी", "21 सेमी", "28 सेमी"], correct: 0, solution: "त्रिज्या (Radius) हमेशा व्यास (Diameter) की आधी होती है। अतः त्रिज्या = 14 / 2 = 7 सेमी।" },
            { subject: "Maths", tabId: "tab-Maths", q: "3/5 को प्रतिशत में कैसे लिखेंगे?", options: ["40%", "50%", "60%", "75%"], correct: 2, solution: "किसी भी भिन्न को प्रतिशत में बदलने के लिए 100 से गुणा करते हैं। (3 / 5) × 100 = 3 × 20 = 60%।" },
            { subject: "Maths", tabId: "tab-Maths", q: "18, 24 और 36 का HCF (महत्तम समापवर्तक) क्या होगा?", options: ["3", "4", "6", "12"], correct: 2, solution: "HCF (म.स.प.) वह बड़ी से बड़ी संख्या है जो दी गई सभी संख्याओं को काट दे। 6 के पहाड़े में 18, 24 और 36 तीनों आते हैं, अतः HCF = 6।" },
            { subject: "Maths", tabId: "tab-Maths", q: "साधारण ब्याज ज्ञात करें: मूलधन 2000 रु, दर 10%, समय 3 वर्ष।", options: ["300 रु", "500 रु", "600 रु", "900 रु"], correct: 2, solution: "साधारण ब्याज (SI) = (P × R × T) / 100 = (2000 × 10 × 3) / 100 = 60000 / 100 = 600 रुपये।" },
            { subject: "Maths", tabId: "tab-Maths", q: "5 का घन (Cube) क्या होगा?", options: ["25", "100", "125", "150"], correct: 2, solution: "5 का घन (Cube) = 5 × 5 × 5 = 125।" },
            { subject: "Maths", tabId: "tab-Maths", q: "यदि 5 पेन की कीमत 25 रुपये है, तो 8 पेन की कीमत क्या होगी?", options: ["30 रुपये", "35 रुपये", "40 रुपये", "45 रुपये"], correct: 2, solution: "5 पेन की कीमत = 25 रु, तो 1 पेन की कीमत = 25 / 5 = 5 रु। अतः 8 पेन की कीमत = 8 × 5 = 40 रुपये।" },

            // 5 Reasoning
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "श्रृंखला पूरी करें: 5, 10, 15, 20, ?", options: ["22", "25", "30", "35"], correct: 1, solution: "यह एक सरल समांतर श्रेणी है जिसमें हर बार +5 जोड़ा जा रहा है। 20 + 5 = 25।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "यदि 'APPLE' को 'BQQMF' लिखा जाता है, तो 'BOY' को क्या लिखा जाएगा?", options: ["APX", "CPZ", "CNX", "BPY"], correct: 1, solution: "पैटर्न: हर अक्षर में अंग्रेजी वर्णमाला का अगला अक्षर (+1) लिखा गया है। A(+1)=B, P(+1)=Q, L(+1)=M, E(+1)=F। इसी तरह B(+1)=C, O(+1)=P, Y(+1)=Z -> CPZ।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "गाय का संबंध बछड़े से है, तो कुत्ते का संबंध किससे होगा?", options: ["बिल्ली", "शेर", "पिल्ला", "मेमना"], correct: 2, solution: "जिस प्रकार गाय के बच्चे को 'बछड़ा' (Calf) कहा जाता है, उसी प्रकार कुत्ते के बच्चे को 'पिल्ला' (Puppy) कहा जाता है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एक लड़की पश्चिम की ओर 4 किमी चलती है, फिर दाईं ओर मुड़कर 3 किमी चलती है। अब वह किस दिशा में देख रही है?", options: ["पूर्व", "उत्तर", "दक्षिण", "पश्चिम"], correct: 1, solution: "लड़की पहले पश्चिम (West) दिशा में गई। वहाँ से दाईं ओर (Right) मुड़ने का मतलब है उत्तर (North) दिशा की ओर मुड़ना। अतः वह अब उत्तर दिशा में देख रही है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "इनमें से विषम (Odd one out) चुनें:", options: ["कार", "बस", "साइकिल", "हवाई जहाज"], correct: 3, solution: "हवाई जहाज (Aeroplane) विषम है क्योंकि यह हवा में उड़ता है, जबकि कार, बस और साइकिल सड़क (जमीन) पर चलने वाले वाहन हैं।" }
        ],

        "3": [
            // ================= TEST 3 =================
            // 15 General Knowledge
            { subject: "General Knowledge", tabId: "tab-GK", q: "द्वितीय बौद्ध संगीति कहाँ आयोजित की गई थी?", options: ["राजगृह", "वैशाली", "पाटलिपुत्र", "कुंडलवन"], correct: 1, solution: "द्वितीय बौद्ध संगीति 383 ईसा पूर्व में 'वैशाली' में राजा कालाशोक के शासनकाल में आयोजित की गई थी।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "संविधान का अनुच्छेद 356 किससे संबंधित है?", options: ["राष्ट्रीय आपातकाल", "वित्तीय आपातकाल", "राष्ट्रपति शासन", "संविधान संशोधन"], correct: 2, solution: "संविधान का अनुच्छेद 356 राज्यों में संवैधानिक तंत्र के विफल होने पर 'राष्ट्रपति शासन' (President's Rule) लगाने से संबंधित है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "दक्षिण भारत की सबसे ऊँची चोटी कौन सी है?", options: ["डोडाबेट्टा", "अनामुडी", "महेंद्रगिरि", "गुरुशिखर"], correct: 1, solution: "दक्षिण भारत और पश्चिमी घाट की सबसे ऊँची चोटी 'अनामुडी' (Anamudi - 2,695 मीटर) है, जो केरल में अन्नामलाई पहाड़ियों पर स्थित है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "साहित्य का नोबेल पुरस्कार जीतने वाले प्रथम एशियाई कौन थे?", options: ["सी.वी. रमन", "रवींद्रनाथ टैगोर", "मदर टेरेसा", "अमर्त्य सेन"], correct: 1, solution: "साहित्य का नोबेल पुरस्कार जीतने वाले प्रथम भारतीय और एशियाई 'रवींद्रनाथ टैगोर' थे, जिन्हें 1913 में उनकी रचना 'गीतांजलि' के लिए यह सम्मान मिला था।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "जापान की मुद्रा (Currency) क्या है?", options: ["युआन", "येन", "रूबेल", "वॉन"], correct: 1, solution: "जापान की आधिकारिक मुद्रा 'येन' (Yen) है और इसकी राजधानी टोक्यो है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "बक्सर का युद्ध (Battle of Buxar) किस वर्ष लड़ा गया था?", options: ["1757", "1761", "1764", "1857"], correct: 2, solution: "बक्सर का ऐतिहासिक युद्ध '1764' में ब्रिटिश ईस्ट इंडिया कंपनी (हेक्टर मुनरो के नेतृत्व में) और मीर कासिम, शुजाउद्दौला तथा शाह आलम द्वितीय की संयुक्त सेना के बीच लड़ा गया था।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "यूनेस्को (UNESCO) का मुख्यालय कहाँ है?", options: ["पेरिस", "जिनेवा", "न्यूयॉर्क", "रोम"], correct: 0, solution: "यूनेस्को (UNESCO - United Nations Educational, Scientific and Cultural Organization) का मुख्यालय फ्रांस की राजधानी 'पेरिस' में स्थित है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "स्वतंत्र भारत के प्रथम भारतीय गवर्नर-जनरल कौन थे?", options: ["लॉर्ड माउंटबेटन", "डॉ. राजेंद्र प्रसाद", "सी. राजगोपालाचारी", "जवाहरलाल नेहरू"], correct: 2, solution: "स्वतंत्र भारत के प्रथम और अंतिम 'भारतीय' गवर्नर-जनरल 'सी. राजगोपालाचारी' (चक्रवर्ती राजगोपालाचारी) थे।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "कर्क रेखा (Tropic of Cancer) भारत के कितने राज्यों से होकर गुजरती है?", options: ["6", "7", "8", "9"], correct: 2, solution: "कर्क रेखा (Tropic of Cancer - 23.5° N) भारत के 8 राज्यों से होकर गुजरती है: गुजरात, राजस्थान, मध्य प्रदेश, छत्तीसगढ़, झारखंड, पश्चिम बंगाल, त्रिपुरा और मिजोरम।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "विश्व का सबसे बड़ा द्वीप (Island) कौन सा है?", options: ["मेडागास्कर", "बोर्नियो", "ग्रीनलैंड", "सुमात्रा"], correct: 2, solution: "विश्व का सबसे बड़ा द्वीप (Island) 'ग्रीनलैंड' है, जो भौगोलिक रूप से उत्तरी अमेरिका का हिस्सा है लेकिन इस पर डेनमार्क का अधिकार है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारत का प्रथम परमाणु रिएक्टर कौन सा है?", options: ["अप्सरा", "ध्रुव", "सायरस", "पूर्णिमा"], correct: 0, solution: "भारत और एशिया का पहला परमाणु अनुसंधान रिएक्टर 'अप्सरा' (Apsara) है, जिसे 1956 में भाभा परमाणु अनुसंधान केंद्र (BARC) ट्रॉम्बे में शुरू किया गया था।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "डेविस कप का संबंध किस खेल से है?", options: ["क्रिकेट", "फुटबॉल", "लॉन टेनिस", "बैडमिंटन"], correct: 2, solution: "'डेविस कप' पुरुषों के 'लॉन टेनिस' (Lawn Tennis) का एक प्रमुख अंतरराष्ट्रीय टीम इवेंट है, जिसे टेनिस का विश्व कप भी कहा जाता है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारतीय राष्ट्रीय कांग्रेस की प्रथम महिला अध्यक्ष कौन थीं?", options: ["सरोजिनी नायडू", "एनी बेसेंट", "इंदिरा गांधी", "सोनिया गांधी"], correct: 1, solution: "कांग्रेस की प्रथम महिला अध्यक्ष 'एनी बेसेंट' थीं (1917 कलकत्ता अधिवेशन)। यदि 'प्रथम भारतीय महिला अध्यक्ष' पूछा जाए, तो उत्तर सरोजिनी नायडू (1925) होगा।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "सौरमंडल में सबसे अधिक उपग्रह (Moons) किस ग्रह के हैं?", options: ["बृहस्पति (Jupiter)", "शनि (Saturn)", "यूरेनस", "नेप्च्यून"], correct: 1, solution: "नवीनतम खोजों के अनुसार, 'शनि' (Saturn) सौरमंडल का वह ग्रह है जिसके सबसे अधिक प्राकृतिक उपग्रह (Moons) हैं।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "हड़प्पा सभ्यता की खोज किसने की थी?", options: ["राखलदास बनर्जी", "दयाराम साहनी", "सर जॉन मार्शल", "ए. कनिंघम"], correct: 1, solution: "सिंधु घाटी की 'हड़प्पा' नामक साइट की खोज 1921 में 'दयाराम साहनी' ने सर जॉन मार्शल के निर्देशन में की थी।" },

            // 15 General Science
            { subject: "General Science", tabId: "tab-Science", q: "ठोस कोण (Solid Angle) की इकाई क्या है?", options: ["रेडियन", "स्टेरेडियन", "डिग्री", "कैंडेला"], correct: 1, solution: "समतल कोण (Plane Angle) का मात्रक रेडियन होता है, जबकि 3D 'ठोस कोण' (Solid Angle) का SI मात्रक 'स्टेरेडियन' (Steradian - sr) होता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "बेकिंग सोडा (खाने का सोडा) का रासायनिक नाम क्या है?", options: ["सोडियम कार्बोनेट", "सोडियम बाइकार्बोनेट", "कैल्शियम कार्बोनेट", "पोटेशियम नाइट्रेट"], correct: 1, solution: "बेकिंग सोडा (खाने का सोडा) का रासायनिक नाम 'सोडियम बाइकार्बोनेट' है और इसका सूत्र NaHCO3 है।" },
            { subject: "General Science", tabId: "tab-Science", q: "ऑप्टिकल फाइबर (Optical Fibre) किस सिद्धांत पर कार्य करता है?", options: ["प्रकीर्णन (Scattering)", "परावर्तन (Reflection)", "पूर्ण आंतरिक परावर्तन (TIR)", "अपवर्तन (Refraction)"], correct: 2, solution: "ऑप्टिकल फाइबर (Optical Fibre) प्रकाश के 'पूर्ण आंतरिक परावर्तन' (Total Internal Reflection) के सिद्धांत पर कार्य करता है। इसका उपयोग तेज़ संचार (Internet) के लिए किया जाता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "रक्त का थक्का (Blood Clotting) जमने में कौन सा विटामिन सहायक है?", options: ["विटामिन A", "विटामिन C", "विटामिन D", "विटामिन K"], correct: 3, solution: "रक्त का थक्का (Blood Clotting) जमने में 'विटामिन K' (फिलोक्विनोन) महत्वपूर्ण भूमिका निभाता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "सबसे भारी प्राकृतिक तत्व (Heaviest naturally occurring element) कौन सा है?", options: ["यूरेनियम", "प्लूटोनियम", "सोना", "ऑस्मियम"], correct: 0, solution: "प्रकृति में पाया जाने वाला सबसे भारी तत्व 'यूरेनियम' (Uranium - परमाणु क्रमांक 92) है। (नोट: प्लूटोनियम कृत्रिम रूप से बनाया जाता है)।" },
            { subject: "General Science", tabId: "tab-Science", q: "प्राकृतिक गैस (Natural Gas) का मुख्य घटक क्या है?", options: ["इथेन", "ब्यूटेन", "मीथेन", "प्रोपेन"], correct: 2, solution: "प्राकृतिक गैस (Natural Gas) और बायोगैस का मुख्य घटक 'मीथेन' (Methane - CH4) होता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "इलेक्ट्रॉन की खोज किसने की थी?", options: ["रदरफोर्ड", "जेम्स चैडविक", "जे.जे. थॉमसन", "नील्स बोर"], correct: 2, solution: "इलेक्ट्रॉन की खोज 1897 में 'जे.जे. थॉमसन' (J.J. Thomson) ने की थी। (याद रखने की ट्रिक: ईंट पर नाच - ई(इलेक्ट्रॉन) ट(थॉमसन), प(प्रोटॉन) र(रदरफोर्ड), ना(न्यूट्रॉन) च(चैडविक))।" },
            { subject: "General Science", tabId: "tab-Science", q: "मनुष्य के हृदय में कितने कक्ष (Chambers) होते हैं?", options: ["2", "3", "4", "5"], correct: 2, solution: "मनुष्य और अन्य स्तनधारियों के हृदय में 4 कक्ष (Chambers) होते हैं - दो आलिंद (Auricles) और दो निलय (Ventricles)।" },
            { subject: "General Science", tabId: "tab-Science", q: "अमाशय (Stomach) में कौन सा अम्ल स्रावित होता है?", options: ["सल्फ्यूरिक अम्ल", "नाइट्रिक अम्ल", "हाइड्रोक्लोरिक अम्ल (HCl)", "लैक्टिक अम्ल"], correct: 2, solution: "मनुष्य के अमाशय (Stomach) में 'हाइड्रोक्लोरिक अम्ल' (HCl) स्रावित होता है जो भोजन को पचाने और हानिकारक जीवाणुओं को मारने का काम करता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "लेंस की क्षमता (Power of Lens) का मात्रक क्या है?", options: ["वाट", "डायोप्टर", "लक्स", "ल्यूमेन"], correct: 1, solution: "लेंस की फोकस दूरी के व्युत्क्रम को लेंस की क्षमता कहते हैं, जिसका SI मात्रक 'डायोप्टर' (Diopter - D) है।" },
            { subject: "General Science", tabId: "tab-Science", q: "मलेरिया रोग किसके कारण होता है?", options: ["जीवाणु (Bacteria)", "विषाणु (Virus)", "कवक (Fungi)", "परजीवी (Protozoa)"], correct: 3, solution: "मलेरिया रोग 'प्लाज्मोडियम' नामक 'परजीवी' (Protozoa) के कारण होता है, जो मादा एनाफिलीज मच्छर के काटने से मनुष्य में फैलता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "कमरे के तापमान पर द्रव अवस्था में पाई जाने वाली धातु है:", options: ["ब्रोमीन", "पारा (Mercury)", "गैलियम", "सीज़ियम"], correct: 1, solution: "'पारा' (Mercury - Hg) एकमात्र ऐसी धातु (Metal) है जो सामान्य तापमान पर द्रव अवस्था में रहती है। (अधातु में ब्रोमीन द्रव है)।" },
            { subject: "General Science", tabId: "tab-Science", q: "हड्डियों और दाँतों के निर्माण में मुख्य तत्व कौन से हैं?", options: ["कैल्शियम और लोहा", "कैल्शियम और फास्फोरस", "सोडियम और पोटेशियम", "मैग्नीशियम और जिंक"], correct: 1, solution: "हड्डियों और दाँतों की मजबूती और निर्माण के लिए मुख्य रूप से 'कैल्शियम और फास्फोरस' (कैल्शियम फॉस्फेट के रूप में) की आवश्यकता होती है।" },
            { subject: "General Science", tabId: "tab-Science", q: "हीटर का तार किसका बना होता है?", options: ["तांबा", "टंगस्टन", "नाइक्रोम", "एल्यूमीनियम"], correct: 2, solution: "इलेक्ट्रिक हीटर की कुंडली 'नाइक्रोम' (Nichrome) तार की बनी होती है क्योंकि इसका गलनांक (Melting point) और प्रतिरोध बहुत उच्च होता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "ऊतकों (Tissues) के अध्ययन को क्या कहा जाता है?", options: ["साइटोलॉजी", "हिस्टोलॉजी", "माइकोलॉजी", "डर्मेटोलॉजी"], correct: 1, solution: "जीव विज्ञान की वह शाखा जिसमें ऊतकों (Tissues) का अध्ययन किया जाता है, उसे 'हिस्टोलॉजी' (Histology / औतिकी) कहते हैं।" },

            // 15 Maths
            { subject: "Maths", tabId: "tab-Maths", q: "यदि किसी संख्या का 40% 120 है, तो वह संख्या क्या है?", options: ["240", "300", "360", "400"], correct: 1, solution: "माना संख्या x है। x का 40% = 120 => x × (40/100) = 120 => x = (120 × 100) / 40 = 300." },
            { subject: "Maths", tabId: "tab-Maths", q: "एक आयत का परिमाप 40 मी है और उसकी लंबाई 12 मी है। उसकी चौड़ाई क्या होगी?", options: ["6 मी", "8 मी", "10 मी", "12 मी"], correct: 1, solution: "आयत का परिमाप = 2(लंबाई + चौड़ाई)। 40 = 2(12 + चौड़ाई) => 20 = 12 + चौड़ाई => चौड़ाई = 8 मी।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक ट्रेन 54 किमी/घंटा की गति से चल रही है। उसकी गति मीटर/सेकंड में क्या होगी?", options: ["10 मी/से", "12 मी/से", "15 मी/से", "18 मी/से"], correct: 2, solution: "किमी/घंटा को मी/से में बदलने के लिए 5/18 से गुणा करते हैं। 54 × (5/18) = 15 मी/से।" },
            { subject: "Maths", tabId: "tab-Maths", q: "यदि A और B का अनुपात 3:4 है, और B और C का अनुपात 8:9 है, तो A:C क्या होगा?", options: ["1:2", "2:3", "3:4", "4:5"], correct: 1, solution: "A/C = (A/B) × (B/C) = (3/4) × (8/9) = 24/36 = 2/3। अतः अनुपात 2:3 होगा।" },
            { subject: "Maths", tabId: "tab-Maths", q: "12, 18 और 24 का लघुत्तम समापवर्त्य (LCM) क्या होगा?", options: ["48", "72", "36", "144"], correct: 1, solution: "12, 18 और 24 से पूरी तरह कटने वाली सबसे छोटी संख्या 72 है।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक साइकिल को ₹1500 में खरीदकर ₹1800 में बेचा गया। लाभ प्रतिशत ज्ञात करें।", options: ["15%", "20%", "25%", "30%"], correct: 1, solution: "लाभ = 1800 - 1500 = ₹300। लाभ % = (लाभ / क्रय मूल्य) × 100 = (300 / 1500) × 100 = 20%।" },
            { subject: "Maths", tabId: "tab-Maths", q: "6 लड़कों की औसत आयु 14 वर्ष है। यदि एक नया लड़का जुड़ जाता है, तो औसत 15 वर्ष हो जाता है। नए लड़के की आयु क्या है?", options: ["16 वर्ष", "18 वर्ष", "20 वर्ष", "21 वर्ष"], correct: 3, solution: "6 लड़कों की कुल आयु = 6 × 14 = 84 वर्ष। 7 लड़कों की कुल आयु = 7 × 15 = 105 वर्ष। नए लड़के की आयु = 105 - 84 = 21 वर्ष।" },
            { subject: "Maths", tabId: "tab-Maths", q: "₹5000 पर 8% वार्षिक दर से 2 वर्ष का साधारण ब्याज कितना होगा?", options: ["₹600", "₹800", "₹1000", "₹1200"], correct: 1, solution: "साधारण ब्याज = (मूलधन × दर × समय) / 100 = (5000 × 8 × 2) / 100 = ₹800।" },
            { subject: "Maths", tabId: "tab-Maths", q: "√144 + √81 का मान क्या होगा?", options: ["19", "21", "23", "25"], correct: 1, solution: "√144 = 12 और √81 = 9। दोनों का योग 12 + 9 = 21।" },
            { subject: "Maths", tabId: "tab-Maths", q: "यदि 15 आदमी किसी काम को 20 दिन में कर सकते हैं, तो 10 आदमी उसी काम को कितने दिन में करेंगे?", options: ["25 दिन", "30 दिन", "35 दिन", "40 दिन"], correct: 1, solution: "M1 × D1 = M2 × D2 => 15 × 20 = 10 × D2 => 300 = 10 × D2 => D2 = 30 दिन।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक वृत्त की परिधि 44 सेमी है। उसका क्षेत्रफल क्या होगा? (π = 22/7)", options: ["154 वर्ग सेमी", "144 वर्ग सेमी", "308 वर्ग सेमी", "616 वर्ग सेमी"], correct: 0, solution: "परिधि = 2πr = 44 => 2 × (22/7) × r = 44 => r = 7 सेमी। क्षेत्रफल = πr² = (22/7) × 7 × 7 = 154 वर्ग सेमी।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक समकोण त्रिभुज का आधार 3 सेमी और लंब 4 सेमी है। इसका कर्ण (Hypotenuse) क्या होगा?", options: ["5 सेमी", "6 सेमी", "7 सेमी", "8 सेमी"], correct: 0, solution: "पाइथागोरस प्रमेय: कर्ण² = आधार² + लंब² = 3² + 4² = 9 + 16 = 25। कर्ण = √25 = 5 सेमी।" },
            { subject: "Maths", tabId: "tab-Maths", q: "0.25 को साधारण भिन्न में बदलें।", options: ["1/2", "1/4", "1/5", "1/8"], correct: 1, solution: "0.25 = 25 / 100 = 1 / 4।" },
            { subject: "Maths", tabId: "tab-Maths", q: "यदि a = 3 और b = 4 है, तो a² + b² का मान क्या होगा?", options: ["14", "25", "30", "49"], correct: 1, solution: "a² + b² = 3² + 4² = 9 + 16 = 25।" },
            { subject: "Maths", tabId: "tab-Maths", q: "60 किमी/घंटा की गति से चल रही एक ट्रेन 3 घंटे में कितनी दूरी तय करेगी?", options: ["120 किमी", "150 किमी", "180 किमी", "200 किमी"], correct: 2, solution: "दूरी = गति × समय = 60 × 3 = 180 किमी।" },

            // 5 Reasoning
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "यदि 1 जनवरी 2024 को सोमवार था, तो 1 जनवरी 2025 को कौन सा दिन होगा?", options: ["सोमवार", "मंगलवार", "बुधवार", "बृहस्पतिवार"], correct: 2, solution: "वर्ष 2024 एक लीप वर्ष है (4 से विभाज्य है), इसलिए इसमें फरवरी 29 दिन की होगी। अतः 1 जनवरी 2024 से 1 जनवरी 2025 तक कुल 366 दिन होंगे। विषम दिन = 366 / 7 = 2 शेष। सोमवार + 2 दिन = बुधवार।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "घड़ी में 3:30 बजे घंटे और मिनट की सुई के बीच कितने डिग्री का कोण बनेगा?", options: ["90°", "75°", "105°", "60°"], correct: 1, solution: "घंटे और मिनट की सुई के बीच का कोण = |30H - (11/2)M| <br>= |30×3 - (11/2)×30| = |90 - 165| = |-75| = 75°।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "दिए गए विकल्पों में लुप्त संख्या ज्ञात करें: 4, 9, 25, 49, ?", options: ["64", "81", "100", "121"], correct: 3, solution: "यह श्रृंखला लगातार 'अभाज्य संख्याओं' (Prime Numbers) के वर्गों की है: 2², 3², 5², 7²... अगली अभाज्य संख्या 11 है, तो 11² = 121।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "40 छात्रों की एक कक्षा में राम का स्थान ऊपर से 15वां है। नीचे से उसका स्थान कौन सा होगा?", options: ["25वां", "26वां", "27वां", "24वां"], correct: 1, solution: "सूत्र: कुल व्यक्ति = (ऊपर से स्थान + नीचे से स्थान) - 1 <br>40 = (15 + नीचे से स्थान) - 1 <br>40 = 14 + नीचे से स्थान <br>नीचे से स्थान = 40 - 14 = 26वां।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "कथन: सभी कुत्ते बिल्ली हैं। कुछ बिल्ली चूहे हैं। \nनिष्कर्ष: कुछ कुत्ते चूहे हैं।", options: ["सत्य है", "असत्य है", "तय नहीं कर सकते", "इनमें से कोई नहीं"], correct: 1, solution: "सभी कुत्ते बिल्ली हैं। कुछ बिल्ली चूहे हैं। <br>वेन आरेख (Venn Diagram) बनाने पर 'कुत्ते' और 'चूहे' के बीच कोई सीधा संबंध (Connection) नहीं दिखता। अतः निष्कर्ष 'कुछ कुत्ते चूहे हैं' निश्चित रूप से तय नहीं किया जा सकता।" }
        ],

            { subject: "General Science", tabId: "tab-Science", q: "विद्युत बल्ब में आमतौर पर कौन सी गैस भरी जाती है?", options: ["ऑक्सीजन", "हाइड्रोजन", "आर्गन और नाइट्रोजन", "हीलियम"], correct: 2, solution: "फिलामेंट को जलने से बचाने के लिए विद्युत बल्ब में अक्रिय गैसें जैसे 'आर्गन' (Argon) और नाइट्रोजन भरी जाती हैं।" },

            { subject: "General Science", tabId: "tab-Science", q: "कैंसर के उपचार में किस समस्थानिक (Isotope) का प्रयोग होता है?", options: ["यूरेनियम-235", "आयोडीन-131", "कोबाल्ट-60", "कार्बन-14"], correct: 2, solution: "कैंसर (विशेषकर ट्यूमर) के उपचार में 'कोबाल्ट-60' (Cobalt-60) का प्रयोग किया जाता है।" },

            { subject: "General Science", tabId: "tab-Science", q: "चींटी के डंक में कौन सा अम्ल होता है?", options: ["एसिटिक अम्ल", "साइट्रिक अम्ल", "फॉर्मिक अम्ल (मेथेनोइक)", "लैक्टिक अम्ल"], correct: 2, solution: "चींटी और मधुमक्खी के डंक में 'फॉर्मिक अम्ल' (मेथेनोइक अम्ल) पाया जाता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "आनुवंशिकी (Genetics) का जनक किसे कहा जाता है?", options: ["चार्ल्स डार्विन", "ग्रेगर मेंडल", "रॉबर्ट हुक", "लुई पाश्चर"], correct: 1, solution: "मटर के पौधों पर प्रयोग करने वाले 'ग्रेगर मेंडल' को आनुवंशिकी का जनक कहा जाता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "ध्वनि तरंगें (Sound waves) किस प्रकार की तरंगें हैं?", options: ["अनुप्रस्थ (Transverse)", "अनुदैर्ध्य (Longitudinal)", "विद्युत चुम्बकीय", "इनमें से कोई नहीं"], correct: 1, solution: "ध्वनि तरंगें 'अनुदैर्ध्य तरंगें' (Longitudinal waves) होती हैं।" },
            { subject: "General Science", tabId: "tab-Science", q: "एक अश्व शक्ति (Horsepower) कितने वाट के बराबर होती है?", options: ["746 W", "1000 W", "500 W", "786 W"], correct: 0, solution: "एक अश्व शक्ति (1 HP) 746 वाट (Watt) के बराबर होती है।" },

            // 15 Maths
            { subject: "Maths", tabId: "tab-Maths", q: "समीकरण x² - 5x + 6 = 0 के मूल (Roots) क्या होंगे?", options: ["2, 3", "-2, -3", "1, 6", "-1, -6"], correct: 0, solution: "समीकरण x² - 5x + 6 = 0 का गुणनखंड करने पर: (x - 2)(x - 3) = 0। अतः मूल x = 2 और x = 3 होंगे।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक शंकु (Cone) की त्रिज्या 7 सेमी और ऊंचाई 15 सेमी है। उसका आयतन क्या होगा? (π = 22/7)", options: ["770 घन सेमी", "1540 घन सेमी", "2310 घन सेमी", "385 घन सेमी"], correct: 0, solution: "शंकु का आयतन = (1/3)πr²h = (1/3) × (22/7) × 7 × 7 × 15 = 22 × 7 × 5 = 770 घन सेमी।" },
            { subject: "Maths", tabId: "tab-Maths", q: "5000 रु पर 10% वार्षिक दर से 2 वर्ष के साधारण ब्याज और चक्रवृद्धि ब्याज का अंतर क्या होगा?", options: ["50 रु", "100 रु", "25 रु", "20 रु"], correct: 0, solution: "2 वर्ष के CI और SI का अंतर = P(R/100)² = 5000 × (10/100)² = 5000 × (1/100) = 50 रुपये।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक 200 मी लंबी ट्रेन 72 किमी/घंटा की गति से चल रही है। वह 300 मी लंबे प्लेटफॉर्म को कितने समय में पार करेगी?", options: ["20 सेकंड", "25 सेकंड", "15 सेकंड", "10 सेकंड"], correct: 1, solution: "कुल दूरी = 200 + 300 = 500 मी। गति = 72 किमी/घंटा = 72 × (5/18) = 20 मी/से। समय = दूरी/गति = 500/20 = 25 सेकंड।" },
            { subject: "Maths", tabId: "tab-Maths", q: "sin 30° + cos 60° का मान क्या होगा?", options: ["0", "1", "1/2", "√3/2"], correct: 1, solution: "sin 30° का मान 1/2 और cos 60° का मान भी 1/2 होता है। अतः 1/2 + 1/2 = 1।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक पासा (Dice) फेंकने पर अभाज्य संख्या (Prime number) आने की प्रायिकता क्या है?", options: ["1/6", "1/3", "1/2", "2/3"], correct: 2, solution: "पासे पर कुल परिणाम = 6 (1,2,3,4,5,6)। अभाज्य संख्याएँ = 2, 3, 5 (कुल 3 परिणाम)। प्रायिकता = 3/6 = 1/2।" },
            { subject: "Maths", tabId: "tab-Maths", q: "0.36, 1.2 और 4.8 का LCM क्या होगा?", options: ["14.4", "1.44", "0.144", "144"], correct: 0, solution: "दशमलव हटाने के लिए सभी को 100 से गुणा करें: 36, 120, 480। इनका LCM 1440 है। वापस 100 से भाग देने पर = 14.4।" },
            { subject: "Maths", tabId: "tab-Maths", q: "A किसी काम को 12 दिन में और B उसी काम को 15 दिन में कर सकता है। दोनों मिलकर उस काम को कितने दिन में करेंगे?", options: ["6 सही 2/3 दिन", "8 दिन", "9 दिन", "7 सही 1/2 दिन"], correct: 0, solution: "दोनों मिलकर = (xy) / (x+y) = (12×15) / (12+15) = 180 / 27 = 20 / 3 = 6 सही 2/3 दिन।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक वस्तु का अंकित मूल्य 800 रु है। 15% की छूट देने के बाद भी 2% का लाभ होता है। क्रय मूल्य क्या है?", options: ["600 रु", "650 रु", "666.6 रु", "700 रु"], correct: 2, solution: "अंकित मूल्य पर 15% छूट = 800 × 0.85 = 680 रु (विक्रय मूल्य)। 2% लाभ पर: CP × 1.02 = 680 => CP = 680 / 1.02 = 666.6 रुपये।" },
            { subject: "Maths", tabId: "tab-Maths", q: "पिता की आयु पुत्र की आयु की 3 गुनी है। 10 वर्ष बाद पिता की आयु पुत्र की आयु की दोगुनी होगी। पिता की वर्तमान आयु क्या है?", options: ["30 वर्ष", "45 वर्ष", "40 वर्ष", "50 वर्ष"], correct: 0, solution: "माना पुत्र = x, पिता = 3x। 10 वर्ष बाद: 3x + 10 = 2(x + 10) => 3x + 10 = 2x + 20 => x = 10। पिता की वर्तमान आयु 3x = 30 वर्ष।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक समबाहु त्रिभुज (Equilateral triangle) की भुजा 4√3 सेमी है, उसका क्षेत्रफल क्या होगा?", options: ["12√3 वर्ग सेमी", "16√3 वर्ग सेमी", "24 वर्ग सेमी", "18 वर्ग सेमी"], correct: 0, solution: "समबाहु त्रिभुज का क्षेत्रफल = (√3/4)a² = (√3/4) × (4√3)² = (√3/4) × 48 = 12√3 वर्ग सेमी।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक नाव धारा की दिशा में 15 किमी/घंटा और धारा के विपरीत 9 किमी/घंटा की गति से चलती है। शांत जल में नाव की गति क्या है?", options: ["3 किमी/घंटा", "12 किमी/घंटा", "24 किमी/घंटा", "6 किमी/घंटा"], correct: 1, solution: "शांत जल में नाव की गति = (अनुकूल गति + प्रतिकूल गति) / 2 = (15 + 9) / 2 = 24 / 2 = 12 किमी/घंटा।" },
            { subject: "Maths", tabId: "tab-Maths", q: "x + 1/x = 4 है, तो x² + 1/x² का मान क्या होगा?", options: ["14", "16", "12", "18"], correct: 0, solution: "यदि x + 1/x = p हो, तो x² + 1/x² = p² - 2। अतः 4² - 2 = 16 - 2 = 14।" },
            { subject: "Maths", tabId: "tab-Maths", q: "प्रथम 50 प्राकृत संख्याओं (Natural numbers) का योग क्या होगा?", options: ["1250", "1275", "1300", "2500"], correct: 1, solution: "प्राकृत संख्याओं के योग का सूत्र: n(n+1)/2 => 50(51)/2 = 25 × 51 = 1275।" },
            { subject: "Maths", tabId: "tab-Maths", q: "दो संख्याओं का अनुपात 3:4 है और उनका HCF 5 है। उनका LCM क्या होगा?", options: ["12", "20", "60", "15"], correct: 2, solution: "संख्याएं 3×5 = 15 और 4×5 = 20 होंगी। 15 और 20 का LCM 60 होगा।" },

            { subject: "Reasoning", tabId: "tab-Reasoning", q: "श्रृंखला पूरी करें: 2, 6, 12, 20, 30, ?", options: ["40", "42", "44", "48"], correct: 1, solution: "पैटर्न: +4, +6, +8, +10... अगला अंतर +12 होगा। 30 + 12 = 42।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एक तस्वीर की ओर इशारा करते हुए राम ने कहा, 'वह मेरे पिता के इकलौते बेटे की बेटी है'। तस्वीर वाली लड़की राम की क्या लगती है?", options: ["बहन", "भतीजी", "बेटी", "चचेरी बहन"], correct: 2, solution: "राम के पिता का इकलौता बेटा यानी 'राम' खुद। राम की बेटी, राम की 'बेटी' ही लगेगी।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "यदि MACHINE को 19-7-9-14-15-20-11 लिखा जाता है, तो DANGER को क्या लिखा जाएगा?", options: ["10-7-20-13-11-24", "11-7-20-16-11-24", "10-7-20-16-11-24", "10-8-20-16-11-24"], correct: 0, solution: "अंग्रेजी वर्णमाला में हर अक्षर के स्थान (Position value) में +6 जोड़ा गया है। D(4+6=10), A(1+6=7), N(14+6=20), G(7+6=13), E(5+6=11), R(18+6=24)। अतः 10-7-20-13-11-24।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "रोहन उत्तर की ओर 10 किमी चला, फिर बाएँ मुड़कर 20 किमी चला, फिर बाएँ मुड़कर 10 किमी चला। वह अपने शुरुआती बिंदु से कितनी दूर है?", options: ["10 किमी", "20 किमी", "30 किमी", "40 किमी"], correct: 1, solution: "वह उत्तर गया, फिर बाएँ (पश्चिम) मुड़ा, और फिर बाएँ (दक्षिण) मुड़ा। 10 किमी ऊपर जाकर 10 किमी नीचे आ गया, अतः अब वह शुरुआती बिंदु के ठीक 20 किमी पश्चिम में है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "विषम चुनें (Odd One Out):", options: ["लोहा", "तांबा", "पीतल", "एल्यूमीनियम"], correct: 2, solution: "'पीतल' (Brass) एक मिश्रधातु (Alloy) है जो तांबे और जिंक से बनती है, जबकि अन्य तीनों मूल तत्व (Elements) हैं।" }

            { subject: "General Knowledge", tabId: "tab-GK", q: "कुतुब मीनार कहाँ स्थित है?", options: ["आगरा", "दिल्ली", "हैदराबाद", "लखनऊ"], correct: 1, solution: "कुतुब मीनार दिल्ली में स्थित है। इसका निर्माण कुतुबुद्दीन ऐबक ने शुरू करवाया था।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "'मसालों का बगीचा' किस राज्य को कहा जाता है?", options: ["असम", "कर्नाटक", "आंध्र प्रदेश", "केरल"], correct: 3, solution: "केरल को मसालों का बगीचा कहा जाता है क्योंकि यहाँ काली मिर्च, इलायची आदि की भारी पैदावार होती है।" },

            { subject: "General Science", tabId: "tab-Science", q: "विद्युत धारा (Electric Current) को मापने का यंत्र कौन सा है?", options: ["वोल्टमीटर", "बैरोमीटर", "गैल्वेनोमीटर", "एमीटर"], correct: 3, solution: "विद्युत धारा को 'एमीटर' (Ammeter) द्वारा मापा जाता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "बर्फ का पिघलना कौन सा परिवर्तन है?", options: ["रासायनिक परिवर्तन", "भौतिक परिवर्तन", "जैविक परिवर्तन", "इनमें से कोई नहीं"], correct: 1, solution: "बर्फ का पानी बनना एक 'भौतिक परिवर्तन' (Physical Change) है क्योंकि इससे कोई नया पदार्थ नहीं बनता।" },
            { subject: "General Science", tabId: "tab-Science", q: "ध्वनि की गति सबसे अधिक किसमें होती है?", options: ["हवा में", "पानी में", "निर्वात में", "ठोस (स्टील) में"], correct: 3, solution: "ध्वनि की गति ठोस (जैसे स्टील/लोहा) में सबसे तेज़ होती है और निर्वात में ध्वनि यात्रा नहीं कर सकती।" },
            { subject: "General Science", tabId: "tab-Science", q: "पेनिसिलिन की खोज किसने की थी?", options: ["लुई पाश्चर", "अलेक्जेंडर फ्लेमिंग", "एडवर्ड जेनर", "रॉबर्ट हुक"], correct: 1, solution: "दुनिया की पहली एंटीबायोटिक 'पेनिसिलिन' की खोज 1928 में अलेक्जेंडर फ्लेमिंग ने की थी।" },
            { subject: "General Science", tabId: "tab-Science", q: "सबसे हल्की गैस कौन सी है?", options: ["ऑक्सीजन", "हीलियम", "नाइट्रोजन", "हाइड्रोजन"], correct: 3, solution: "ब्रह्मांड में सबसे हल्की और सबसे प्रचुर गैस 'हाइड्रोजन' है।" },
            { subject: "General Science", tabId: "tab-Science", q: "टेलीफोन का आविष्कार किसने किया था?", options: ["थॉमस एडिसन", "ग्राहम बेल", "गैलीलियो", "मारकोनी"], correct: 1, solution: "टेलीफोन का आविष्कार अलेक्जेंडर ग्राहम बेल ने 1876 में किया था।" },
            { subject: "General Science", tabId: "tab-Science", q: "मानव शरीर की सबसे बड़ी ग्रंथि (Gland) कौन सी है?", options: ["थायराइड", "यकृत (Liver)", "अग्न्याशय (Pancreas)", "पीयूष ग्रंथि"], correct: 1, solution: "मानव शरीर की सबसे बड़ी ग्रंथि यकृत (Liver) है, जो पित्त का निर्माण करती है।" },
            { subject: "General Science", tabId: "tab-Science", q: "विटामिन C की कमी से कौन सा रोग होता है?", options: ["रतौंधी", "बेरी-बेरी", "स्कर्वी", "रिकेट्स"], correct: 2, solution: "विटामिन C की कमी से 'स्कर्वी' (Scurvy) रोग होता है, जिससे मसूड़ों से खून आता है।" },
            { subject: "General Science", tabId: "tab-Science", q: "पृथ्वी पर सबसे कठोर पदार्थ कौन सा है?", options: ["लोहा", "सोना", "हीरा", "प्लैटिनम"], correct: 2, solution: "प्रकृति में पाया जाने वाला सबसे कठोर पदार्थ 'हीरा' (Diamond) है, जो कार्बन का अपररूप है।" },

            // 15 Maths Questions
            { subject: "Maths", tabId: "tab-Maths", q: "15 और 25 का LCM क्या होगा?", options: ["50", "75", "100", "125"], correct: 1, solution: "15 और 25 का सबसे छोटा समान गुणज (LCM) 75 होता है।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक त्रिभुज के तीनों कोणों का योग कितना होता है?", options: ["90°", "180°", "360°", "270°"], correct: 1, solution: "किसी भी त्रिभुज (Triangle) के तीनों आंतरिक कोणों का योग हमेशा 180° होता है।" },
            { subject: "Maths", tabId: "tab-Maths", q: "120 का 40% कितना होगा?", options: ["40", "48", "50", "52"], correct: 1, solution: "120 का 40% = 120 × (40/100) = 48।" },
            { subject: "Maths", tabId: "tab-Maths", q: "यदि x + 5 = 12 है, तो x का मान क्या है?", options: ["5", "6", "7", "8"], correct: 2, solution: "x + 5 = 12 => x = 12 - 5 => x = 7।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक वर्ग (Square) की भुजा 5 मीटर है, तो उसका क्षेत्रफल क्या होगा?", options: ["20 वर्ग मीटर", "25 वर्ग मीटर", "30 वर्ग मीटर", "15 वर्ग मीटर"], correct: 1, solution: "वर्ग का क्षेत्रफल = भुजा × भुजा = 5 × 5 = 25 वर्ग मीटर।" },
            { subject: "Maths", tabId: "tab-Maths", q: "8, 12, और 16 का HCF क्या है?", options: ["2", "4", "6", "8"], correct: 1, solution: "वह सबसे बड़ी संख्या जो 8, 12 और 16 को पूरी तरह काट दे, वह 4 है। अतः HCF = 4।" },
            { subject: "Maths", tabId: "tab-Maths", q: "500 रुपये की वस्तु को 600 रुपये में बेचने पर कितने प्रतिशत का लाभ होगा?", options: ["10%", "15%", "20%", "25%"], correct: 2, solution: "क्रय मूल्य = 500, विक्रय मूल्य = 600। लाभ = 100 रु। लाभ % = (100 / 500) × 100 = 20%।" },
            { subject: "Maths", tabId: "tab-Maths", q: "2, 4, 6, 8, 10 का औसत (Average) क्या होगा?", options: ["4", "5", "6", "8"], correct: 2, solution: "समानांतर श्रेणी में ठीक बीच की संख्या औसत होती है, अतः औसत = 6 होगा।" },
            { subject: "Maths", tabId: "tab-Maths", q: "1 किलोमीटर में कितने मीटर होते हैं?", options: ["100", "1000", "10000", "10"], correct: 1, solution: "1 किलोमीटर (km) में 1000 मीटर (m) होते हैं।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक वृत्त की त्रिज्या 7 सेमी है, तो उसकी परिधि क्या होगी? (π = 22/7)", options: ["22 सेमी", "44 सेमी", "154 सेमी", "88 सेमी"], correct: 1, solution: "परिधि = 2πr = 2 × (22/7) × 7 = 44 सेमी।" },
            { subject: "Maths", tabId: "tab-Maths", q: "15 का वर्ग (Square) क्या होता है?", options: ["225", "250", "125", "150"], correct: 0, solution: "15 का वर्ग (15 × 15) = 225 होता है।" },
            { subject: "Maths", tabId: "tab-Maths", q: "3/4 को प्रतिशत (Percentage) में कैसे लिखेंगे?", options: ["50%", "60%", "75%", "80%"], correct: 2, solution: "प्रतिशत में बदलने के लिए 100 से गुणा करें: (3/4) × 100 = 3 × 25 = 75%।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक काम को 5 आदमी 10 दिन में करते हैं, तो 10 आदमी उसी काम को कितने दिन में करेंगे?", options: ["2 दिन", "5 दिन", "10 दिन", "20 दिन"], correct: 1, solution: "सूत्र: M1 × D1 = M2 × D2 => 5 × 10 = 10 × D2 => D2 = 50 / 10 = 5 दिन।" },
            { subject: "Maths", tabId: "tab-Maths", q: "9 का घन (Cube) क्या होता है?", options: ["81", "729", "343", "512"], correct: 1, solution: "9 का घन (9 × 9 × 9) = 729 होता है।" },
            { subject: "Maths", tabId: "tab-Maths", q: "साधारण ब्याज ज्ञात करें: मूलधन 1000 रु, दर 5%, समय 2 वर्ष।", options: ["50 रु", "100 रु", "150 रु", "200 रु"], correct: 1, solution: "SI = (P × R × T) / 100 = (1000 × 5 × 2) / 100 = 10000 / 100 = 100 रुपये।" },

            // 5 Reasoning Questions
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "श्रृंखला पूरी करें: 2, 4, 8, 16, ?", options: ["24", "30", "32", "64"], correct: 2, solution: "हर संख्या अपनी पिछली संख्या की दोगुनी हो रही है (2×2=4, 4×2=8, 8×2=16)। 16 × 2 = 32।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "यदि 'CAT' को 24 लिखा जाता है, तो 'DOG' को क्या लिखा जाएगा? (A=1, B=2...)", options: ["25", "26", "27", "28"], correct: 1, solution: "अक्षरों का योग: C(3) + A(1) + T(20) = 24। इसी तरह D(4) + O(15) + G(7) = 26।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "दिन का संबंध रात से है, तो सफेद का संबंध किससे होगा?", options: ["लाल", "पीला", "काला", "नीला"], correct: 2, solution: "दिन का विपरीत (Opposite) रात होता है, उसी प्रकार सफेद का विपरीत 'काला' होता है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एक आदमी उत्तर की ओर 5 किमी चलता है, फिर दाईं ओर मुड़कर 3 किमी चलता है। वह अब किस दिशा की ओर जा रहा है?", options: ["उत्तर", "दक्षिण", "पूर्व", "पश्चिम"], correct: 2, solution: "उत्तर (North) दिशा में जाते हुए दाईं (Right) ओर मुड़ने का मतलब है 'पूर्व' (East) दिशा में जाना।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "इनमें से विषम (Odd one out) चुनें:", options: ["सेब", "केला", "आम", "आलू"], correct: 3, solution: "आलू जमीन के अंदर उगता है और यह एक 'सब्जी' (तने का रूप) है, जबकि अन्य सभी पेड़ पर उगने वाले 'फल' हैं।" }
        ]
    };

    const questions = allTestDatabase[testNumber] || allTestDatabase["1"];
    let currentIndex = 0;
    let userAnswers = {}; 
    let timeInSeconds = 60 * 60; // 60 Minutes
    let timerInterval;

    function startTimer() {
        timerInterval = setInterval(() => {
            if (timeInSeconds <= 0) { clearInterval(timerInterval); submitTest(); return; }
            timeInSeconds--;
            document.getElementById('timer').innerText = 
                Math.floor(timeInSeconds / 60).toString().padStart(2, '0') + ":" + (timeInSeconds % 60).toString().padStart(2, '0');
        }, 1000);
    }

    function loadQuestion() {
        const q = questions[currentIndex];
        document.getElementById("q-no").innerText = currentIndex + 1;
        document.getElementById("q-section-name").innerText = q.subject; 
        document.getElementById("question-text").innerText = q.q;
        
        let optionsHTML = "";
        let labels = ["A", "B", "C", "D"];
        q.options.forEach((opt, i) => {
            let isSelected = (userAnswers[currentIndex] === i) ? "selected" : "";
            let isChecked = (userAnswers[currentIndex] === i) ? "checked" : "";
            optionsHTML += `
                <label class="option-card ${isSelected}" onclick="selectOption(${i})">
                    <input type="radio" name="option" value="${i}" ${isChecked}>
                    <span class="opt-label">${labels[i]}.</span><span class="opt-text">${opt}</span>
                </label>`;
        });
        document.getElementById("options-container").innerHTML = optionsHTML;
        document.getElementById("prev-btn").style.display = (currentIndex === 0) ? "none" : "block";
        document.getElementById("next-btn").style.display = (currentIndex === questions.length - 1) ? "none" : "block";
        
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(q.tabId).classList.add('active');
        renderPalette();
    }

    function goToSection(subject) {
        let index = questions.findIndex(q => q.subject === subject);
        if(index !== -1) { 
            let selected = document.querySelector('input[name="option"]:checked');
            if(selected) userAnswers[currentIndex] = parseInt(selected.value);
            currentIndex = index; 
            loadQuestion(); 
        }
    }

    function selectOption(index) {
        document.querySelectorAll(".option-card").forEach(c => c.classList.remove("selected"));
        document.querySelectorAll('input[name="option"]').forEach(i => i.checked = false);
        document.querySelectorAll(".option-card")[index].classList.add("selected");
        document.querySelectorAll('input[name="option"]')[index].checked = true;
    }

    function clearResponse() {
        document.querySelectorAll(".option-card").forEach(c => c.classList.remove("selected"));
        document.querySelectorAll('input[name="option"]').forEach(i => i.checked = false);
        delete userAnswers[currentIndex];
        renderPalette(); 
    }

    function prevQuestion() {
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value);
        if(currentIndex > 0) { currentIndex--; loadQuestion(); }
    }

    function nextQuestion() {
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value);
        if(currentIndex < questions.length - 1) { 
            currentIndex++; loadQuestion(); 
        }
    }

    function saveAndNext() {
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value);
        
        if(currentIndex < questions.length - 1) { 
            currentIndex++; 
            loadQuestion(); 
        } else { 
            alert("यह आखिरी प्रश्न है! अब 'Submit' पर क्लिक करें।"); 
            renderPalette();
        }
    }

    function submitTest() {
        clearInterval(timerInterval);
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value); 

        let resultData = {
            testId: testNumber,
            total: questions.length, score: 0, correct: 0, incorrect: 0, unattempted: 0,
            sections: {
                "General Knowledge": { c: 0, i: 0, u: 0, s: 0 },
                "General Science": { c: 0, i: 0, u: 0, s: 0 },
                "Maths": { c: 0, i: 0, u: 0, s: 0 },
                "Reasoning": { c: 0, i: 0, u: 0, s: 0 }
            },
            questionsData: questions, 
            answersData: userAnswers
        };

        questions.forEach((q, index) => {
            let ans = userAnswers[index];
            if (ans === undefined) { 
                resultData.unattempted++; resultData.sections[q.subject].u++; 
            } else if (ans === q.correct) { 
                resultData.correct++; 
                resultData.score += 2; // +2 Marks
                resultData.sections[q.subject].c++; 
                resultData.sections[q.subject].s += 2;
            } else { 
                resultData.incorrect++; 
                resultData.score -= 0; // 0 Negative Marking (कोई नंबर नहीं कटेगा)
                resultData.sections[q.subject].i++;
                resultData.sections[q.subject].s -= 0;
            }
        });

        resultData.accuracy = resultData.correct + resultData.incorrect > 0 ? ((resultData.correct / (resultData.correct + resultData.incorrect)) * 100).toFixed(2) : 0;
        
        // हर टेस्ट का डेटा अलग सेव करने के लिए "testNumber" को key में जोड़ें
        localStorage.setItem("myAgniveerMockTestResult_" + testNumber, JSON.stringify(resultData));
        window.location.replace("agniveer-mock-result.html?test=" + testNumber);
    }

    function togglePalette() {
        document.getElementById('palette-drawer').classList.toggle('open');
        document.getElementById('palette-overlay').classList.toggle('open');
    }

    function renderPalette() {
        const subjects = ["General Knowledge", "General Science", "Maths", "Reasoning"];
        let html = "";
        subjects.forEach(sub => {
            html += `<div class="palette-section"><h4>${sub}</h4><div class="palette-grid">`;
            questions.forEach((q, i) => {
                if(q.subject === sub) {
                    let stateClass = "";
                    if(userAnswers[i] !== undefined) stateClass = "answered";
                    if(i === currentIndex) stateClass = "current";
                    html += `<div class="q-bubble ${stateClass}" onclick="jumpToQuestion(${i})">${i+1}</div>`;
                }
            });
            html += `</div></div>`;
        });
        document.getElementById('palette-content').innerHTML = html;
    }

    function jumpToQuestion(index) {
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value);
        currentIndex = index;
        loadQuestion();
        togglePalette();
    }

    window.onload = function() { loadQuestion(); startTimer(); };
</script>
