<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agniveer Mock Test Engine</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .app-container { max-width: 600px; margin: 0 auto; background: rgba(15, 23, 42, 0.95); min-height: 100vh; color: #fff; }
        .top-header { background: #1e1b4b; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .time { font-size: 1.2rem; font-weight: bold; color: #38bdf8; }
        .q-container { padding: 20px; }
        .question-text { font-size: 1.15rem; font-weight: bold; color: #fff; margin-bottom: 20px; line-height: 1.6; }
        .option-wrapper { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; cursor: pointer; }
        .option-wrapper input { margin-right: 12px; accent-color: #38bdf8; }
        .option-text { color: #cbd5e1 !important; font-size: 1.05rem; }
        .nav-actions { display: flex; justify-content: space-between; padding: 20px; }
        .btn-nav { padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-next { background: #38bdf8; color: #0f172a; }
    </style>
</head>
<body>
   <div class="main-container">
    <div class="app-container">
        <div class="top-header">
            <div><span style="color: #94a3b8;">Test Mode:</span> <span style="color:#fff; font-weight:bold;">Agniveer GD</span></div>
            <div class="time" id="timer">60:00</div>
        </div>

        <div class="q-container">
            <div class="question-text" id="q-text">प्रश्न लोड हो रहा है...</div>
            <div id="options-block">
                </div>
        </div>

        <div class="nav-actions">
            <button class="btn-nav" style="background:rgba(255,255,255,0.1); color:#fff;" onclick="prevQuestion()">Previous</button>
            <button class="btn-nav btn-next" onclick="nextQuestion()">Save & Next</button>
        </div>
    </div>
   </div>
</body>
</html>
