<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agniveer Result Analysis Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .app-container { max-width: 600px; margin: 0 auto; background: rgba(15, 23, 42, 0.9); min-height: 100vh; border-left: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1); color: #fff; }
        .top-header { background: #111827; color: white; padding: 15px; display: flex; align-items: center; }
        .card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin: 15px; text-align: center;}
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 15px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-val { font-size: 1.2rem; font-weight: bold; }
        .val-correct { color: #22c55e; }
        .val-incorrect { color: #ef4444; }
        .sol-item { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 15px; margin-bottom: 15px; border-left: 4px solid #38bdf8; text-align: left;}
        .sol-q { font-weight: bold; font-size: 1.05rem; margin-bottom: 8px; color: #fff; }
        .sol-exp { font-size: 0.9rem; color: #cbd5e1; margin-top: 8px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>
   <div class="main-container">
    <div class="app-container">
        <div class="top-header">
            <span style="font-size:1.3rem; margin-right:15px; cursor:pointer; color:#38bdf8;" onclick="window.location.href='agniveer-mocks-page.html'">←</span>
            <span style="font-weight:bold;">Score Card & Performance Analysis</span>
        </div>

        <div class="card">
            <h3 style="color:#38bdf8;">Your Performance Summary</h3>
            <div class="stats-grid">
                <div class="stat-box"><div style="font-size:0.75rem; color:#94a3b8;">CORRECT</div><div class="stat-val val-correct" id="score-c">0</div></div>
                <div class="stat-box"><div style="font-size:0.75rem; color:#94a3b8;">INCORRECT</div><div class="stat-val val-incorrect" id="score-i">0</div></div>
                <div class="stat-box"><div style="font-size:0.75rem; color:#94a3b8;">TOTAL MARKS</div><div class="stat-val" style="color:#38bdf8;" id="score-t">0.00</div></div>
            </div>
        </div>

        <div style="padding: 15px;">
            <h3 style="color:#38bdf8; margin-bottom:15px;">Detailed Solutions</h3>
            <div id="solutions-load-area">
                <div class="sol-item">
                    <div class="sol-q">Sample Question Data ?</div>
                    <div style="font-size:0.9rem; color:#22c55e; font-weight:bold;">Correct Answer Status Loaded</div>
                    <div class="sol-exp">व्याख्या (Explanation) area elements configured correctly.</div>
                </div>
            </div>
        </div>
    </div>
   </div>
</body>
</html>
