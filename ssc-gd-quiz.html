            { subject: "Hindi", tabId: "tab-Hindi", q: "'कमल' का पर्यायवाची शब्द है:", options: ["पंकज", "जलद", "अनल", "पावक"], correct: 0, solution: "'पंकज', नीरज, सरोज, जलज - ये सभी कमल के पर्यायवाची हैं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'आकाश' का विलोम शब्द क्या होगा?", options: ["अंबर", "गगन", "पाताल", "धरती"], correct: 2, solution: "आकाश का सटीक विलोम 'पाताल' होता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'आस्तीन का सांप' मुहावरे का सही अर्थ है:", options: ["सांप पालना", "कपटपूर्ण मित्र", "खतरनाक दुश्मन", "सच्चा दोस्त"], correct: 1, solution: "'आस्तीन का सांप' का अर्थ है ऐसा व्यक्ति जो दोस्त बनकर धोखा दे (कपटपूर्ण मित्र)।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "निम्नलिखित में से शुद्ध वर्तनी वाला शब्द चुनें:", options: ["प्रज्वलित", "प्रज्ज्वलित", "परज्वलित", "प्रजवलित"], correct: 1, solution: "सही वर्तनी 'प्रज्ज्वलित' है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "वाक्यांश के लिए एक शब्द: 'जो कभी न मरे'", options: ["अजर", "अमर", "शाश्वत", "नश्वर"], correct: 1, solution: "जो कभी न मरे उसे 'अमर' कहते हैं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'विद्यालय' का सही संधि विच्छेद क्या है?", options: ["विद्य + आलय", "विद्या + आलय", "विद्य + लय", "विद्या + लय"], correct: 1, solution: "'विद्यालय' दीर्घ स्वर संधि का उदाहरण है (विद्या + आलय)।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'प्रतिदिन' शब्द में कौन सा समास है?", options: ["कर्मधारय", "बहुव्रीहि", "द्विगु", "अव्ययीभाव"], correct: 3, solution: "'प्रतिदिन' में पूर्व पद 'प्रति' एक अव्यय है, अतः यह 'अव्ययीभाव समास' है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'हवा' का पर्यायवाची शब्द है:", options: ["अनल", "पवन", "वारि", "नीरज"], correct: 1, solution: "हवा को पवन, वायु, समीर, अनिल आदि कहा जाता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'रात' का पर्यायवाची शब्द है:", options: ["दिनकर", "दिवाकर", "निशा", "प्रभाकर"], correct: 2, solution: "रात के पर्यायवाची: निशा, रजनी, रात्रि।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'अमृत' का पर्यायवाची शब्द है:", options: ["सुधा", "गरल", "विष", "पावक"], correct: 0, solution: "सुधा, पीयूष, सोम - अमृत के पर्यायवाची हैं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'आदि' का विलोम शब्द है:", options: ["शुरुआत", "प्रारंभ", "अंत", "मध्य"], correct: 2, solution: "'आदि' (शुरुआत) का विलोम 'अंत' होता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'अनुराग' का विलोम शब्द क्या है?", options: ["प्रेम", "विराग", "घृणा", "द्वेष"], correct: 1, solution: "'अनुराग' (प्रेम) का सटीक विलोम 'विराग' होता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'हाथ कंगन को आरसी क्या' लोकोक्ति का अर्थ है:", options: ["कंगन पहनना", "सुंदर दिखना", "प्रत्यक्ष को प्रमाण की आवश्यकता नहीं", "मूर्ख को समझाना"], correct: 2, solution: "इस लोकोक्ति का अर्थ है कि जो बात बिल्कुल स्पष्ट (प्रत्यक्ष) है, उसे साबित करने के लिए किसी प्रमाण की आवश्यकता नहीं होती।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'गले का हार होना' मुहावरे का अर्थ है:", options: ["महंगा होना", "बहुत प्यारा होना", "गले में दर्द होना", "रुकावट बनना"], correct: 1, solution: "गले का हार होना मतलब 'बहुत प्यारा या अत्यंत प्रिय होना'।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "इनमें से शुद्ध वाक्य पहचानें:", options: ["राम ने खाना खाया।", "राम ने खाना खाए।", "राम खाना खाया।", "राम ने खाना खाई।"], correct: 0, solution: "'खाना' पुल्लिंग है, इसलिए क्रिया भी पुल्लिंग होगी। 'राम ने खाना खाया' शुद्ध है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'सूर्य' का पर्यायवाची शब्द है:", options: ["भास्कर", "राकेश", "शशांक", "मयंक"], correct: 0, solution: "सूर्य के पर्यायवाची: दिनकर, दिवाकर, भानु, भास्कर। (बाकी चंद्रमा के हैं)।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'नयन' का सही संधि विच्छेद क्या होगा?", options: ["ने + अन", "नय + अन", "न + अयन", "नै + अन"], correct: 0, solution: "'नयन' अयादि स्वर संधि का उदाहरण है (ने + अन = नयन)।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'माता-पिता' में कौन सा समास है?", options: ["द्विगु", "बहुव्रीहि", "द्वंद्व", "कर्मधारय"], correct: 2, solution: "जहाँ दोनों पद प्रधान हों और बीच में योजक चिह्न (या 'और' का लोप) हो, वहाँ 'द्वंद्व समास' होता है (माता और पिता)।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'अंडे का शहजादा' मुहावरे का अर्थ है:", options: ["कमजोर व्यक्ति", "चालाक व्यक्ति", "अनुभवहीन व्यक्ति", "अमीर व्यक्ति"], correct: 2, solution: "अंडे का शहजादा उस व्यक्ति को कहते हैं जिसने दुनिया नहीं देखी हो, यानी 'अनुभवहीन व्यक्ति'।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'अश्व' का पर्यायवाची शब्द है:", options: ["गज", "मृग", "तुरंग", "शार्दूल"], correct: 2, solution: "'अश्व' (घोड़ा) के पर्यायवाची: तुरंग, हय, बाजि, घोटक।" }
        ]
    };

    const questions = allTestDatabase[testNumber] || allTestDatabase["1"];
    let currentIndex = 0;
    let userAnswers = {}; 
    let timeInSeconds = 60 * 60; // 60 Minutes
    let timerInterval;

    function startTimer() {
        timerInterval = setInterval(() => {
            if (timeInSeconds <= 0) { clearInterval(timerInterval); submitTest(); return; }
            timeInSeconds--;
            document.getElementById('timer').innerText = 
                Math.floor(timeInSeconds / 60).toString().padStart(2, '0') + ":" + (timeInSeconds % 60).toString().padStart(2, '0');
        }, 1000);
    }

    function loadQuestion() {
        const q = questions[currentIndex];
        document.getElementById("q-no").innerText = currentIndex + 1;
        document.getElementById("q-section-name").innerText = q.subject; 
        document.getElementById("question-text").innerText = q.q;
        
        let optionsHTML = "";
        let labels = ["A", "B", "C", "D"];
        q.options.forEach((opt, i) => {
            let isSelected = (userAnswers[currentIndex] === i) ? "selected" : "";
            let isChecked = (userAnswers[currentIndex] === i) ? "checked" : "";
            optionsHTML += `
                <label class="option-card ${isSelected}" onclick="selectOption(${i})">
                    <input type="radio" name="option" value="${i}" ${isChecked}>
                    <span class="opt-label">${labels[i]}.</span><span class="opt-text">${opt}</span>
                </label>`;
        });
        document.getElementById("options-container").innerHTML = optionsHTML;
        document.getElementById("prev-btn").style.display = (currentIndex === 0) ? "none" : "block";
        document.getElementById("next-btn").style.display = (currentIndex === questions.length - 1) ? "none" : "block";
        
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(q.tabId).classList.add('active');
        renderPalette();
    }

    function goToSection(subject) {
        let index = questions.findIndex(q => q.subject === subject);
        if(index !== -1) { 
            let selected = document.querySelector('input[name="option"]:checked');
            if(selected) userAnswers[currentIndex] = parseInt(selected.value);
            currentIndex = index; 
            loadQuestion(); 
        }
    }

    function selectOption(index) {
        document.querySelectorAll(".option-card").forEach(c => c.classList.remove("selected"));
        document.querySelectorAll('input[name="option"]').forEach(i => i.checked = false);
        document.querySelectorAll(".option-card")[index].classList.add("selected");
        document.querySelectorAll('input[name="option"]')[index].checked = true;
    }

    function clearResponse() {
        document.querySelectorAll(".option-card").forEach(c => c.classList.remove("selected"));
        document.querySelectorAll('input[name="option"]').forEach(i => i.checked = false);
        delete userAnswers[currentIndex];
        renderPalette(); 
    }

    function prevQuestion() {
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value);
        if(currentIndex > 0) { currentIndex--; loadQuestion(); }
    }

    function nextQuestion() {
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value);
        if(currentIndex < questions.length - 1) { 
            currentIndex++; loadQuestion(); 
        }
    }

    function saveAndNext() {
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value);
        
        if(currentIndex < questions.length - 1) { 
            currentIndex++; 
            loadQuestion(); 
        } else { 
            alert("यह आखिरी प्रश्न है! अब 'Submit' पर क्लिक करें।"); 
            renderPalette();
        }
    }

    function submitTest() {
        clearInterval(timerInterval);
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value); 

        let resultData = {
            testId: testNumber,
            total: questions.length, score: 0, correct: 0, incorrect: 0, unattempted: 0,
            sections: {
                "Reasoning": { c: 0, i: 0, u: 0, s: 0 },
                "General Knowledge": { c: 0, i: 0, u: 0, s: 0 },
                "Maths": { c: 0, i: 0, u: 0, s: 0 },
                "Hindi": { c: 0, i: 0, u: 0, s: 0 }
            },
            questionsData: questions, 
            answersData: userAnswers
        };

        questions.forEach((q, index) => {
            let ans = userAnswers[index];
            if (ans === undefined) { 
                resultData.unattempted++; resultData.sections[q.subject].u++; 
            } else if (ans === q.correct) { 
                resultData.correct++; 
                resultData.score += 2; // +2 Marks
                resultData.sections[q.subject].c++; 
                resultData.sections[q.subject].s += 2;
            } else { 
                resultData.incorrect++; 
                resultData.score -= 0.25; // -0.25 Negative Marking (1/8 of 2)
                resultData.sections[q.subject].i++;
                resultData.sections[q.subject].s -= 0.25;
            }
        });

        resultData.accuracy = resultData.correct + resultData.incorrect > 0 ? ((resultData.correct / (resultData.correct + resultData.incorrect)) * 100).toFixed(2) : 0;
        
        // हर टेस्ट का डेटा अलग सेव करने के लिए "testNumber" को key में जोड़ें
        localStorage.setItem("mySscGdMockTestResult_" + testNumber, JSON.stringify(resultData));
        window.location.replace("ssc-gd-mock-result.html?test=" + testNumber);
    }

    function togglePalette() {
        document.getElementById('palette-drawer').classList.toggle('open');
        document.getElementById('palette-overlay').classList.toggle('open');
    }

    function renderPalette() {
        const subjects = ["Reasoning", "General Knowledge", "Maths", "Hindi"];
        let html = "";
        subjects.forEach(sub => {
            html += `<div class="palette-section"><h4>${sub}</h4><div class="palette-grid">`;
            questions.forEach((q, i) => {
                if(q.subject === sub) {
                    let stateClass = "";
                    if(userAnswers[i] !== undefined) stateClass = "answered";
                    if(i === currentIndex) stateClass = "current";
                    html += `<div class="q-bubble ${stateClass}" onclick="jumpToQuestion(${i})">${i+1}</div>`;
                }
            });
            html += `</div></div>`;
        });
        document.getElementById('palette-content').innerHTML = html;
    }

    function jumpToQuestion(index) {
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value);
        currentIndex = index;
        loadQuestion();
        togglePalette();
    }

    window.onload = function() { loadQuestion(); startTimer(); };
</script>
