            { subject: "Maths", tabId: "tab-Maths", q: "दो रेलगाड़ियाँ, जिनकी लंबाई क्रमशः 400 मीटर और 600 मीटर है, समांतर पटरियों पर विपरीत दिशा में 52 किमी/घंटा और 38 किमी/घंटा की गति से चल रही हैं। वे एक दूसरे को पार करने में कितना समय लेंगी?", options: ["30 सेकंड", "35 सेकंड", "40 सेकंड", "45 सेकंड"], correct: 2, solution: "विपरीत दिशा में सापेक्ष गति (Relative Speed) = 52 + 38 = 90 किमी/घंटा।\nइसे मीटर/सेकंड में बदलें: 90 × 5/18 = 25 मीटर/सेकंड।\nकुल दूरी = 400 + 600 = 1000 मीटर।\nसमय = दूरी / गति = 1000 / 25 = 40 सेकंड।" },
            { subject: "Maths", tabId: "tab-Maths", q: "किसी शंकु (Cone) के छिन्नक (Frustum) के दोनों वृत्ताकार सिरों की त्रिज्याएं क्रमशः 7 सेमी और 14 सेमी हैं। यदि इसकी ऊंचाई 24 सेमी है, तो इसका आयतन क्या होगा? (π = 22/7)", options: ["8624 घन सेमी", "4312 घन सेमी", "1078 घन सेमी", "2156 घन सेमी"], correct: 0, solution: "छिन्नक के आयतन का सूत्र: V = (1/3)πh(R² + r² + Rr)\nV = (1/3) × (22/7) × 24 × (14² + 7² + 14×7)\nV = 8 × (22/7) × (196 + 49 + 98)\nV = (176/7) × 343 = 176 × 49 = 8624 घन सेमी।" },
            { subject: "Maths", tabId: "tab-Maths", q: "A और B की वर्तमान आयु का अनुपात 5:8 है। 8 वर्ष बाद, उनकी आयु का अनुपात 3:4 हो जाएगा। A की वर्तमान आयु क्या है?", options: ["15 वर्ष", "20 वर्ष", "25 वर्ष", "10 वर्ष"], correct: 3, solution: "वर्तमान अनुपात 5:8 (अंतर 3)। 8 वर्ष बाद 3:4 (अंतर 1)।\nअनुपात के अंतर को समान करने के लिए 3:4 को 3 से गुणा करें = 9:12.\nअब A: 5 से 9 हुआ (4 इकाई की वृद्धि), B: 8 से 12 हुआ (4 इकाई की वृद्धि)।\n4 इकाई = 8 वर्ष ➔ 1 इकाई = 2 वर्ष।\nA की वर्तमान आयु = 5 इकाई = 5 × 2 = 10 वर्ष।" },
            { subject: "Maths", tabId: "tab-Maths", q: "3 sin²θ + 4 cos²θ का न्यूनतम (Minimum) मान क्या होगा?", options: ["3", "4", "5", "7"], correct: 0, solution: "व्यंजक a sin²θ + b cos²θ का न्यूनतम मान a और b में से जो भी छोटा हो, वह होता है। चूँकि 3 < 4 है, अतः न्यूनतम मान 3 होगा।" },
            { subject: "Maths", tabId: "tab-Maths", q: "यदि (x - y) का 50% = (x + y) का 30% है, तो y, x का कितने प्रतिशत है?", options: ["20%", "25%", "33.33%", "40%"], correct: 1, solution: "50(x - y) = 30(x + y) ➔ 5x - 5y = 3x + 3y ➔ 2x = 8y ➔ x/y = 4/1 ➔ x=4, y=1.\nप्रतिशत = (y/x) × 100 = (1/4) × 100 = 25%." },
            { subject: "Maths", tabId: "tab-Maths", q: "3 ठोस धात्विक गोलों, जिनकी त्रिज्याएं क्रमशः 3 सेमी, 4 सेमी और 5 सेमी हैं, को पिघलाकर एक नया बड़ा ठोस गोला बनाया जाता है। नए गोले की त्रिज्या क्या होगी?", options: ["6 सेमी", "7 सेमी", "8 सेमी", "12 सेमी"], correct: 0, solution: "नए गोले का आयतन = तीनों गोलों के आयतनों का योग।\n(4/3)πR³ = (4/3)π(3³ + 4³ + 5³) ➔ R³ = 27 + 64 + 125 = 216 ➔ R = 6 सेमी।" },
            { subject: "Maths", tabId: "tab-Maths", q: "₹4500 को A, B, C में इस प्रकार बांटा गया है कि A : B = 2 : 3 और B : C = 6 : 5 है। C का हिस्सा ज्ञात करें।", options: ["₹1000", "₹1200", "₹1500", "₹1800"], correct: 2, solution: "A:B = 2:3 (इसे 2 से गुणा करें ➔ 4:6) और B:C = 6:5.\nअतः A:B:C = 4:6:5.\nकुल अनुपात = 4+6+5 = 15 इकाई = ₹4500 ➔ 1 इकाई = ₹300.\nC का हिस्सा = 5 इकाई = 5 × 300 = ₹1500." },
            { subject: "Maths", tabId: "tab-Maths", q: "एक समबाहु त्रिभुज (Equilateral triangle) के अंदर एक बिंदु से तीनों भुजाओं पर डाले गए लम्बों की लंबाई क्रमशः √3, 2√3 और 5√3 सेमी है। त्रिभुज का क्षेत्रफल क्या है?", options: ["64√3", "48√3", "36√3", "72√3"], correct: 0, solution: "समबाहु त्रिभुज की ऊंचाई (h) = लम्बों का योग = √3 + 2√3 + 5√3 = 8√3 सेमी।\nऊंचाई h = (√3/2)a ➔ 8√3 = (√3/2)a ➔ a = 16 सेमी।\nक्षेत्रफल = (√3/4)a² = (√3/4) × 16 × 16 = 64√3 वर्ग सेमी।" },
            { subject: "Maths", tabId: "tab-Maths", q: "x + y + z = 10 और x² + y² + z² = 30 है, तो xy + yz + zx का मान क्या होगा?", options: ["35", "40", "45", "50"], correct: 0, solution: "बीजगणित सर्वसमिका: (x+y+z)² = x² + y² + z² + 2(xy + yz + zx)\n(10)² = 30 + 2(xy + yz + zx)\n100 - 30 = 2(xy + yz + zx) ➔ 70 = 2(xy + yz + zx) ➔ xy + yz + zx = 35." },
            { subject: "Maths", tabId: "tab-Maths", q: "दो पाइप किसी टंकी को क्रमशः 15 और 20 घंटे में भर सकते हैं, और तीसरा पाइप उसे 30 घंटे में खाली कर सकता है। यदि तीनों को एक साथ खोल दिया जाए, तो खाली टंकी कितने घंटे में भरेगी?", options: ["10 घंटे", "12 घंटे", "15 घंटे", "20 घंटे"], correct: 1, solution: "कुल कार्य (LCM) = 60 यूनिट। \nक्षमता: A = +4, B = +3, C = -2.\nतीनों की कुल क्षमता = 4 + 3 - 2 = 5 यूनिट/घंटा।\nटंकी भरने में लगा समय = 60 / 5 = 12 घंटे।" },
            { subject: "Maths", tabId: "tab-Maths", q: "8 क्रमिक सम संख्याओं (Consecutive even numbers) का औसत 65 है। सबसे बड़ी और सबसे छोटी संख्या का अंतर क्या है?", options: ["10", "12", "14", "16"], correct: 2, solution: "n क्रमिक सम/विषम संख्याओं में सबसे बड़ी और सबसे छोटी संख्या का अंतर हमेशा (n-1) × 2 होता है।\nयहाँ n = 8 है, तो अंतर = (8-1) × 2 = 7 × 2 = 14." },
            { subject: "Maths", tabId: "tab-Maths", q: "यदि a/b = 2/3 और b/c = 4/5 है, तो (a+b)/(b+c) का मान क्या होगा?", options: ["20/27", "10/27", "27/20", "14/27"], correct: 0, solution: "अनुपात को मिलाएं: a:b = 8:12, b:c = 12:15 ➔ a:b:c = 8:12:15.\n(a+b)/(b+c) = (8+12) / (12+15) = 20 / 27." },
            { subject: "Maths", tabId: "tab-Maths", q: "दो वृत्तों के क्षेत्रफलों का अनुपात 16:25 है। उनकी परिधियों (Circumferences) का अनुपात क्या होगा?", options: ["4:5", "16:25", "256:625", "2:5"], correct: 0, solution: "क्षेत्रफलों का अनुपात = r₁² / r₂² = 16/25 ➔ त्रिज्याओं का अनुपात (r₁/r₂) = 4/5.\nपरिधियों का अनुपात त्रिज्याओं के अनुपात के बराबर होता है, अतः 4:5 होगा।" },
            { subject: "Maths", tabId: "tab-Maths", q: "3 की घात 25 + 3 की घात 26 + 3 की घात 27 + 3 की घात 28, निम्नलिखित में से किस संख्या से पूर्णतः विभाज्य है?", options: ["11", "16", "30", "40"], correct: 3, solution: "व्यंजक = 3²⁵ (1 + 3¹ + 3² + 3³) = 3²⁵ (1 + 3 + 9 + 27) = 3²⁵ × 40. \nचूँकि 40 इसका एक गुणनखंड है, इसलिए यह संख्या 40 से पूर्णतः विभाज्य है।" },
            { subject: "Maths", tabId: "tab-Maths", q: "₹8400 की एक राशि साधारण ब्याज पर 3 वर्षों में ₹10416 हो जाती है। उसी ब्याज दर पर ₹10000 की राशि 2 वर्षों में कितनी हो जाएगी?", options: ["₹11600", "₹11800", "₹12000", "₹12200"], correct: 0, solution: "3 वर्ष का ब्याज = 10416 - 8400 = ₹2016 ➔ 1 वर्ष का ब्याज = ₹672.\nदर (R) = (672 / 8400) × 100 = 8%.\n₹10000 पर 8% की दर से 2 वर्ष का साधारण ब्याज = (10000 × 8 × 2) / 100 = ₹1600.\nकुल राशि (मिश्रधन) = 10000 + 1600 = ₹11600." },
            { subject: "Maths", tabId: "tab-Maths", q: "किसी आयत का परिमाप 50 सेमी है और इसके विकर्ण की लंबाई 17 सेमी है। आयत का क्षेत्रफल क्या होगा?", options: ["120 वर्ग सेमी", "144 वर्ग सेमी", "168 वर्ग सेमी", "160 वर्ग सेमी"], correct: 2, solution: "परिमाप = 2(L+B) = 50 ➔ L+B = 25.\nविकर्ण = √(L²+B²) = 17 ➔ L²+B² = 289.\nसूत्र: (L+B)² = L² + B² + 2LB ➔ (25)² = 289 + 2(Area) ➔ 625 - 289 = 2(Area) ➔ 336 = 2(Area) ➔ Area = 168 वर्ग सेमी।" },
            { subject: "Maths", tabId: "tab-Maths", q: "12 और 18 का तृतीय आनुपातिक (Third proportional) क्या है?", options: ["24", "27", "30", "36"], correct: 1, solution: "तृतीय आनुपातिक (c) का सूत्र: b² / a\nयहाँ a = 12, b = 18. \nc = (18 × 18) / 12 = 324 / 12 = 27." },

            { subject: "Hindi", tabId: "tab-Hindi", q: "'अधित्यका' का सटीक विलोम शब्द क्या है?", options: ["उपत्यका", "पर्वत", "घाटी", "समतल"], correct: 0, solution: "'अधित्यका' का अर्थ पहाड़ के ऊपर की समतल भूमि होता है, जबकि इसका सटीक विलोम 'उपत्यका' (पहाड़ के नीचे की तलहटी/घाटी) होता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'षडानन' शब्द का सही संधि विच्छेद क्या होगा?", options: ["षड् + आनन", "षट् + आनन", "षट + नन", "षडा + नन"], correct: 1, solution: "'षडानन' का सही संधि विच्छेद 'षट् + आनन' है। यह 'व्यंजन संधि' का उदाहरण है जहाँ प्रथम वर्ण 'ट्' अपने ही वर्ग के तीसरे वर्ण 'ड्' में बदल जाता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'उरग' किसका पर्यायवाची शब्द है?", options: ["पक्षी", "हिरण", "सांप", "कमल"], correct: 2, solution: "'उरग' का अर्थ होता है छाती (उर) के बल गमन करने वाला। यह 'सांप' (सर्प, भुजंग, विषधर) का प्रसिद्ध पर्यायवाची है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'जिसके पास कुछ भी न हो' वाक्यांश के लिए एक शब्द है:", options: ["दरिद्र", "अकिंचन", "निर्धन", "गरीब"], correct: 1, solution: "जिसके पास कुछ भी (कोई धन-संपत्ति) न हो, उसके लिए सबसे सटीक और साहित्यिक एक शब्द 'अकिंचन' होता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'गूलर का फूल होना' मुहावरे का सही अर्थ क्या है?", options: ["बहुत सुंदर होना", "दुर्लभ होना (दिखाई न देना)", "मूर्ख होना", "अत्यधिक क्रोधित होना"], correct: 1, solution: "चूँकि गूलर के पेड़ में फूल आसानी से दिखाई नहीं देते, इसलिए 'गूलर का फूल होना' मुहावरे का अर्थ है 'दुर्लभ होना' या बहुत दिनों तक दिखाई न देना।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'यथाशीघ्र' शब्द में कौन सा समास है?", options: ["तत्पुरुष", "द्विगु", "अव्ययीभाव", "बहुव्रीहि"], correct: 2, solution: "'यथाशीघ्र' (जितना शीघ्र हो सके) में पूर्व पद 'यथा' एक अव्यय (अविकारी शब्द) है, इसलिए यह 'अव्ययीभाव समास' का उदाहरण है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "निम्नलिखित में से शुद्ध वर्तनी वाला शब्द चुनें:", options: ["कवित्री", "कवयित्री", "कवियत्री", "कवयीत्री"], correct: 1, solution: "'कवि' का शुद्ध स्त्रीलिंग रूप 'कवयित्री' होता है। एसएससी और अन्य परीक्षाओं में यह सबसे ज्यादा पूछा जाने वाला शब्द है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'मृगेंद्र' किसका पर्यायवाची है?", options: ["हिरण", "शेर (शार्दूल)", "हाथी", "सांप"], correct: 1, solution: "'मृगेंद्र' (मृगों या पशुओं का राजा) 'शेर' (Lion / सिंह, शार्दूल, केसरी) का पर्यायवाची है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'अतिवृष्टि' का विलोम शब्द है:", options: ["अनावृष्टि", "न्यूनवृष्टि", "सूखा", "बंजर"], correct: 0, solution: "'अतिवृष्टि' (अत्यधिक वर्षा होना) का सटीक विलोम 'अनावृष्टि' (बिल्कुल वर्षा न होना) होता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "इनमें से कौन सा शब्द 'पुल्लिंग' नहीं है?", options: ["पानी", "हाथी", "दही", "नदी"], correct: 3, solution: "हिंदी व्याकरण में पानी, हाथी, दही (इकारांत होने के बावजूद) पुल्लिंग (Masculine) शब्द माने जाते हैं। 'नदी' एक स्त्रीलिंग (Feminine) शब्द है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'कान काटना' मुहावरे का अर्थ है:", options: ["चतुर होना (मात देना)", "बहरा होना", "शिकायत करना", "दर्द होना"], correct: 0, solution: "'कान काटना' मुहावरे का अर्थ है किसी को चालाकी या बुद्धिमानी में 'मात देना' या बहुत 'चतुर होना'।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'पीतांबर' में कौन सा समास है?", options: ["कर्मधारय", "बहुव्रीहि", "द्विगु", "तत्पुरुष"], correct: 1, solution: "'पीतांबर' (पीला है अंबर/वस्त्र जिसका) विशेष रूप से भगवान विष्णु या कृष्ण के लिए प्रयुक्त होता है, अतः यहाँ 'बहुव्रीहि समास' प्रमुख है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "निम्नलिखित में से 'तद्भव' शब्द पहचानें:", options: ["अग्नि", "मयूर", "आँख", "कर्ण"], correct: 2, solution: "'आँख' एक तद्भव (हिंदी) शब्द है, जिसका संस्कृत (तत्सम) रूप 'अक्षि' होता है। अग्नि, मयूर और कर्ण तत्सम शब्द हैं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'जंगल में लगने वाली आग' को क्या कहते हैं?", options: ["दावानल", "बड़वानल", "जठरानल", "अनल"], correct: 0, solution: "जंगल की आग को 'दावानल' (या दावाग्नि), समुद्र की आग को 'बड़वानल', और पेट की आग (भूख) को 'जठरानल' कहते हैं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'तरनि तनूजा तट तमाल तरुवर बहु छाए' - इस पंक्ति में कौन सा अलंकार है?", options: ["यमक", "उपमा", "अनुप्रास", "श्लेष"], correct: 2, solution: "इस पंक्ति में 'त' वर्ण की बार-बार आवृत्ति (Repetition) हो रही है। जहाँ एक ही वर्ण बार-बार आए, वहाँ 'अनुप्रास अलंकार' होता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "शुद्ध वाक्य का चयन करें:", options: ["मेरे को बाजार जाना है।", "मुझे बाजार जाना है।", "मुझको बाजार जाना है।", "अपुन को बाजार जाना है।"], correct: 1, solution: "व्याकरण की दृष्टि से 'मुझे बाजार जाना है' पूर्णतः शुद्ध वाक्य है। सर्वनाम के साथ 'को' (मेरे को) का प्रयोग अशुद्ध माना जाता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'पाश्चात्य' का विलोम शब्द क्या है?", options: ["पौर्वात्य", "पूर्वी", "नवीन", "आधुनिक"], correct: 0, solution: "'पाश्चात्य' (पश्चिमी देशों से संबंधित) का शुद्ध विलोम 'पौर्वात्य' (पूर्वी देशों से संबंधित) होता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'मनोरथ' का संधि विच्छेद क्या होगा?", options: ["मनो + रथ", "मन: + रथ", "मन + ओरथ", "मना + रथ"], correct: 1, solution: "'मनोरथ' का सही संधि विच्छेद 'मनः + रथ' होता है। यह 'विसर्ग संधि' का एक बहुत ही महत्वपूर्ण उदाहरण है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "जो कभी बूढ़ा न हो, उसे क्या कहते हैं?", options: ["अमर", "अजर", "तरुण", "युवा"], correct: 1, solution: "जो कभी मरे न उसे 'अमर' कहते हैं, और जो कभी बूढ़ा न हो (जिस पर जरा/बुढ़ापा न आए) उसे 'अजर' कहते हैं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'आग में घी डालना' मुहावरे का सही अर्थ है:", options: ["हवन करना", "क्रोध को और अधिक भड़काना", "शांति स्थापित करना", "महंगी वस्तु बर्बाद करना"], correct: 1, solution: "'आग में घी डालना' मुहावरे का अर्थ है किसी विवाद या किसी व्यक्ति के 'क्रोध को और अधिक भड़काना'।" }
        ],
        "4": [
            // ================= 20 REASONING - TEST 4 =================
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "उस विकल्प का चयन करें जो तीसरे शब्द से उसी प्रकार संबंधित है जैसे दूसरा शब्द पहले शब्द से संबंधित है: \nकुत्ता : भौंकना :: शेर : ?", options: ["रंभाना", "हिनहिनाना", "दहाड़ना", "मिमियाना"], correct: 2, solution: "जिस प्रकार कुत्ते की आवाज़ को 'भौंकना' कहते हैं, उसी प्रकार शेर की आवाज़ को 'दहाड़ना' कहते हैं।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एक निश्चित कूट भाषा में 'BOOK' को 'CPPL' लिखा जाता है, तो उसी भाषा में 'READ' को क्या लिखा जाएगा?", options: ["SDBE", "SFBE", "SFCE", "QZZC"], correct: 1, solution: "यहाँ प्रत्येक अक्षर में अंग्रेजी वर्णमाला का अगला अक्षर (+1) लिखा गया है। B(+1)=C, O(+1)=P, O(+1)=P, K(+1)=L। इसी प्रकार R(+1)=S, E(+1)=F, A(+1)=B, D(+1)=E ➔ SFBE।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "दी गई शृंखला में अगला पद ज्ञात करें: 2, 5, 10, 17, 26, ?", options: ["35", "37", "39", "41"], correct: 1, solution: "पैटर्न (अंतर): +3, +5, +7, +9... अगला अंतर +11 होगा। अतः 26 + 11 = 37।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "विषम शब्द चुनें (Find the odd one out):", options: ["आलू", "गाजर", "मूली", "टमाटर"], correct: 3, solution: "आलू, गाजर और मूली तीनों ज़मीन के अंदर (जड़/तना) उगते हैं, जबकि टमाटर ज़मीन के ऊपर पौधे पर उगता है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "A, B की माँ है। C, A का पुत्र है। D, E का भाई है। E, B की पुत्री है। B, F का भाई है। D की दादी कौन है?", options: ["A", "B", "C", "F"], correct: 0, solution: "D और E भाई-बहन हैं और वे B के बच्चे हैं। B की माँ A है। अतः B के बच्चों (D और E) की दादी 'A' होगी।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एक व्यक्ति उत्तर की ओर 5 किमी चलता है, फिर दाईं ओर मुड़कर 3 किमी चलता है, और फिर दाईं ओर मुड़कर 5 किमी चलता है। वह प्रारंभिक बिंदु से किस दिशा में है?", options: ["उत्तर", "दक्षिण", "पूर्व", "पश्चिम"], correct: 2, solution: "व्यक्ति 5 किमी उत्तर गया, फिर दाएँ (पूर्व) मुड़कर 3 किमी गया, फिर दाएँ (दक्षिण) मुड़कर 5 किमी गया। अब वह अपने शुरुआती बिंदु के ठीक 3 किमी 'पूर्व' (East) में है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "कथन: सभी पेन कॉपी हैं। कुछ कॉपी किताबें हैं।\nनिष्कर्ष: 1. कुछ पेन किताबें हैं। 2. कुछ कॉपी पेन हैं।", options: ["केवल 1 सही है", "केवल 2 सही है", "दोनों सही हैं", "कोई सही नहीं है"], correct: 1, solution: "चूँकि 'सभी पेन कॉपी हैं', इसका अर्थ है कि 'कुछ कॉपी (जो पेन का हिस्सा हैं) पेन हैं'। अतः निष्कर्ष 2 सही है। पेन और किताब में कोई सीधा संबंध नहीं दिया गया है (निष्कर्ष 1 गलत है)।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "वेन आरेख चुनें: 'भारत, एशिया, विश्व'", options: ["तीनों अलग वृत्त", "तीनों एक दूसरे को काटते हैं", "एक के अंदर दूसरा और दूसरे के अंदर तीसरा", "दो एक के अंदर और एक बाहर"], correct: 2, solution: "भारत 'एशिया' महाद्वीप के अंदर है, और एशिया 'विश्व' (World) के अंदर है। इसलिए एक के अंदर एक वाले तीन संकेंद्रित (Concentric) वृत्त सही होंगे।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "यदि '+' का अर्थ 'x', '-' का अर्थ '÷', 'x' का अर्थ '-' और '÷' का अर्थ '+' है, तो 8 + 4 - 2 ÷ 6 x 3 = ?", options: ["16", "18", "19", "22"], correct: 2, solution: "चिह्न बदलने पर: 8 x 4 ÷ 2 + 6 - 3। BODMAS से: 8 x 2 + 6 - 3 => 16 + 6 - 3 => 22 - 3 = 19।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "5 मित्र एक पंक्ति में दक्षिण की ओर मुख करके बैठे हैं। A, B के ठीक दाएँ है। C, D के ठीक बाएँ है। E पंक्ति के एकदम बाएँ छोर पर है। B और C पड़ोसी हैं। मध्य में कौन बैठा है?", options: ["A", "B", "C", "D"], correct: 1, solution: "दक्षिण की ओर मुख होने पर दायां-बायां उल्टा हो जाता है (हमारा बायां उनका दायां)। व्यवस्था (हमेशा के अनुसार बाएँ से दाएँ): E, A, B, C, D. अतः ठीक बीच में B बैठा है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एक पासे की दो स्थितियों में 2, 4, 6 और 2, 3, 5 दिखाई देते हैं। '6' के विपरीत कौन सा अंक होगा?", options: ["1", "3", "4", "5"], correct: 2, solution: "2 कॉमन है। 2 से क्लॉकवाइज: 2-4-6 और 2-3-5। अतः 4 के विपरीत 3 और 6 के विपरीत 5 होगा।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "शब्दों को डिक्शनरी के क्रम में व्यवस्थित करें: 1. River 2. Rider 3. Right 4. Ring", options: ["2, 3, 4, 1", "2, 4, 3, 1", "3, 2, 4, 1", "2, 3, 1, 4"], correct: 0, solution: "डिक्शनरी क्रम: Ri(d)er, Ri(g)ht, Ri(n)g, Ri(v)er ➔ 2, 3, 4, 1." },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एनालॉजी: 5 : 125 :: 6 : ?", options: ["216", "36", "256", "180"], correct: 0, solution: "यह घनों (Cubes) का पैटर्न है: 5³ = 125। इसी प्रकार 6³ = 216।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "अक्षर शृंखला: Z, X, V, T, ?", options: ["S", "R", "Q", "P"], correct: 1, solution: "पैटर्न: हर बार -2 हो रहा है। Z(26), X(24), V(22), T(20)। अगला T - 2 = R(18) होगा।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "लुप्त संख्या ज्ञात करें: 1, 4, 9, 16, 25, ?", options: ["30", "35", "36", "49"], correct: 2, solution: "यह प्राकृतिक संख्याओं के वर्गों की शृंखला है: 1², 2², 3², 4², 5²। अतः अगला 6² = 36 होगा।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "यदि एक दर्पण को दाईं ओर रखा जाए, तो 'CAT' का दर्पण प्रतिबिंब कैसा होगा?", options: ["TAC", "TAC (T और C उल्टे)", "CAT (उल्टा)", "ATC"], correct: 1, solution: "दर्पण प्रतिबिंब में दायाँ-बायाँ पलट जाता है। T समान रहेगा, A समान रहेगा, लेकिन C उल्टा हो जाएगा। (TAC के रूप में, जहाँ C का मुँह बाईं ओर होगा)।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "किसी भाषा में P=16, A=1, N=14 है, तो PAN का कुल मान क्या होगा?", options: ["30", "31", "32", "33"], correct: 1, solution: "अक्षरों के मानों का योग: 16 + 1 + 14 = 31." },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "शृंखला: 10, 20, 40, 80, ?", options: ["100", "120", "160", "200"], correct: 2, solution: "पैटर्न: हर अगली संख्या को 2 से गुणा किया जा रहा है (×2)। 80 × 2 = 160." },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "असंगत का चयन करें (Find the odd letters):", options: ["AE", "IM", "OU", "BD"], correct: 3, solution: "A और E, I और M, O और U के बीच 3 अक्षरों का अंतर है (Vowels का पैटर्न भी देख सकते हैं)। लेकिन BD के बीच केवल 1 अक्षर का अंतर है और दोनों व्यंजन (Consonants) हैं।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "A, B से लंबा है। C, A से लंबा है। D, C से लंबा है। E सबसे लंबा है। सबसे छोटा कौन है?", options: ["A", "B", "C", "D"], correct: 1, solution: "लंबाई का क्रम (छोटे से बड़े): B < A < C < D < E। अतः सबसे छोटा B है।" },

            // ================= 20 GK/GS - TEST 4 =================
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारत का राष्ट्रीय आदर्श वाक्य 'सत्यमेव जयते' कहाँ से लिया गया है?", options: ["ऋग्वेद", "कठोपनिषद", "मुंडकोपनिषद", "भगवद गीता"], correct: 2, solution: "'सत्यमेव जयते' (सत्य की हमेशा जीत होती है) अथर्ववेद के 'मुंडकोपनिषद' से लिया गया है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "'आर्य समाज' की स्थापना किसने की थी?", options: ["राजा राममोहन राय", "स्वामी दयानंद सरस्वती", "स्वामी विवेकानंद", "ईश्वर चंद्र विद्यासागर"], correct: 1, solution: "'आर्य समाज' की स्थापना 1875 में स्वामी दयानंद सरस्वती ने बंबई में की थी।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारत की सबसे बड़ी मीठे पानी की झील कौन सी है?", options: ["चिल्का", "वुलर", "लोकटक", "डल"], correct: 1, solution: "भारत की सबसे बड़ी मीठे पानी की झील 'वुलर झील' है, जो जम्मू-कश्मीर में स्थित है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "नाबार्ड (NABARD) की स्थापना किस वर्ष हुई थी?", options: ["1980", "1982", "1990", "1992"], correct: 1, solution: "नाबार्ड (राष्ट्रीय कृषि और ग्रामीण विकास बैंक) की स्थापना 12 जुलाई 1982 को शिवरमन समिति की सिफारिश पर हुई थी।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "राज्यसभा के सदस्यों का कार्यकाल कितने वर्ष का होता है?", options: ["4 वर्ष", "5 वर्ष", "6 वर्ष", "आजीवन"], correct: 2, solution: "राज्यसभा एक स्थायी सदन है, लेकिन इसके सदस्यों का कार्यकाल 6 वर्ष का होता है और हर 2 वर्ष में एक तिहाई सदस्य सेवानिवृत्त हो जाते हैं।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "प्राचीन भारत में 'भारत का नेपोलियन' किसे कहा जाता था?", options: ["चंद्रगुप्त मौर्य", "समुद्रगुप्त", "अशोक", "हर्षवर्धन"], correct: 1, solution: "गुप्त वंश के शक्तिशाली शासक 'समुद्रगुप्त' को उनकी सैन्य विजयों के कारण इतिहासकार वी.ए. स्मिथ ने 'भारत का नेपोलियन' कहा था।" },

            { subject: "General Knowledge", tabId: "tab-GK", q: "मानव शरीर की सबसे बड़ी हड्डी कौन सी है?", options: ["स्टेपीज़", "फीमर (Femur)", "टिबिया", "रेडियस"], correct: 1, solution: "जांघ में पाई जाने वाली 'फीमर' (Femur) मानव शरीर की सबसे लंबी और बड़ी हड्डी है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "'यक्षगान' (Yakshagana) किस राज्य का प्रसिद्ध लोक नृत्य है?", options: ["तमिलनाडु", "कर्नाटक", "आंध्र प्रदेश", "केरल"], correct: 1, solution: "'यक्षगान' दक्षिण भारत के 'कर्नाटक' राज्य का एक पारंपरिक और बहुत लोकप्रिय थिएटर नृत्य रूप है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "विश्व जल दिवस (World Water Day) कब मनाया जाता है?", options: ["22 मार्च", "22 अप्रैल", "5 जून", "11 जुलाई"], correct: 0, solution: "जल संरक्षण के महत्व को समझाने के लिए हर साल '22 मार्च' को विश्व जल दिवस मनाया जाता है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "महात्मा गांधी ने 'दांडी मार्च' (नमक सत्याग्रह) की शुरुआत किस वर्ष की थी?", options: ["1920", "1922", "1930", "1942"], correct: 2, solution: "गांधीजी ने 12 मार्च 1930 को साबरमती आश्रम से 'दांडी मार्च' की शुरुआत की और 6 अप्रैल को नमक कानून तोड़ा।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "पृथ्वी के वायुमंडल में किस गैस का प्रतिशत सर्वाधिक है?", options: ["ऑक्सीजन", "कार्बन डाइऑक्साइड", "नाइट्रोजन", "आर्गन"], correct: 2, solution: "पृथ्वी के वायुमंडल में सबसे अधिक मात्रा में 'नाइट्रोजन' (लगभग 78%) पाई जाती है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "विटामिन D की कमी से बच्चों में कौन सा रोग होता है?", options: ["स्कर्वी", "रतौंधी", "रिकेट्स (सूखा रोग)", "बेरी-बेरी"], correct: 2, solution: "विटामिन D की कमी से हड्डियों का विकास रुक जाता है और 'रिकेट्स' (सूखा रोग) हो जाता है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारत का सबसे ऊँचा 'टिहरी बांध' किस नदी पर बना है?", options: ["गंगा", "भागीरथी", "यमुना", "सतलुज"], correct: 1, solution: "उत्तराखंड में स्थित 'टिहरी बांध' भारत का सबसे ऊँचा बांध है, जो 'भागीरथी' और भिलंगना नदी के संगम पर बना है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "लोकसभा का सदस्य बनने के लिए न्यूनतम आयु कितनी होनी चाहिए?", options: ["21 वर्ष", "25 वर्ष", "30 वर्ष", "35 वर्ष"], correct: 1, solution: "संविधान के अनुसार लोकसभा का चुनाव लड़ने (सांसद बनने) के लिए न्यूनतम आयु 25 वर्ष होनी चाहिए।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "कंप्यूटर का मस्तिष्क (Brain of Computer) किसे कहा जाता है?", options: ["RAM", "ROM", "CPU", "Hard Disk"], correct: 2, solution: "CPU (Central Processing Unit) को कंप्यूटर का मस्तिष्क कहा जाता है क्योंकि यह सभी गणनाएं और कार्य करता है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "सूर्य के प्रकाश को पृथ्वी तक पहुँचने में लगभग कितना समय लगता है?", options: ["5 मिनट", "8 मिनट 16 सेकंड", "10 मिनट", "12 मिनट"], correct: 1, solution: "सूर्य और पृथ्वी की दूरी के कारण सूर्य के प्रकाश को पृथ्वी तक आने में लगभग 8 मिनट 16 से 20 सेकंड लगते हैं।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारतीय रिज़र्व बैंक (RBI) का मुख्यालय कहाँ स्थित है?", options: ["दिल्ली", "कोलकाता", "चेन्नई", "मुंबई"], correct: 3, solution: "भारतीय रिज़र्व बैंक (RBI) का मुख्यालय 'मुंबई' (महाराष्ट्र) में स्थित है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "'मोहिनीअट्टम' शास्त्रीय नृत्य किस राज्य से संबंधित है?", options: ["तमिलनाडु", "केरल", "कर्नाटक", "ओडिशा"], correct: 1, solution: "'मोहिनीअट्टम' और 'कथकली' दोनों शास्त्रीय नृत्य 'केरल' राज्य से संबंधित हैं।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारत की खोज (Discovery of India) नामक प्रसिद्ध पुस्तक के लेखक कौन हैं?", options: ["महात्मा गांधी", "जवाहरलाल नेहरू", "अब्दुल कलाम आज़ाद", "डॉ. राजेंद्र प्रसाद"], correct: 1, solution: "'द डिस्कवरी ऑफ इंडिया' पुस्तक भारत के प्रथम प्रधानमंत्री जवाहरलाल नेहरू ने अहमदनगर जेल में लिखी थी।" },

            { subject: "Maths", tabId: "tab-Maths", q: "A किसी काम को 10 दिन में और B उसी काम को 15 दिन में पूरा कर सकता है। दोनों मिलकर उस काम को कितने दिन में पूरा करेंगे?", options: ["5 दिन", "6 दिन", "8 दिन", "9 दिन"], correct: 1, solution: "A का 1 दिन का काम = 1/10, B का = 1/15। दोनों का = 1/10 + 1/15 = (3+2)/30 = 5/30 = 1/6। अतः दोनों मिलकर 6 दिन में काम पूरा करेंगे।" },
            { subject: "Maths", tabId: "tab-Maths", q: "400 का 15% कितना होगा?", options: ["40", "60", "80", "100"], correct: 1, solution: "400 का 15% = 400 × (15/100) = 4 × 15 = 60।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक वस्तु को 500 रुपये में खरीदकर 600 रुपये में बेचा गया। लाभ प्रतिशत ज्ञात करें।", options: ["10%", "15%", "20%", "25%"], correct: 2, solution: "क्रय मूल्य (CP) = 500, विक्रय मूल्य (SP) = 600। लाभ = 100। लाभ % = (100 / 500) × 100 = 20%।" },
            { subject: "Maths", tabId: "tab-Maths", q: "72 किमी/घंटा की गति को मीटर/सेकंड (m/s) में बदलें।", options: ["15 मी/से", "18 मी/से", "20 मी/से", "25 मी/से"], correct: 2, solution: "किमी/घंटा को मी/से में बदलने के लिए 5/18 से गुणा करते हैं। 72 × (5/18) = 4 × 5 = 20 मी/से।" },
            { subject: "Maths", tabId: "tab-Maths", q: "प्रथम 10 सम संख्याओं (Even numbers) का औसत क्या होगा?", options: ["10", "11", "12", "15"], correct: 1, solution: "प्रथम 'n' सम संख्याओं का औसत हमेशा (n + 1) होता है। अतः प्रथम 10 सम संख्याओं का औसत 10 + 1 = 11 होगा।" },
            { subject: "Maths", tabId: "tab-Maths", q: "1000 रुपये पर 10% वार्षिक दर से 2 वर्ष का चक्रवृद्धि ब्याज (CI) क्या होगा?", options: ["200 रु", "210 रु", "220 रु", "250 रु"], correct: 1, solution: "मिश्रधन (A) = P(1+R/100)² = 1000(110/100)² = 1000 × 1.21 = 1210 रुपये। CI = 1210 - 1000 = 210 रुपये।" },
            { subject: "Maths", tabId: "tab-Maths", q: "दो संख्याओं का अनुपात 3:4 है और उनका योग 70 है। उनमें से छोटी संख्या क्या होगी?", options: ["20", "30", "40", "50"], correct: 1, solution: "अनुपातों का योग = 3+4 = 7 यूनिट = 70। 1 यूनिट = 10। छोटी संख्या = 3 यूनिट = 3 × 10 = 30।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक वर्ग (Square) का परिमाप 40 मीटर है। उसका क्षेत्रफल क्या होगा?", options: ["40 वर्ग मी", "80 वर्ग मी", "100 वर्ग मी", "160 वर्ग मी"], correct: 2, solution: "वर्ग का परिमाप = 4 × भुजा = 40 ➔ भुजा = 10 मी। क्षेत्रफल = भुजा × भुजा = 10 × 10 = 100 वर्ग मीटर।" },
            { subject: "Maths", tabId: "tab-Maths", q: "12, 15 और 20 का लघुत्तम समापवर्त्य (LCM) क्या होगा?", options: ["30", "45", "60", "120"], correct: 2, solution: "12, 15 और 20 के पहाड़े में सबसे पहले आने वाली कॉमन संख्या 60 है।" },
            { subject: "Maths", tabId: "tab-Maths", q: "4 और 16 का मध्यानुपाती (Mean proportional) क्या होगा?", options: ["8", "10", "12", "64"], correct: 0, solution: "मध्यानुपाती का सूत्र = √(a × b)। अतः √(4 × 16) = √64 = 8।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक वस्तु के अंकित मूल्य 1000 रु पर 20% की छूट दी जाती है। उसका विक्रय मूल्य क्या होगा?", options: ["700 रु", "800 रु", "850 रु", "900 रु"], correct: 1, solution: "छूट = 1000 का 20% = 200 रुपये। विक्रय मूल्य = 1000 - 200 = 800 रुपये।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक 200 मीटर लंबी ट्रेन एक खंभे को 10 सेकंड में पार करती है। ट्रेन की गति क्या है?", options: ["10 मी/से", "15 मी/से", "20 मी/से", "25 मी/से"], correct: 2, solution: "गति = दूरी/समय = 200/10 = 20 मीटर/सेकंड। (यह 72 किमी/घंटा के बराबर है)।" },
            { subject: "Maths", tabId: "tab-Maths", q: "18, 24 और 36 का महत्तम समापवर्तक (HCF) क्या होगा?", options: ["3", "4", "6", "12"], correct: 2, solution: "वह सबसे बड़ी संख्या जो 18, 24 और 36 तीनों को पूरी तरह काट दे, वह 6 है।" },
            { subject: "Maths", tabId: "tab-Maths", q: "5 आदमी किसी काम को 10 दिन में कर सकते हैं। 10 आदमी उसी काम को कितने दिन में करेंगे?", options: ["2 दिन", "4 दिन", "5 दिन", "6 दिन"], correct: 2, solution: "M1 × D1 = M2 × D2 ➔ 5 × 10 = 10 × D2 ➔ 50 = 10 × D2 ➔ D2 = 5 दिन।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक वृत्त (Circle) की त्रिज्या 7 सेमी है। उसका क्षेत्रफल क्या होगा? (π = 22/7)", options: ["44 वर्ग सेमी", "88 वर्ग सेमी", "154 वर्ग सेमी", "308 वर्ग सेमी"], correct: 2, solution: "वृत्त का क्षेत्रफल = πr² = (22/7) × 7 × 7 = 22 × 7 = 154 वर्ग सेमी।" },
            { subject: "Maths", tabId: "tab-Maths", q: "यदि x/5 = 20 है, तो x का मान क्या होगा?", options: ["4", "15", "25", "100"], correct: 3, solution: "समीकरण को हल करने पर: x = 20 × 5 = 100।" },
            { subject: "Maths", tabId: "tab-Maths", q: "यदि x का 20% = 40 है, तो x का मान क्या है?", options: ["100", "150", "200", "250"], correct: 2, solution: "x × (20/100) = 40 ➔ x × (1/5) = 40 ➔ x = 40 × 5 = 200।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक आयत की लंबाई 4 मी और चौड़ाई 3 मी है। उसके विकर्ण (Diagonal) की लंबाई क्या होगी?", options: ["5 मी", "6 मी", "7 मी", "12 मी"], correct: 0, solution: "पाइथागोरस प्रमेय के अनुसार: विकर्ण² = लंबाई² + चौड़ाई² = 4² + 3² = 16 + 9 = 25। अतः विकर्ण = √25 = 5 मीटर।" },
            { subject: "Maths", tabId: "tab-Maths", q: "6 का घन (Cube) क्या होगा?", options: ["36", "126", "216", "256"], correct: 2, solution: "6 का घन = 6 × 6 × 6 = 36 × 6 = 216।" },
            { subject: "Maths", tabId: "tab-Maths", q: "भिन्न 4/5 को प्रतिशत में कैसे लिखेंगे?", options: ["40%", "60%", "75%", "80%"], correct: 3, solution: "प्रतिशत में बदलने के लिए 100 से गुणा करें: (4/5) × 100 = 4 × 20 = 80%।" },

            { subject: "Hindi", tabId: "tab-Hindi", q: "'आकाश' का सही पर्यायवाची शब्द कौन सा है?", options: ["अनल", "गगन", "जलज", "पावक"], correct: 1, solution: "'गगन', नभ, अंबर, व्योम सभी 'आकाश' के पर्यायवाची हैं। (अनल और पावक आग के, जलज कमल का पर्यायवाची है)।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'अमृत' का विलोम शब्द क्या होगा?", options: ["सुधा", "पियूष", "विष", "अमी"], correct: 2, solution: "अमृत का विलोम 'विष' (ज़हर/गरल) होता है। बाकी सभी अमृत के पर्यायवाची हैं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'आँखों का तारा होना' मुहावरे का सही अर्थ है:", options: ["बहुत प्यारा होना", "आँखों में दर्द होना", "अंधा होना", "तारा दिखना"], correct: 0, solution: "'आँखों का तारा' मुहावरे का अर्थ है - किसी का 'बहुत प्यारा या दुलारा होना'।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "निम्नलिखित में से शुद्ध वर्तनी वाला शब्द चुनें:", options: ["उज्वल", "उज्जवल", "उज्ज्वल", "उजवल"], correct: 2, solution: "सही वर्तनी 'उज्ज्वल' है। इसमें दोनों 'ज' आधे (ज्) होते हैं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "वाक्यांश के लिए एक शब्द: 'जो ईश्वर में विश्वास रखता हो'", options: ["नास्तिक", "आस्तिक", "धार्मिक", "संत"], correct: 1, solution: "ईश्वर को मानने वाले को 'आस्तिक' और न मानने वाले को 'नास्तिक' कहते हैं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'कमल' का पर्यायवाची शब्द है:", options: ["जलद", "जलज", "वारिद", "पवन"], correct: 1, solution: "'जलज' (जल में जन्म लेने वाला) कमल का पर्यायवाची है। 'जलद' (जल देने वाला) बादल का पर्यायवाची है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'उत्थान' का विलोम शब्द क्या होगा?", options: ["विकास", "प्रगति", "पतन", "अवनति"], correct: 2, solution: "'उत्थान' (ऊपर उठना/प्रगति) का सटीक विलोम 'पतन' (नीचे गिरना) होता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'नौ दो ग्यारह होना' मुहावरे का अर्थ है:", options: ["गणित पढ़ना", "चोरी करना", "भाग जाना", "छिप जाना"], correct: 2, solution: "खतरा देखकर या किसी को चकमा देकर तुरंत 'भाग जाना' ही नौ दो ग्यारह होना कहलाता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "वाक्यांश के लिए एक शब्द: 'जिसका कोई शत्रु न जन्मा हो'", options: ["मित्र", "अजातशत्रु", "शत्रुघ्न", "अजेय"], correct: 1, solution: "जिसका कोई शत्रु पैदा न हुआ हो, उसे 'अजातशत्रु' कहते हैं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'जंगल में लगने वाली आग' को क्या कहते हैं?", options: ["जठरानल", "बड़वानल", "दावानल", "अनल"], correct: 2, solution: "जंगल की आग को 'दावानल' (या दावाग्नि), समुद्र की आग को बड़वानल और पेट की आग को जठरानल कहते हैं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "इनमें से शुद्ध वाक्य पहचानें:", options: ["मैंने यह काम करना है।", "मेरे को यह काम करना है।", "मुझे यह काम करना है।", "अपुन को यह काम करना है।"], correct: 2, solution: "व्याकरण की दृष्टि से 'मुझे यह काम करना है' पूर्णतः शुद्ध वाक्य है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'हाथ मलना' मुहावरे का अर्थ है:", options: ["सर्दी लगना", "पछताना", "हाथ मिलाना", "खुश होना"], correct: 1, solution: "समय निकल जाने पर या नुकसान होने पर 'पछताना' (हाथ मलना) होता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'गणेश' का पर्यायवाची शब्द है:", options: ["गजानन (लंबोदर)", "दिनकर", "सुधाकर", "मृगेंद्र"], correct: 0, solution: "भगवान गणेश को उनके गज (हाथी) के समान मुख के कारण 'गजानन' या बड़े पेट के कारण 'लंबोदर' कहा जाता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'आयात' का विलोम शब्द है:", options: ["व्यापार", "निर्यात", "सामान", "आवागमन"], correct: 1, solution: "आयात (Import - बाहर से मंगाना) का विलोम 'निर्यात' (Export - बाहर भेजना) होता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "वाक्यांश के लिए एक शब्द: 'जानने की इच्छा रखने वाला'", options: ["ज्ञानी", "जिज्ञासु", "अज्ञानी", "वैज्ञानिक"], correct: 1, solution: "किसी भी नई चीज़ या बात को जानने की इच्छा रखने वाले व्यक्ति को 'जिज्ञासु' (Curious) कहते हैं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "इनमें से कौन सा 'सूर्य' का पर्यायवाची नहीं है?", options: ["दिनकर", "भास्कर", "रवि", "सुधाकर"], correct: 3, solution: "'सुधाकर' और 'शशांक' चंद्रमा के पर्यायवाची हैं, सूर्य के नहीं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'ईद का चाँद होना' मुहावरे का अर्थ है:", options: ["बहुत सुंदर होना", "दर्शन देना", "बहुत दिनों बाद दिखाई देना", "त्यौहार मनाना"], correct: 2, solution: "जिस प्रकार ईद का चाँद मुश्किल से दिखता है, उसी प्रकार जो व्यक्ति 'बहुत दिनों बाद दिखाई देता है' उसे ईद का चाँद कहते हैं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'स्थावर' का विलोम शब्द क्या है?", options: ["स्थिर", "चंचल", "जंगम", "अचल"], correct: 2, solution: "स्थावर (एक जगह स्थिर रहने वाला) का सटीक विलोम 'जंगम' (चलने-फिरने वाला) होता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'नीलकंठ' में कौन सा समास है?", options: ["कर्मधारय", "बहुव्रीहि", "द्विगु", "तत्पुरुष"], correct: 1, solution: "'नीलकंठ' (नीला है कंठ जिसका) विशेष रूप से भगवान शिव के लिए रूढ़ है, अतः यह 'बहुव्रीहि समास' का उदाहरण है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'पावक' का सही संधि विच्छेद क्या होगा?", options: ["पो + अक", "पौ + अक", "पा + वक", "पाव + अक"], correct: 1, solution: "'पावक' अयादि स्वर संधि का उदाहरण है। इसका विच्छेद 'पौ + अक' (औ + अ = आव) होता है।" }
        ],
        "5": [
            // ================= 20 REASONING - TEST 5 =================
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "उस विकल्प का चयन करें जो तीसरे शब्द से उसी प्रकार संबंधित है जैसे दूसरा शब्द पहले शब्द से संबंधित है: \nशिक्षक : विद्यालय :: डॉक्टर : ?", options: ["दवाई", "अस्पताल", "मरीज़", "इलाज"], correct: 1, solution: "जिस प्रकार 'शिक्षक' का कार्यस्थल 'विद्यालय' होता है, उसी प्रकार 'डॉक्टर' का कार्यस्थल 'अस्पताल' होता है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "यदि 'APPLE' को 'BQQMF' लिखा जाता है, तो उसी कूट भाषा में 'ORANGE' को क्या लिखा जाएगा?", options: ["PSBOHF", "PQBOHF", "PSBOGF", "PSCPHF"], correct: 0, solution: "यहाँ प्रत्येक अक्षर में अंग्रेजी वर्णमाला का अगला अक्षर (+1) लिखा गया है। A(+1)=B, P(+1)=Q... इसी प्रकार ORANGE ➔ O(+1)=P, R(+1)=S, A(+1)=B, N(+1)=O, G(+1)=H, E(+1)=F ➔ PSBOHF।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "दी गई शृंखला में अगला पद ज्ञात करें: 12, 24, 48, 96, ?", options: ["144", "180", "192", "200"], correct: 2, solution: "पैटर्न: हर अगली संख्या को 2 से गुणा किया जा रहा है (×2)। 96 × 2 = 192।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "विषम शब्द चुनें (Find the odd one out):", options: ["पेन", "पेंसिल", "रबर", "किताब"], correct: 3, solution: "पेन, पेंसिल और रबर स्टेशनरी (लिखने/मिटाने) के उपकरण हैं, जबकि किताब पढ़ने के काम आती है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "A, B का भाई है। C, A का पिता है। D, C की बहन है। D का B से क्या संबंध है?", options: ["चाची", "बुआ", "मौसी", "दादी"], correct: 1, solution: "A और B भाई-भाई/भाई-बहन हैं। C उनका पिता है। D, पिता की बहन है। अतः D, B की बुआ लगेगी।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एक व्यक्ति पूर्व की ओर 15 किमी चलता है, दाएँ मुड़कर 10 किमी चलता है, फिर दाएँ मुड़कर 15 किमी चलता है। वह अपने प्रारंभिक बिंदु से कितनी दूर और किस दिशा में है?", options: ["10 किमी, दक्षिण", "10 किमी, उत्तर", "15 किमी, दक्षिण", "15 किमी, पश्चिम"], correct: 0, solution: "व्यक्ति 15 किमी पूर्व गया, दाएँ (दक्षिण) 10 किमी गया, फिर दाएँ (पश्चिम) 15 किमी गया। अब वह प्रारंभिक बिंदु के ठीक 10 किमी दक्षिण में है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "कथन: सभी कार बस हैं। कुछ बस ट्रक हैं।\nनिष्कर्ष: 1. कुछ कार ट्रक हैं। 2. कुछ बस कार हैं।", options: ["केवल 1 सही है", "केवल 2 सही है", "दोनों सही हैं", "कोई सही नहीं है"], correct: 1, solution: "चूँकि सभी कार बस हैं, इसलिए 'कुछ बस कार हैं' (निष्कर्ष 2 सही)। कार और ट्रक में कोई सीधा संबंध नहीं दिया गया है (निष्कर्ष 1 गलत)।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "वेन आरेख चुनें: 'पक्षी, तोता, कुत्ता'", options: ["तीनों अलग वृत्त", "एक वृत्त के अंदर दूसरा, तीसरा अलग", "दो वृत्त एक-दूसरे को काटते हुए, तीसरा अलग", "तीनों एक-दूसरे को काटते हैं"], correct: 1, solution: "सभी 'तोते' पक्षी (Bird) होते हैं (एक वृत्त के अंदर दूसरा)। लेकिन 'कुत्ता' एक जानवर है, इसलिए इसका वृत्त अलग बनेगा।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "यदि '+' का अर्थ 'x', '-' का अर्थ '÷', 'x' का अर्थ '-' और '÷' का अर्थ '+' है, तो 15 x 5 ÷ 10 + 2 - 4 = ?", options: ["15", "10", "20", "25"], correct: 0, solution: "चिह्न बदलने पर: 15 - 5 + 10 x 2 ÷ 4। BODMAS से: 15 - 5 + 10 x 0.5 ➔ 15 - 5 + 5 = 15।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "5 मित्र एक गोल घेरे में केंद्र की ओर मुख करके बैठे हैं। P, Q के ठीक दाएँ है। R, S के ठीक बाएँ है। T, P और S के बीच में बैठा है। Q के ठीक बाएँ कौन है?", options: ["R", "S", "T", "P"], correct: 0, solution: "क्रम (घड़ी की दिशा में): Q, P, T, S, R. Q के ठीक बाएँ R बैठा है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एक पासे के फलकों पर 1 से 6 अंक हैं। यदि 2 के विपरीत 5 है और 3 के विपरीत 4 है, तो 1 के विपरीत क्या होगा?", options: ["2", "4", "5", "6"], correct: 3, solution: "पासे पर 6 फलक होते हैं। 2 का विपरीत 5, 3 का विपरीत 4 है, तो बचे हुए अंक 1 का विपरीत 6 होगा।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "शब्दों को डिक्शनरी के क्रम में व्यवस्थित करें: 1. Manage 2. Magic 3. Mango 4. Matter", options: ["2, 1, 3, 4", "2, 3, 1, 4", "2, 1, 4, 3", "1, 2, 3, 4"], correct: 0, solution: "डिक्शनरी क्रम: Magic, Manage, Mango, Matter ➔ 2, 1, 3, 4." },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एनालॉजी (संख्या): 7 : 49 :: 9 : ?", options: ["64", "72", "81", "90"], correct: 2, solution: "यह वर्गों का पैटर्न है: 7² = 49। इसी प्रकार 9² = 81।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "अक्षर शृंखला: B, D, F, H, ?", options: ["I", "J", "K", "L"], correct: 1, solution: "पैटर्न: हर अक्षर में +2 हो रहा है। B(2), D(4), F(6), H(8)। अगला J(10) होगा।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "लुप्त संख्या ज्ञात करें: 2, 3, 5, 7, 11, ?", options: ["12", "13", "14", "15"], correct: 1, solution: "यह लगातार अभाज्य संख्याओं (Prime numbers) की शृंखला है। 11 के बाद अगली अभाज्य संख्या 13 है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "यदि एक दर्पण को दाईं ओर रखा जाए, तो 'ROSE' का दर्पण प्रतिबिंब कैसा होगा?", options: ["ESOR", "ƎƧOЯ", "ROSE (उल्टा)", "SORE"], correct: 1, solution: "दर्पण प्रतिबिंब में दायाँ-बायाँ पलट जाता है। R, S, और E उल्टे हो जाएंगे, और क्रम R-O-S-E से पलटकर Ǝ-Ǝ-O-Я जैसा हो जाएगा (ƎƧOЯ)।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "यदि DOG = 26, CAT = 24 है, तो COW = ? (C=3, O=15, W=23)", options: ["38", "40", "41", "42"], correct: 2, solution: "अक्षरों के मानों का योग: C(3) + O(15) + W(23) = 41." },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "शृंखला: 100, 90, 80, 70, ?", options: ["50", "55", "60", "65"], correct: 2, solution: "हर बार 10 घटाया जा रहा है (-10)। 70 - 10 = 60." },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "विषम अक्षर समूह चुनें:", options: ["ACE", "BDF", "CEG", "DFG"], correct: 3, solution: "ACE (+2,+2), BDF (+2,+2), CEG (+2,+2), लेकिन DFG में D(4) F(6) G(7) है जो (+2,+1) का पैटर्न है। अतः DFG विषम है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एक कक्षा में राहुल ऊपर से 10वें और नीचे से 20वें स्थान पर है। कक्षा में कुल कितने छात्र हैं?", options: ["28", "29", "30", "31"], correct: 1, solution: "कुल छात्र = (ऊपर से स्थान + नीचे से स्थान) - 1 ➔ 10 + 20 - 1 = 29." },

            // ================= 20 GK/GS - TEST 5 =================
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारत का राष्ट्रीय वृक्ष (National Tree) कौन सा है?", options: ["पीपल", "आम", "बरगद", "नीम"], correct: 2, solution: "भारत का राष्ट्रीय वृक्ष 'बरगद' (Banyan tree - Ficus benghalensis) है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "'करो या मरो' (Do or Die) का नारा किसने दिया था?", options: ["सुभाष चंद्र बोस", "भगत सिंह", "महात्मा गांधी", "लाला लाजपत राय"], correct: 2, solution: "यह प्रसिद्ध नारा महात्मा गांधी ने 1942 के 'भारत छोड़ो आंदोलन' (Quit India Movement) के दौरान दिया था।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "वर्तमान में भारतीय संविधान में कितने मौलिक अधिकार (Fundamental Rights) हैं?", options: ["5", "6", "7", "8"], correct: 1, solution: "मूल संविधान में 7 मौलिक अधिकार थे, लेकिन 44वें संशोधन (1978) द्वारा 'संपत्ति के अधिकार' को हटा दिए जाने के बाद वर्तमान में 6 मौलिक अधिकार हैं।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "सौरमंडल का सबसे छोटा ग्रह (Smallest Planet) कौन सा है?", options: ["शुक्र", "मंगल", "बुध (Mercury)", "प्लूटो"], correct: 2, solution: "सौरमंडल का सबसे छोटा और सूर्य के सबसे निकट का ग्रह 'बुध' (Mercury) है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "प्रसिद्ध 'ताजमहल' किस नदी के किनारे स्थित है?", options: ["गंगा", "गोमती", "यमुना", "सरयू"], correct: 2, solution: "उत्तर प्रदेश के आगरा शहर में स्थित ताजमहल 'यमुना' नदी के दाहिने तट पर स्थित है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "'विटामिन C' का सबसे अच्छा प्राकृतिक स्रोत क्या है?", options: ["सेब", "आंवला", "केला", "पपीता"], correct: 1, solution: "खट्टे फलों में विटामिन C पाया जाता है, लेकिन 'आंवला' (Amla) विटामिन C का सबसे उत्तम प्राकृतिक स्रोत माना जाता है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "2011 की जनगणना के अनुसार, भारत के किस राज्य में जनसंख्या घनत्व (Population Density) सबसे अधिक है?", options: ["उत्तर प्रदेश", "पश्चिम बंगाल", "महाराष्ट्र", "बिहार"], correct: 3, solution: "2011 की जनगणना के अनुसार 'बिहार' का जनसंख्या घनत्व भारत में सबसे अधिक (1,106 व्यक्ति प्रति वर्ग किमी) है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारत के प्रथम प्रधानमंत्री जवाहरलाल नेहरू द्वारा लिखी गई प्रसिद्ध पुस्तक कौन सी है?", options: ["माई एक्सपेरिमेंट्स विद ट्रुथ", "डिस्कवरी ऑफ इंडिया", "गोदान", "विंग्स ऑफ फायर"], correct: 1, solution: "'डिस्कवरी ऑफ इंडिया' (भारत की खोज) जवाहरलाल नेहरू ने अहमदनगर जेल में लिखी थी।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "प्रतिष्ठित 'नोबेल पुरस्कार' किसकी स्मृति में दिया जाता है?", options: ["अल्बर्ट आइंस्टीन", "अल्फ्रेड नोबेल", "मैडम क्यूरी", "थॉमस एडिसन"], correct: 1, solution: "नोबेल पुरस्कार स्वीडिश वैज्ञानिक और डायनामाइट के आविष्कारक 'अल्फ्रेड नोबेल' की स्मृति में हर साल 10 दिसंबर को दिए जाते हैं।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "प्रसिद्ध 'हवामहल' (Hawa Mahal) किस शहर में स्थित है?", options: ["उदयपुर", "जोधपुर", "जयपुर", "आगरा"], correct: 2, solution: "'हवामहल' राजस्थान की राजधानी 'जयपुर' (Pink City) में स्थित है। इसका निर्माण 1799 में सवाई प्रताप सिंह ने करवाया था।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "विश्व स्वास्थ्य दिवस (World Health Day) कब मनाया जाता है?", options: ["7 अप्रैल", "5 जून", "1 दिसंबर", "11 जुलाई"], correct: 0, solution: "विश्व स्वास्थ्य संगठन (WHO) की स्थापना 7 अप्रैल 1948 को हुई थी, इसलिए हर साल '7 अप्रैल' को विश्व स्वास्थ्य दिवस मनाया जाता है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारत का सर्वोच्च सैन्य / वीरता पुरस्कार कौन सा है?", options: ["महावीर चक्र", "वीर चक्र", "परमवीर चक्र", "अशोक चक्र"], correct: 2, solution: "युद्ध के दौरान अद्वितीय साहस और वीरता के लिए दिया जाने वाला भारत का सर्वोच्च सैन्य सम्मान 'परमवीर चक्र' (PVC) है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "विश्व की सबसे ऊँची चोटी 'माउंट एवरेस्ट' किस देश में स्थित है?", options: ["भारत", "चीन", "नेपाल", "भूटान"], correct: 2, solution: "माउंट एवरेस्ट (8848.86 मीटर) 'नेपाल' में स्थित है, जहाँ इसे 'सागरमाथा' के नाम से जाना जाता है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "एक वयस्क मानव शरीर में कुल कितनी पसलियाँ (Ribs) होती हैं?", options: ["20", "22", "24", "26"], correct: 2, solution: "मानव शरीर की छाती में 12 जोड़ी यानी कुल '24' पसलियाँ (Ribs) होती हैं।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "'कुचिपुड़ी' (Kuchipudi) किस राज्य का शास्त्रीय नृत्य है?", options: ["केरल", "तमिलनाडु", "कर्नाटक", "आंध्र प्रदेश"], correct: 3, solution: "कुचिपुड़ी 'आंध्र प्रदेश' का एक प्रसिद्ध शास्त्रीय नृत्य है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "'भारत का शेक्सपियर' किसे कहा जाता है?", options: ["तुलसीदास", "महाकवि कालिदास", "मुंशी प्रेमचंद", "रवींद्रनाथ टैगोर"], correct: 1, solution: "संस्कृत के महान कवि और नाटककार 'कालिदास' (जिन्होंने अभिज्ञानशाकुंतलम् लिखा) को भारत का शेक्सपियर कहा जाता है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "सिखों का पवित्र तीर्थ स्थल 'स्वर्ण मंदिर' (Golden Temple) कहाँ स्थित है?", options: ["जालंधर", "चंडीगढ़", "अमृतसर", "पटियाला"], correct: 2, solution: "'स्वर्ण मंदिर' (श्री हरमंदिर साहिब) पंजाब के 'अमृतसर' शहर में स्थित है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारतीय रिज़र्व बैंक (RBI) का मुख्यालय कहाँ है?", options: ["दिल्ली", "चेन्नई", "कोलकाता", "मुंबई"], correct: 3, solution: "भारत के केंद्रीय बैंक, रिज़र्व बैंक ऑफ इंडिया (RBI) का मुख्यालय 'मुंबई' (महाराष्ट्र) में स्थित है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "प्रथम विश्व युद्ध (First World War) किस वर्ष शुरू हुआ था?", options: ["1912", "1914", "1918", "1939"], correct: 1, solution: "प्रथम विश्व युद्ध '1914' में शुरू हुआ था और 1918 में समाप्त हुआ था।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "कंप्यूटर का 'मस्तिष्क' (Brain) किसे कहा जाता है?", options: ["कीबोर्ड", "मॉनिटर", "हार्ड डिस्क", "CPU (सेंट्रल प्रोसेसिंग यूनिट)"], correct: 3, solution: "CPU (Central Processing Unit) सभी गणनाएं और निर्देश प्रोसेस करता है, इसलिए इसे कंप्यूटर का मस्तिष्क कहा जाता है।" },

            // ================= 20 MATHS - TEST 5 =================
            { subject: "Maths", tabId: "tab-Maths", q: "600 का 30% कितना होगा?", options: ["150", "180", "200", "210"], correct: 1, solution: "600 का 30% = 600 × (30/100) = 6 × 30 = 180." },
            { subject: "Maths", tabId: "tab-Maths", q: "राम एक काम को 20 दिन में और श्याम उसी काम को 30 दिन में कर सकता है। दोनों मिलकर उस काम को कितने दिन में पूरा करेंगे?", options: ["10 दिन", "12 दिन", "15 दिन", "18 दिन"], correct: 1, solution: "दोनों का एक साथ काम = (20 × 30) / (20 + 30) = 600 / 50 = 12 दिन।" },
            { subject: "Maths", tabId: "tab-Maths", q: "15, 20 और 30 का लघुत्तम समापवर्त्य (LCM) क्या होगा?", options: ["30", "45", "60", "120"], correct: 2, solution: "वह सबसे छोटी संख्या जो 15, 20 और 30 तीनों के पहाड़े में आती है, वह 60 है।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक वस्तु को ₹1000 में खरीदा गया और 20% की हानि पर बेचा गया। उसका विक्रय मूल्य क्या है?", options: ["700 रु", "750 रु", "800 रु", "850 रु"], correct: 2, solution: "हानि = 1000 का 20% = 200 रु। विक्रय मूल्य = 1000 - 200 = 800 रुपये।" },
            { subject: "Maths", tabId: "tab-Maths", q: "90 किमी/घंटा की चाल को मीटर/सेकंड (m/s) में बदलें।", options: ["20 मी/से", "25 मी/से", "30 मी/से", "35 मी/से"], correct: 1, solution: "चाल को मी/से में बदलने के लिए 5/18 से गुणा करते हैं: 90 × (5/18) = 5 × 5 = 25 मी/से।" },
            { subject: "Maths", tabId: "tab-Maths", q: "प्रथम 5 विषम संख्याओं (Odd numbers) का औसत क्या होगा?", options: ["3", "4", "5", "6"], correct: 2, solution: "प्रथम 'n' विषम संख्याओं का औसत हमेशा 'n' ही होता है। अतः 5 विषम संख्याओं (1, 3, 5, 7, 9) का औसत 5 होगा।" },
            { subject: "Maths", tabId: "tab-Maths", q: "₹4000 पर 10% वार्षिक दर से 2 वर्ष का चक्रवृद्धि ब्याज (CI) कितना होगा?", options: ["800 रु", "820 रु", "840 रु", "900 रु"], correct: 2, solution: "मिश्रधन (A) = P(1+R/100)² = 4000(110/100)² = 4000 × 1.21 = 4840 रुपये। ब्याज = 4840 - 4000 = 840 रुपये।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक आयत की लंबाई 15 मीटर और चौड़ाई 10 मीटर है। उसका परिमाप क्या होगा?", options: ["25 मीटर", "50 मीटर", "150 मीटर", "100 मीटर"], correct: 1, solution: "आयत का परिमाप = 2 × (लंबाई + चौड़ाई) = 2 × (15 + 10) = 2 × 25 = 50 मीटर।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक वृत्त का व्यास (Diameter) 14 सेमी है। उसका क्षेत्रफल क्या होगा? (π = 22/7)", options: ["154 वर्ग सेमी", "44 वर्ग सेमी", "308 वर्ग सेमी", "616 वर्ग सेमी"], correct: 0, solution: "त्रिज्या (r) = 14 / 2 = 7 सेमी। क्षेत्रफल = πr² = (22/7) × 7 × 7 = 154 वर्ग सेमी।" },
            { subject: "Maths", tabId: "tab-Maths", q: "यदि A:B = 3:5 और B:C = 5:7 है, तो A:C का मान क्या होगा?", options: ["3:5", "5:7", "3:7", "15:35"], correct: 2, solution: "A/C = (A/B) × (B/C) = (3/5) × (5/7) = 3/7." },
            { subject: "Maths", tabId: "tab-Maths", q: "300 मीटर लंबी एक ट्रेन 20 मीटर/सेकंड की गति से चलते हुए एक खंभे को कितने समय में पार करेगी?", options: ["10 सेकंड", "15 सेकंड", "20 सेकंड", "30 सेकंड"], correct: 1, solution: "समय = दूरी / गति = 300 / 20 = 15 सेकंड।" },
            { subject: "Maths", tabId: "tab-Maths", q: "12, 16 और 24 का महत्तम समापवर्तक (HCF) क्या होगा?", options: ["2", "3", "4", "6"], correct: 2, solution: "वह सबसे बड़ी संख्या जो 12, 16 और 24 तीनों को विभाजित कर दे, वह 4 है।" },
            { subject: "Maths", tabId: "tab-Maths", q: "यदि 8 आदमी एक काम को 10 दिन में करते हैं, तो 4 आदमी उसी काम को कितने दिन में करेंगे?", options: ["15 दिन", "20 दिन", "25 दिन", "5 दिन"], correct: 1, solution: "M1 × D1 = M2 × D2 ➔ 8 × 10 = 4 × D2 ➔ 80 = 4 × D2 ➔ D2 = 20 दिन।" },
            { subject: "Maths", tabId: "tab-Maths", q: "यदि x / 4 = 25 है, तो x का मान क्या होगा?", options: ["50", "75", "100", "125"], correct: 2, solution: "समीकरण हल करने पर: x = 25 × 4 = 100।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक वस्तु पर 20% और 10% की क्रमिक छूटें (Successive discounts) दी जाती हैं। कुल (एकल) छूट कितने प्रतिशत होगी?", options: ["30%", "28%", "32%", "25%"], correct: 1, solution: "समतुल्य छूट = x + y - (xy/100) = 20 + 10 - (20×10/100) = 30 - 2 = 28%." },
            { subject: "Maths", tabId: "tab-Maths", q: "एक घन (Cube) की भुजा 5 सेमी है। उसका आयतन क्या होगा?", options: ["25 घन सेमी", "100 घन सेमी", "125 घन सेमी", "150 घन सेमी"], correct: 2, solution: "घन का आयतन = भुजा × भुजा × भुजा = 5 × 5 × 5 = 125 घन सेमी।" },
            { subject: "Maths", tabId: "tab-Maths", q: "भिन्न 1/5 को प्रतिशत में कैसे लिखेंगे?", options: ["10%", "15%", "20%", "25%"], correct: 2, solution: "प्रतिशत में बदलने के लिए 100 से गुणा करें: (1/5) × 100 = 20%." },
            { subject: "Maths", tabId: "tab-Maths", q: "144 का वर्गमूल (Square Root) क्या होगा?", options: ["10", "12", "14", "16"], correct: 1, solution: "12 × 12 = 144, अतः 144 का वर्गमूल 12 है।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक समकोण त्रिभुज का लंब 6 सेमी और आधार 8 सेमी है। इसका कर्ण (Hypotenuse) क्या होगा?", options: ["10 सेमी", "12 सेमी", "14 सेमी", "100 सेमी"], correct: 0, solution: "पाइथागोरस प्रमेय: कर्ण² = 6² + 8² = 36 + 64 = 100। कर्ण = √100 = 10 सेमी।" },
            { subject: "Maths", tabId: "tab-Maths", q: "20 + 10 ÷ 2 × 5 - 5 का मान क्या होगा? (BODMAS)", options: ["30", "40", "45", "50"], correct: 1, solution: "BODMAS नियम: पहले भाग (10 ÷ 2 = 5), फिर गुणा (5 × 5 = 25), फिर जोड़ (20 + 25 = 45), फिर घटाव (45 - 5 = 40)।" },

            { subject: "Hindi", tabId: "tab-Hindi", q: "'पृथ्वी' का पर्यायवाची शब्द कौन सा है?", options: ["दिनकर", "वसुंधरा", "नभ", "पावक"], correct: 1, solution: "'वसुंधरा', भूमि, धरती, अचला आदि पृथ्वी के पर्यायवाची हैं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'आदर' का विलोम शब्द क्या होगा?", options: ["सम्मान", "निरादर", "प्यार", "घृणा"], correct: 1, solution: "'आदर' (सम्मान करना) का विलोम 'निरादर' (अपमान करना) होता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'अंधे की लाठी' मुहावरे का सही अर्थ है:", options: ["लाठी से मारना", "एकमात्र सहारा", "अंधा होना", "मूर्ख होना"], correct: 1, solution: "'अंधे की लाठी' का अर्थ है किसी असहाय व्यक्ति का 'एकमात्र सहारा' होना।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "वाक्यांश के लिए एक शब्द: 'जो जानने की इच्छा रखता हो'", options: ["ज्ञानी", "जिज्ञासु", "अज्ञानी", "परोपकारी"], correct: 1, solution: "किसी भी बात को जानने की इच्छा रखने वाले व्यक्ति को 'जिज्ञासु' (Curious) कहते हैं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'चंद्रमा' का पर्यायवाची शब्द है:", options: ["दिवाकर", "शशांक", "अनल", "वारी"], correct: 1, solution: "'शशांक', राकेश, सुधांशु, शशि आदि चंद्रमा के पर्यायवाची हैं। (दिवाकर सूर्य का है)।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "निम्नलिखित में से शुद्ध वर्तनी वाला शब्द चुनें:", options: ["सन्यासी", "सन्न्यासी", "संन्यासी", "सन्याशी"], correct: 2, solution: "सही वर्तनी 'संन्यासी' है (इसमें अनुस्वार/बिंदु और आधा 'न' दोनों आते हैं)।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'आयात' का विलोम शब्द क्या होगा?", options: ["व्यापार", "निर्यात", "आवागमन", "सामान"], correct: 1, solution: "आयात (Import - मंगाना) का विलोम 'निर्यात' (Export - भेजना) होता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'आसमान सिर पर उठाना' मुहावरे का अर्थ है:", options: ["आसमान की ओर देखना", "बहुत शोर करना", "घमंड करना", "असंभव काम करना"], correct: 1, solution: "आसमान सिर पर उठाना अर्थात उपद्रव मचाना या 'बहुत अधिक शोर करना'।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "वाक्यांश के लिए एक शब्द: 'जिसका कोई शत्रु न हो'", options: ["मित्र", "अजातशत्रु", "शत्रुघ्न", "अजेय"], correct: 1, solution: "जिसका कोई शत्रु पैदा न हुआ हो, उसे 'अजातशत्रु' कहते हैं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'पवन' का पर्यायवाची शब्द है:", options: ["हवा (समीर)", "आग", "जल", "आकाश"], correct: 0, solution: "पवन, वायु, हवा, समीर, अनिल आदि हवा के पर्यायवाची हैं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'उपकार' का विलोम शब्द क्या है?", options: ["पुण्य", "परोपकार", "अपकार", "भलाई"], correct: 2, solution: "'उपकार' (भलाई करना) का विलोम 'अपकार' (बुरा करना) होता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'घी के दीये जलाना' मुहावरे का अर्थ है:", options: ["हवन करना", "खुशियां मनाना", "रोशनी करना", "धनवान होना"], correct: 1, solution: "घी के दीये जलाना मतलब अत्यधिक 'खुशियां मनाना' (जैसे राम के अयोध्या लौटने पर)।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "इनमें से शुद्ध वाक्य पहचानें:", options: ["राम पुस्तक पढ़ा।", "राम ने पुस्तक पढ़ी।", "राम ने पुस्तक पढ़ा।", "राम ने पुस्तक पढ़े।"], correct: 1, solution: "पुस्तक स्त्रीलिंग है, और 'ने' लगने पर क्रिया कर्म (पुस्तक) के अनुसार होगी। अतः 'राम ने पुस्तक पढ़ी' शुद्ध है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "वाक्यांश के लिए एक शब्द: 'जो कभी न मरे'", options: ["अजर", "अमर", "शाश्वत", "नश्वर"], correct: 1, solution: "जो कभी न मरे उसे 'अमर' कहते हैं, और जो कभी बूढ़ा न हो उसे 'अजर' कहते हैं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'शेर' का पर्यायवाची शब्द है:", options: ["सारंग", "सिंह (वनराज)", "गज", "मृग"], correct: 1, solution: "शेर को सिंह, वनराज, शार्दूल, मृगेंद्र आदि कहा जाता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'स्वतंत्र' का विलोम शब्द क्या है?", options: ["आज़ाद", "गुलाम", "परतंत्र", "बंधन"], correct: 2, solution: "स्वतंत्र (Free) का सटीक और मानक विलोम 'परतंत्र' (Dependent) होता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'दाँत खट्टे करना' मुहावरे का अर्थ है:", options: ["नींबू खाना", "बुरी तरह हराना (पराजित करना)", "दाँत में दर्द होना", "चिढ़ाना"], correct: 1, solution: "युद्ध या प्रतियोगिता में किसी को बुरी तरह 'हरा देना' या पराजित कर देना।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "वाक्यांश के लिए एक शब्द: 'जिसमें दया न हो'", options: ["निर्दयी", "दयालु", "परोपकारी", "कठोर"], correct: 0, solution: "जिसके हृदय में दया न हो उसे 'निर्दयी' कहते हैं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "शुद्ध वर्तनी का चयन करें:", options: ["कवीत्री", "कवयित्री", "कवियत्री", "कवयीत्री"], correct: 1, solution: "कवि का शुद्ध स्त्रीलिंग रूप 'कवयित्री' होता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'नीलकंठ' में कौन सा समास है?", options: ["कर्मधारय", "द्विगु", "बहुव्रीहि", "तत्पुरुष"], correct: 2, solution: "'नीलकंठ' (नीला है कंठ जिसका) विशेष रूप से भगवान शिव के लिए प्रयुक्त होता है, इसलिए इसमें 'बहुव्रीहि समास' है।" }

        "6": [
            // ================= 20 REASONING - TEST 6 =================
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "उस विकल्प का चयन करें जो तीसरे शब्द से उसी प्रकार संबंधित है जैसे दूसरा शब्द पहले शब्द से संबंधित है: \nकार : गैरेज :: हवाई जहाज : ?", options: ["पोर्ट", "हैंगर", "डिपो", "हार्बर"], correct: 1, solution: "जिस प्रकार 'कार' को 'गैरेज' में खड़ा किया जाता है, उसी प्रकार 'हवाई जहाज' को 'हैंगर' (Hangar) में रखा जाता है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "दी गई शृंखला में प्रश्नवाचक चिह्न (?) के स्थान पर क्या आएगा?\n2, 9, 28, 65, ?", options: ["125", "126", "127", "128"], correct: 1, solution: "पैटर्न घनों (Cubes) पर आधारित है: (1³+1)=2, (2³+1)=9, (3³+1)=28, (4³+1)=65. अतः अगला पद (5³+1) = 125 + 1 = 126 होगा।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एक निश्चित कूट भाषा में 'TABLE' को 'UCEPJ' लिखा जाता है। उसी भाषा में 'CHAIR' को कैसे लिखा जाएगा?", options: ["DIBJS", "DJCKS", "DJDMW", "DIDLW"], correct: 2, solution: "पैटर्न: T(+1)=U, A(+2)=C, B(+3)=E, L(+4)=P, E(+5)=J. \nइसी प्रकार C(+1)=D, H(+2)=J, A(+3)=D, I(+4)=M, R(+5)=W ➔ DJDMW." },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "निम्नलिखित में से बेजोड़ (Odd one out) शब्द ज्ञात करें:", options: ["वायलिन", "गिटार", "सितार", "बांसुरी"], correct: 3, solution: "वायलिन, गिटार और सितार तीनों तार (Strings) वाले वाद्ययंत्र हैं, जबकि 'बांसुरी' हवा (फूंक) से बजने वाला वाद्ययंत्र है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "A, B का भाई है। C, A की माता है। D, C का पिता है। B का D से क्या संबंध है?", options: ["पोता", "पोती", "नाती/नातिन", "तय नहीं किया जा सकता"], correct: 3, solution: "A और B भाई-बहन हैं, C उनकी माता है और D उनका नाना है। अतः B, D का नाती या नातिन है, लेकिन B का लिंग (Gender) स्पष्ट नहीं है, इसलिए सटीक संबंध तय नहीं किया जा सकता।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एक व्यक्ति पूर्व की ओर 10 किमी चलता है, फिर बाएँ मुड़कर 5 किमी चलता है, फिर बाएँ मुड़कर 10 किमी चलता है। वह प्रारंभिक बिंदु से किस दिशा में और कितनी दूर है?", options: ["5 किमी, उत्तर", "5 किमी, दक्षिण", "10 किमी, पश्चिम", "15 किमी, पूर्व"], correct: 0, solution: "व्यक्ति 10 किमी पूर्व गया, बाएँ (उत्तर) 5 किमी गया, फिर बाएँ (पश्चिम) 10 किमी गया। अब वह प्रारंभिक बिंदु के ठीक ऊपर (North) 5 किमी की दूरी पर खड़ा है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "कथन: सभी कुत्ते बिल्ली हैं। कुछ बिल्ली चूहे हैं।\nनिष्कर्ष: 1. कुछ कुत्ते चूहे हैं। 2. कुछ बिल्ली कुत्ते हैं।", options: ["केवल 1 सही है", "केवल 2 सही है", "दोनों सही हैं", "कोई सही नहीं है"], correct: 1, solution: "वेन आरेख के अनुसार: 'सभी कुत्ते बिल्ली हैं', इसलिए 'कुछ बिल्ली कुत्ते हैं' (निष्कर्ष 2 सही है)। कुत्ते और चूहे के बीच कोई सीधा संबंध नहीं है, इसलिए निष्कर्ष 1 गलत है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "वेन आरेख चुनें: 'भारत, राजस्थान, जयपुर'", options: ["तीनों एक दूसरे को काटते हैं", "तीनों अलग वृत्त", "एक के अंदर दूसरा और दूसरे के अंदर तीसरा", "दो एक के अंदर और एक बाहर"], correct: 2, solution: "'जयपुर' राजस्थान के अंदर है, और 'राजस्थान' भारत के अंदर है। इसलिए एक के अंदर एक वाले तीन संकेंद्रित (Concentric) वृत्त सही होंगे।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "यदि '+' का अर्थ '-', '-' का अर्थ 'x', 'x' का अर्थ '÷' और '÷' का अर्थ '+' है, तो 16 x 4 - 3 + 2 ÷ 5 = ?", options: ["10", "12", "15", "18"], correct: 2, solution: "चिह्न बदलने पर: 16 ÷ 4 x 3 - 2 + 5। \nBODMAS से: 4 x 3 - 2 + 5 ➔ 12 - 2 + 5 ➔ 17 - 2 = 15." },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "5 व्यक्ति A, B, C, D, E एक पंक्ति में उत्तर की ओर मुख करके बैठे हैं। C बीच में बैठा है। A और E सिरों पर बैठे हैं। B, A के ठीक दाएँ बैठा है। D के ठीक दाएँ कौन बैठा है?", options: ["A", "B", "C", "E"], correct: 3, solution: "C बीच में है (तीसरे स्थान पर)। A और E सिरों पर हैं। चूँकि B, A के दाएँ है, अतः A बाएँ सिरे पर होगा। क्रम: A, B, C, D, E. D के ठीक दाएँ E बैठा है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एक पासे की दो स्थितियों में 1, 2, 3 और 1, 4, 5 दिखाई देते हैं। '1' के विपरीत कौन सा अंक होगा?", options: ["2", "3", "4", "6"], correct: 3, solution: "दोनों स्थितियों में केवल '1' समान है। 1 के आस-पास (पड़ोसी फलक पर) 2, 3, 4, और 5 हैं। अतः जो अंक नहीं दिख रहा (यानी 6), वही '1' के विपरीत होगा।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "शब्दों को डिक्शनरी के क्रम में व्यवस्थित करें: 1. Read 2. Real 3. Ready 4. Rest", options: ["1, 2, 3, 4", "1, 3, 2, 4", "2, 1, 3, 4", "1, 3, 4, 2"], correct: 1, solution: "डिक्शनरी क्रम: R-e-a-d (1), R-e-a-d-y (3), R-e-a-l (2), R-e-s-t (4). अतः सही क्रम: 1, 3, 2, 4." },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एनालॉजी: 5 : 25 :: 7 : ?", options: ["35", "49", "64", "125"], correct: 1, solution: "यह वर्गों का पैटर्न है: 5² = 25। इसी प्रकार 7² = 49।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "अक्षर शृंखला: A, D, G, J, ?", options: ["L", "M", "N", "O"], correct: 1, solution: "पैटर्न: हर अक्षर में +3 हो रहा है। A(1), D(4), G(7), J(10)। अगला J + 3 = M(13) होगा।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "लुप्त संख्या ज्ञात करें: 1, 8, 27, 64, ?", options: ["100", "121", "125", "216"], correct: 2, solution: "यह प्राकृत संख्याओं के घनों (Cubes) की शृंखला है: 1³, 2³, 3³, 4³। अतः अगला 5³ = 125 होगा।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "यदि 'CAT' = 24 और 'BAT' = 23 है, तो 'MAT' = ? (M=13, A=1, T=20)", options: ["33", "34", "35", "36"], correct: 1, solution: "अक्षरों के मानों का योग: M(13) + A(1) + T(20) = 34." },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "शृंखला: 100, 81, 64, 49, ?", options: ["25", "36", "40", "42"], correct: 1, solution: "यह उल्टे क्रम में वर्गों की शृंखला है: 10², 9², 8², 7²। अगला 6² = 36 होगा।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "विषम अक्षर समूह चुनें:", options: ["AB", "CD", "EF", "GJ"], correct: 3, solution: "AB, CD, EF लगातार अक्षर हैं (अंतर +1), जबकि GJ के बीच 2 अक्षरों का अंतर है (G के बाद H, I छोड़कर J)।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "घड़ी में 7:00 बजे घंटे और मिनट की सुइयों के बीच कितने डिग्री का कोण बनेगा?", options: ["150°", "180°", "210°", "A और C दोनों"], correct: 3, solution: "सूत्र: |30H - 5.5M| ➔ |30×7 - 0| = 210°। चूँकि एक वृत्त 360° का होता है, तो दूसरा कोण 360° - 210° = 150° होगा। (विकल्प में 150° और 210° दोनों सही हैं)।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "यदि एक दर्पण को दाईं ओर रखा जाए, तो 'BIRD' का दर्पण प्रतिबिंब कैसा होगा?", options: ["DRIB", "BIRD (उल्टा)", "ꓷЯIꓭ", "DRIB (सीधा)"], correct: 2, solution: "दर्पण प्रतिबिंब में दायाँ-बायाँ पलट जाता है। BIRD का प्रतिबिंब ꓷЯIꓭ (D उल्टा, R उल्टा, I समान, B उल्टा) जैसा दिखेगा।" },

            // ================= 20 GK/GS - TEST 6 =================
            { subject: "General Knowledge", tabId: "tab-GK", q: "पानीपत का द्वितीय युद्ध किस वर्ष लड़ा गया था?", options: ["1526", "1556", "1761", "1192"], correct: 1, solution: "पानीपत का द्वितीय युद्ध 5 नवंबर 1556 को अकबर के सेनापति बैरम खान और हेमू (हेमचंद्र विक्रमादित्य) के बीच लड़ा गया था।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "किस संविधान संशोधन को 'मिनी संविधान' (Mini Constitution) कहा जाता है?", options: ["42वां संशोधन", "44वां संशोधन", "73वां संशोधन", "86वां संशोधन"], correct: 0, solution: "1976 में हुए 42वें संविधान संशोधन को 'मिनी संविधान' कहा जाता है, क्योंकि इसके द्वारा संविधान में प्रस्तावना सहित कई व्यापक बदलाव किए गए थे।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "प्रसिद्ध 'पुलीकट झील' (Pulicat Lake) भारत के किन राज्यों की सीमा पर स्थित है?", options: ["ओडिशा और पश्चिम बंगाल", "आंध्र प्रदेश और तमिलनाडु", "केरल और कर्नाटक", "महाराष्ट्र और गुजरात"], correct: 1, solution: "पुलीकट झील चिल्का झील के बाद भारत की दूसरी सबसे बड़ी खारे पानी की झील है, जो 'आंध्र प्रदेश और तमिलनाडु' की सीमा पर स्थित है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "विटामिन D का रासायनिक नाम क्या है?", options: ["रेटिनॉल", "थायमिन", "कैल्सीफेरोल", "एस्कॉर्बिक एसिड"], correct: 2, solution: "विटामिन D का रासायनिक नाम 'कैल्सीफेरोल' है। यह हड्डियों की मजबूती के लिए आवश्यक है और सूर्य के प्रकाश से प्राप्त होता है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "'कत्थक' (Kathak) किस राज्य का प्रसिद्ध शास्त्रीय नृत्य है?", options: ["केरल", "तमिलनाडु", "उत्तर प्रदेश", "असम"], correct: 2, solution: "कत्थक उत्तर भारत, विशेष रूप से 'उत्तर प्रदेश' का एक प्रमुख शास्त्रीय नृत्य है। पं. बिरजू महाराज इसके प्रसिद्ध नर्तक थे।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारत के किसी भी राज्य की पहली महिला राज्यपाल कौन थीं?", options: ["सुचेता कृपलानी", "सरोजिनी नायडू", "इंदिरा गांधी", "प्रतिभा पाटिल"], correct: 1, solution: "'सरोजिनी नायडू' (जिन्हें भारत की कोकिला भी कहा जाता है) भारत के किसी राज्य (उत्तर प्रदेश) की पहली महिला राज्यपाल थीं।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारतीय रिज़र्व बैंक (RBI) के प्रथम भारतीय गवर्नर कौन थे?", options: ["सी.डी. देशमुख", "ओसबोर्न स्मिथ", "रघुराम राजन", "मनमोहन सिंह"], correct: 0, solution: "RBI के प्रथम गवर्नर सर ओसबोर्न स्मिथ थे, लेकिन प्रथम 'भारतीय' गवर्नर चिंतामन द्वारकानाथ देशमुख (सी.डी. देशमुख) थे।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारतीय राष्ट्रीय कांग्रेस की स्थापना किस वर्ष हुई थी?", options: ["1857", "1885", "1905", "1919"], correct: 1, solution: "भारतीय राष्ट्रीय कांग्रेस की स्थापना 28 दिसंबर '1885' को ए.ओ. ह्यूम द्वारा बॉम्बे में की गई थी।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "सौरमंडल में सूर्य के सबसे निकट का ग्रह कौन सा है?", options: ["शुक्र", "मंगल", "बुध (Mercury)", "पृथ्वी"], correct: 2, solution: "सौरमंडल का सबसे छोटा और सूर्य के सबसे निकट स्थित ग्रह 'बुध' (Mercury) है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "वायुमंडल की सबसे निचली परत को क्या कहा जाता है?", options: ["समताप मंडल", "क्षोभमंडल (Troposphere)", "आयनमंडल", "बाह्यमंडल"], correct: 1, solution: "वायुमंडल की सबसे निचली परत 'क्षोभमंडल' (Troposphere) है। मौसम संबंधी सभी घटनाएँ (बादल, बारिश) इसी परत में होती हैं।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "मानव शरीर में 'टीबिया' (Tibia) नामक हड्डी कहाँ पाई जाती है?", options: ["हाथ में", "खोपड़ी में", "पैर (टांग) में", "रीढ़ में"], correct: 2, solution: "'टीबिया' (Tibia) मानव शरीर की दूसरी सबसे बड़ी हड्डी है, जो पैर (घुटने से टखने के बीच) में पाई जाती है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "'ब्रह्म समाज' की स्थापना किसने की थी?", options: ["स्वामी विवेकानंद", "दयानंद सरस्वती", "राजा राममोहन राय", "ईश्वर चंद्र विद्यासागर"], correct: 2, solution: "भारतीय पुनर्जागरण के जनक 'राजा राममोहन राय' ने 1828 में कलकत्ता में 'ब्रह्म समाज' की स्थापना की थी।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "भारतीय संविधान में 'मौलिक अधिकार' (Fundamental Rights) किस भाग में दिए गए हैं?", options: ["भाग 2", "भाग 3", "भाग 4", "भाग 4A"], correct: 1, solution: "संविधान के 'भाग 3' (अनुच्छेद 12 से 35) में नागरिकों के मौलिक अधिकारों का वर्णन है, जिसे भारत का मैग्नाकार्टा भी कहा जाता है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "प्रसिद्ध 'सरदार सरोवर बांध' किस नदी पर बनाया गया है?", options: ["गंगा", "गोदावरी", "ताप्ती", "नर्मदा"], correct: 3, solution: "गुजरात में स्थित 'सरदार सरोवर बांध' भारत के सबसे बड़े बांधों में से एक है, जो 'नर्मदा' नदी पर बना है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "प्रकाश की चाल सबसे अधिक किस माध्यम में होती है?", options: ["ठोस", "द्रव", "हवा", "निर्वात (Vacuum)"], correct: 3, solution: "प्रकाश की गति सबसे अधिक 'निर्वात' (Vacuum) में होती है (लगभग 3 × 10^8 मीटर/सेकंड)। जबकि ध्वनि निर्वात में यात्रा नहीं कर सकती।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "महात्मा गांधी ने 'असहयोग आंदोलन' (Non-Cooperation Movement) किस वर्ष शुरू किया था?", options: ["1917", "1919", "1920", "1930"], correct: 2, solution: "गांधीजी के नेतृत्व में 'असहयोग आंदोलन' 1 अगस्त '1920' को शुरू हुआ था, जिसे बाद में चौरी-चौरा कांड के कारण वापस ले लिया गया।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "क्षेत्रफल की दृष्टि से विश्व का सबसे बड़ा महासागर कौन सा है?", options: ["अटलांटिक महासागर", "प्रशांत महासागर", "हिंद महासागर", "आर्कटिक महासागर"], correct: 1, solution: "विश्व का सबसे बड़ा और सबसे गहरा महासागर 'प्रशांत महासागर' (Pacific Ocean) है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "रक्त का लाल रंग किसके कारण होता है?", options: ["प्लाज्मा", "प्लेटलेट्स", "हीमोग्लोबिन", "WBC"], correct: 2, solution: "लाल रक्त कोशिकाओं (RBC) में पाए जाने वाले 'हीमोग्लोबिन' नामक प्रोटीन (वर्णक) के कारण रक्त का रंग लाल होता है।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "शुद्ध जल का pH मान (pH Value) कितना होता है?", options: ["6", "7", "7.4", "8"], correct: 1, solution: "शुद्ध जल उदासीन (Neutral) होता है, इसलिए इसका pH मान ठीक '7' होता है। (रक्त का pH 7.4 होता है)।" },
            { subject: "General Knowledge", tabId: "tab-GK", q: "संयुक्त राष्ट्र संघ (UNO) का मुख्यालय कहाँ स्थित है?", options: ["जिनेवा", "पेरिस", "न्यूयॉर्क", "वाशिंगटन डीसी"], correct: 2, solution: "संयुक्त राष्ट्र संघ (UNO) का मुख्यालय अमेरिका के 'न्यूयॉर्क' (New York) शहर में स्थित है।" },

            { subject: "Maths", tabId: "tab-Maths", q: "500 का 20% कितना होगा?", options: ["50", "80", "100", "120"], correct: 2, solution: "500 का 20% = 500 × (20/100) = 5 × 20 = 100." },
            { subject: "Maths", tabId: "tab-Maths", q: "A किसी काम को 10 दिन में और B उसी काम को 20 दिन में पूरा कर सकता है। दोनों मिलकर उस काम को कितने दिन में करेंगे?", options: ["6 दिन", "6.66 दिन", "8 दिन", "10 दिन"], correct: 1, solution: "दोनों का एक साथ काम = (A × B) / (A + B) = (10 × 20) / 30 = 200 / 30 = 20/3 = 6.66 दिन।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक वस्तु को 800 रुपये में खरीदकर 1000 रुपये में बेचा गया। लाभ प्रतिशत ज्ञात करें।", options: ["15%", "20%", "25%", "30%"], correct: 2, solution: "CP = 800, SP = 1000। लाभ = 200। लाभ % = (200 / 800) × 100 = 1/4 × 100 = 25%." },
            { subject: "Maths", tabId: "tab-Maths", q: "100 मीटर लंबी एक ट्रेन 36 किमी/घंटा की गति से चल रही है। वह एक खंभे को कितने समय में पार करेगी?", options: ["8 सेकंड", "10 सेकंड", "12 सेकंड", "15 सेकंड"], correct: 1, solution: "गति = 36 किमी/घंटा = 36 × 5/18 = 10 मी/से। समय = दूरी/गति = 100 / 10 = 10 सेकंड।" },
            { subject: "Maths", tabId: "tab-Maths", q: "24, 36 और 48 का लघुत्तम समापवर्त्य (LCM) क्या होगा?", options: ["72", "96", "144", "192"], correct: 2, solution: "24, 36 और 48 से पूरी तरह विभाजित होने वाली सबसे छोटी संख्या 144 है।" },
            { subject: "Maths", tabId: "tab-Maths", q: "दो संख्याओं का अनुपात 2:3 है और उनका योग 100 है। छोटी संख्या क्या है?", options: ["30", "40", "50", "60"], correct: 1, solution: "अनुपातों का योग = 2+3 = 5 यूनिट = 100। 1 यूनिट = 20। छोटी संख्या = 2 यूनिट = 2 × 20 = 40।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक आयत की लंबाई 12 मी और चौड़ाई 5 मी है। उसका क्षेत्रफल क्या होगा?", options: ["34 वर्ग मी", "50 वर्ग मी", "60 वर्ग मी", "120 वर्ग मी"], correct: 2, solution: "आयत का क्षेत्रफल = लंबाई × चौड़ाई = 12 × 5 = 60 वर्ग मीटर।" },
            { subject: "Maths", tabId: "tab-Maths", q: "1000 रुपये पर 5% वार्षिक दर से 4 वर्ष का साधारण ब्याज (SI) क्या होगा?", options: ["150 रु", "200 रु", "250 रु", "300 रु"], correct: 1, solution: "SI = (P × R × T) / 100 = (1000 × 5 × 4) / 100 = 20000 / 100 = 200 रुपये।" },
            { subject: "Maths", tabId: "tab-Maths", q: "2000 रुपये पर 10% वार्षिक दर से 2 वर्ष का चक्रवृद्धि ब्याज (CI) क्या होगा?", options: ["400 रु", "410 रु", "420 रु", "450 रु"], correct: 2, solution: "मिश्रधन A = P(1+R/100)² = 2000(110/100)² = 2000 × 1.21 = 2420 रुपये। CI = 2420 - 2000 = 420 रुपये।" },
            { subject: "Maths", tabId: "tab-Maths", q: "प्रथम 10 विषम संख्याओं (Odd numbers) का औसत क्या होगा?", options: ["9", "10", "11", "20"], correct: 1, solution: "प्रथम 'n' विषम संख्याओं का औसत हमेशा 'n' ही होता है। अतः प्रथम 10 विषम संख्याओं का औसत 10 होगा।" },
            { subject: "Maths", tabId: "tab-Maths", q: "एक वस्तु पर 20% और 10% की क्रमिक छूटें दी जाती हैं। कुल एकल छूट कितने प्रतिशत होगी?", options: ["28%", "30%", "32%", "25%"], correct: 0, solution: "समतुल्य छूट = x + y - (xy/100) = 20 + 10 - (20×10/100) = 30 - 2 = 28%." },
            { subject: "Maths", tabId: "tab-Maths", q: "एक बेलन (Cylinder) की त्रिज्या 7 सेमी और ऊंचाई 10 सेमी है। इसका आयतन क्या होगा? (π = 22/7)", options: ["770 घन सेमी", "1540 घन सेमी", "2200 घन सेमी", "3080 घन सेमी"], correct: 1, solution: "बेलन का आयतन = πr²h = (22/7) × 7 × 7 × 10 = 22 × 70 = 1540 घन सेमी।" },
            { subject: "Maths", tabId: "tab-Maths", q: "54 किमी/घंटा की गति को मीटर/सेकंड (m/s) में बदलें।", options: ["10 मी/से", "15 मी/से", "18 मी/से", "20 मी/से"], correct: 1, solution: "54 × (5/18) = 3 × 5 = 15 मी/से।" },
            { subject: "Maths", tabId: "tab-Maths", q: "भिन्न 1/4 को प्रतिशत में कैसे लिखेंगे?", options: ["15%", "20%", "25%", "30%"], correct: 2, solution: "(1/4) × 100 = 25%." },
            { subject: "Maths", tabId: "tab-Maths", q: "यदि x / 3 = 15 है, तो x का मान क्या होगा?", options: ["5", "30", "45", "60"], correct: 2, solution: "x = 15 × 3 = 45." },
            { subject: "Maths", tabId: "tab-Maths", q: "4 और 8 का तृतीय आनुपातिक (Third proportional) क्या होगा?", options: ["12", "16", "24", "32"], correct: 1, solution: "तृतीय आनुपातिक = b² / a = (8 × 8) / 4 = 64 / 4 = 16." },
            { subject: "Maths", tabId: "tab-Maths", q: "A की आयु B की आयु की दोगुनी है। यदि उनकी आयु का योग 30 वर्ष है, तो A की आयु क्या है?", options: ["10 वर्ष", "15 वर्ष", "20 वर्ष", "25 वर्ष"], correct: 2, solution: "माना B = x, तो A = 2x। योग = 3x = 30 ➔ x = 10। अतः A की आयु = 2x = 20 वर्ष।" },
            { subject: "Maths", tabId: "tab-Maths", q: "40 लीटर के मिश्रण में दूध और पानी का अनुपात 3:1 है। इसमें दूध की मात्रा कितनी है?", options: ["10 लीटर", "20 लीटर", "30 लीटर", "35 लीटर"], correct: 2, solution: "कुल अनुपात = 3+1 = 4 यूनिट = 40 लीटर ➔ 1 यूनिट = 10 लीटर। दूध = 3 यूनिट = 30 लीटर।" },
            { subject: "Maths", tabId: "tab-Maths", q: "√225 + 25 का मान क्या होगा?", options: ["30", "40", "50", "250"], correct: 1, solution: "225 का वर्गमूल 15 है। 15 + 25 = 40." },
            { subject: "Maths", tabId: "tab-Maths", q: "7 का घन (Cube) क्या होगा?", options: ["49", "243", "343", "441"], correct: 2, solution: "7 × 7 × 7 = 49 × 7 = 343." },
