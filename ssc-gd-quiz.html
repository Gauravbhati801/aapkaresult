            { subject: "Maths", tabId: "tab-Maths", q: "दो रेलगाड़ियाँ, जिनकी लंबाई क्रमशः 400 मीटर और 600 मीटर है, समांतर पटरियों पर विपरीत दिशा में 52 किमी/घंटा और 38 किमी/घंटा की गति से चल रही हैं। वे एक दूसरे को पार करने में कितना समय लेंगी?", options: ["30 सेकंड", "35 सेकंड", "40 सेकंड", "45 सेकंड"], correct: 2, solution: "विपरीत दिशा में सापेक्ष गति (Relative Speed) = 52 + 38 = 90 किमी/घंटा।\nइसे मीटर/सेकंड में बदलें: 90 × 5/18 = 25 मीटर/सेकंड।\nकुल दूरी = 400 + 600 = 1000 मीटर।\nसमय = दूरी / गति = 1000 / 25 = 40 सेकंड।" },
            { subject: "Maths", tabId: "tab-Maths", q: "किसी शंकु (Cone) के छिन्नक (Frustum) के दोनों वृत्ताकार सिरों की त्रिज्याएं क्रमशः 7 सेमी और 14 सेमी हैं। यदि इसकी ऊंचाई 24 सेमी है, तो इसका आयतन क्या होगा? (π = 22/7)", options: ["8624 घन सेमी", "4312 घन सेमी", "1078 घन सेमी", "2156 घन सेमी"], correct: 0, solution: "छिन्नक के आयतन का सूत्र: V = (1/3)πh(R² + r² + Rr)\nV = (1/3) × (22/7) × 24 × (14² + 7² + 14×7)\nV = 8 × (22/7) × (196 + 49 + 98)\nV = (176/7) × 343 = 176 × 49 = 8624 घन सेमी।" },
            { subject: "Maths", tabId: "tab-Maths", q: "A और B की वर्तमान आयु का अनुपात 5:8 है। 8 वर्ष बाद, उनकी आयु का अनुपात 3:4 हो जाएगा। A की वर्तमान आयु क्या है?", options: ["15 वर्ष", "20 वर्ष", "25 वर्ष", "10 वर्ष"], correct: 3, solution: "वर्तमान अनुपात 5:8 (अंतर 3)। 8 वर्ष बाद 3:4 (अंतर 1)।\nअनुपात के अंतर को समान करने के लिए 3:4 को 3 से गुणा करें = 9:12.\nअब A: 5 से 9 हुआ (4 इकाई की वृद्धि), B: 8 से 12 हुआ (4 इकाई की वृद्धि)।\n4 इकाई = 8 वर्ष ➔ 1 इकाई = 2 वर्ष।\nA की वर्तमान आयु = 5 इकाई = 5 × 2 = 10 वर्ष।" },
            { subject: "Maths", tabId: "tab-Maths", q: "3 sin²θ + 4 cos²θ का न्यूनतम (Minimum) मान क्या होगा?", options: ["3", "4", "5", "7"], correct: 0, solution: "व्यंजक a sin²θ + b cos²θ का न्यूनतम मान a और b में से जो भी छोटा हो, वह होता है। चूँकि 3 < 4 है, अतः न्यूनतम मान 3 होगा।" },
            { subject: "Maths", tabId: "tab-Maths", q: "यदि (x - y) का 50% = (x + y) का 30% है, तो y, x का कितने प्रतिशत है?", options: ["20%", "25%", "33.33%", "40%"], correct: 1, solution: "50(x - y) = 30(x + y) ➔ 5x - 5y = 3x + 3y ➔ 2x = 8y ➔ x/y = 4/1 ➔ x=4, y=1.\nप्रतिशत = (y/x) × 100 = (1/4) × 100 = 25%." },
            { subject: "Maths", tabId: "tab-Maths", q: "3 ठोस धात्विक गोलों, जिनकी त्रिज्याएं क्रमशः 3 सेमी, 4 सेमी और 5 सेमी हैं, को पिघलाकर एक नया बड़ा ठोस गोला बनाया जाता है। नए गोले की त्रिज्या क्या होगी?", options: ["6 सेमी", "7 सेमी", "8 सेमी", "12 सेमी"], correct: 0, solution: "नए गोले का आयतन = तीनों गोलों के आयतनों का योग।\n(4/3)πR³ = (4/3)π(3³ + 4³ + 5³) ➔ R³ = 27 + 64 + 125 = 216 ➔ R = 6 सेमी।" },
            { subject: "Maths", tabId: "tab-Maths", q: "₹4500 को A, B, C में इस प्रकार बांटा गया है कि A : B = 2 : 3 और B : C = 6 : 5 है। C का हिस्सा ज्ञात करें।", options: ["₹1000", "₹1200", "₹1500", "₹1800"], correct: 2, solution: "A:B = 2:3 (इसे 2 से गुणा करें ➔ 4:6) और B:C = 6:5.\nअतः A:B:C = 4:6:5.\nकुल अनुपात = 4+6+5 = 15 इकाई = ₹4500 ➔ 1 इकाई = ₹300.\nC का हिस्सा = 5 इकाई = 5 × 300 = ₹1500." },
            { subject: "Maths", tabId: "tab-Maths", q: "एक समबाहु त्रिभुज (Equilateral triangle) के अंदर एक बिंदु से तीनों भुजाओं पर डाले गए लम्बों की लंबाई क्रमशः √3, 2√3 और 5√3 सेमी है। त्रिभुज का क्षेत्रफल क्या है?", options: ["64√3", "48√3", "36√3", "72√3"], correct: 0, solution: "समबाहु त्रिभुज की ऊंचाई (h) = लम्बों का योग = √3 + 2√3 + 5√3 = 8√3 सेमी।\nऊंचाई h = (√3/2)a ➔ 8√3 = (√3/2)a ➔ a = 16 सेमी।\nक्षेत्रफल = (√3/4)a² = (√3/4) × 16 × 16 = 64√3 वर्ग सेमी।" },
            { subject: "Maths", tabId: "tab-Maths", q: "x + y + z = 10 और x² + y² + z² = 30 है, तो xy + yz + zx का मान क्या होगा?", options: ["35", "40", "45", "50"], correct: 0, solution: "बीजगणित सर्वसमिका: (x+y+z)² = x² + y² + z² + 2(xy + yz + zx)\n(10)² = 30 + 2(xy + yz + zx)\n100 - 30 = 2(xy + yz + zx) ➔ 70 = 2(xy + yz + zx) ➔ xy + yz + zx = 35." },
            { subject: "Maths", tabId: "tab-Maths", q: "दो पाइप किसी टंकी को क्रमशः 15 और 20 घंटे में भर सकते हैं, और तीसरा पाइप उसे 30 घंटे में खाली कर सकता है। यदि तीनों को एक साथ खोल दिया जाए, तो खाली टंकी कितने घंटे में भरेगी?", options: ["10 घंटे", "12 घंटे", "15 घंटे", "20 घंटे"], correct: 1, solution: "कुल कार्य (LCM) = 60 यूनिट। \nक्षमता: A = +4, B = +3, C = -2.\nतीनों की कुल क्षमता = 4 + 3 - 2 = 5 यूनिट/घंटा।\nटंकी भरने में लगा समय = 60 / 5 = 12 घंटे।" },
            { subject: "Maths", tabId: "tab-Maths", q: "8 क्रमिक सम संख्याओं (Consecutive even numbers) का औसत 65 है। सबसे बड़ी और सबसे छोटी संख्या का अंतर क्या है?", options: ["10", "12", "14", "16"], correct: 2, solution: "n क्रमिक सम/विषम संख्याओं में सबसे बड़ी और सबसे छोटी संख्या का अंतर हमेशा (n-1) × 2 होता है।\nयहाँ n = 8 है, तो अंतर = (8-1) × 2 = 7 × 2 = 14." },
            { subject: "Maths", tabId: "tab-Maths", q: "यदि a/b = 2/3 और b/c = 4/5 है, तो (a+b)/(b+c) का मान क्या होगा?", options: ["20/27", "10/27", "27/20", "14/27"], correct: 0, solution: "अनुपात को मिलाएं: a:b = 8:12, b:c = 12:15 ➔ a:b:c = 8:12:15.\n(a+b)/(b+c) = (8+12) / (12+15) = 20 / 27." },
            { subject: "Maths", tabId: "tab-Maths", q: "दो वृत्तों के क्षेत्रफलों का अनुपात 16:25 है। उनकी परिधियों (Circumferences) का अनुपात क्या होगा?", options: ["4:5", "16:25", "256:625", "2:5"], correct: 0, solution: "क्षेत्रफलों का अनुपात = r₁² / r₂² = 16/25 ➔ त्रिज्याओं का अनुपात (r₁/r₂) = 4/5.\nपरिधियों का अनुपात त्रिज्याओं के अनुपात के बराबर होता है, अतः 4:5 होगा।" },
            { subject: "Maths", tabId: "tab-Maths", q: "3 की घात 25 + 3 की घात 26 + 3 की घात 27 + 3 की घात 28, निम्नलिखित में से किस संख्या से पूर्णतः विभाज्य है?", options: ["11", "16", "30", "40"], correct: 3, solution: "व्यंजक = 3²⁵ (1 + 3¹ + 3² + 3³) = 3²⁵ (1 + 3 + 9 + 27) = 3²⁵ × 40. \nचूँकि 40 इसका एक गुणनखंड है, इसलिए यह संख्या 40 से पूर्णतः विभाज्य है।" },
            { subject: "Maths", tabId: "tab-Maths", q: "₹8400 की एक राशि साधारण ब्याज पर 3 वर्षों में ₹10416 हो जाती है। उसी ब्याज दर पर ₹10000 की राशि 2 वर्षों में कितनी हो जाएगी?", options: ["₹11600", "₹11800", "₹12000", "₹12200"], correct: 0, solution: "3 वर्ष का ब्याज = 10416 - 8400 = ₹2016 ➔ 1 वर्ष का ब्याज = ₹672.\nदर (R) = (672 / 8400) × 100 = 8%.\n₹10000 पर 8% की दर से 2 वर्ष का साधारण ब्याज = (10000 × 8 × 2) / 100 = ₹1600.\nकुल राशि (मिश्रधन) = 10000 + 1600 = ₹11600." },
            { subject: "Maths", tabId: "tab-Maths", q: "किसी आयत का परिमाप 50 सेमी है और इसके विकर्ण की लंबाई 17 सेमी है। आयत का क्षेत्रफल क्या होगा?", options: ["120 वर्ग सेमी", "144 वर्ग सेमी", "168 वर्ग सेमी", "160 वर्ग सेमी"], correct: 2, solution: "परिमाप = 2(L+B) = 50 ➔ L+B = 25.\nविकर्ण = √(L²+B²) = 17 ➔ L²+B² = 289.\nसूत्र: (L+B)² = L² + B² + 2LB ➔ (25)² = 289 + 2(Area) ➔ 625 - 289 = 2(Area) ➔ 336 = 2(Area) ➔ Area = 168 वर्ग सेमी।" },
            { subject: "Maths", tabId: "tab-Maths", q: "12 और 18 का तृतीय आनुपातिक (Third proportional) क्या है?", options: ["24", "27", "30", "36"], correct: 1, solution: "तृतीय आनुपातिक (c) का सूत्र: b² / a\nयहाँ a = 12, b = 18. \nc = (18 × 18) / 12 = 324 / 12 = 27." },

            { subject: "Hindi", tabId: "tab-Hindi", q: "'अधित्यका' का सटीक विलोम शब्द क्या है?", options: ["उपत्यका", "पर्वत", "घाटी", "समतल"], correct: 0, solution: "'अधित्यका' का अर्थ पहाड़ के ऊपर की समतल भूमि होता है, जबकि इसका सटीक विलोम 'उपत्यका' (पहाड़ के नीचे की तलहटी/घाटी) होता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'षडानन' शब्द का सही संधि विच्छेद क्या होगा?", options: ["षड् + आनन", "षट् + आनन", "षट + नन", "षडा + नन"], correct: 1, solution: "'षडानन' का सही संधि विच्छेद 'षट् + आनन' है। यह 'व्यंजन संधि' का उदाहरण है जहाँ प्रथम वर्ण 'ट्' अपने ही वर्ग के तीसरे वर्ण 'ड्' में बदल जाता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'उरग' किसका पर्यायवाची शब्द है?", options: ["पक्षी", "हिरण", "सांप", "कमल"], correct: 2, solution: "'उरग' का अर्थ होता है छाती (उर) के बल गमन करने वाला। यह 'सांप' (सर्प, भुजंग, विषधर) का प्रसिद्ध पर्यायवाची है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'जिसके पास कुछ भी न हो' वाक्यांश के लिए एक शब्द है:", options: ["दरिद्र", "अकिंचन", "निर्धन", "गरीब"], correct: 1, solution: "जिसके पास कुछ भी (कोई धन-संपत्ति) न हो, उसके लिए सबसे सटीक और साहित्यिक एक शब्द 'अकिंचन' होता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'गूलर का फूल होना' मुहावरे का सही अर्थ क्या है?", options: ["बहुत सुंदर होना", "दुर्लभ होना (दिखाई न देना)", "मूर्ख होना", "अत्यधिक क्रोधित होना"], correct: 1, solution: "चूँकि गूलर के पेड़ में फूल आसानी से दिखाई नहीं देते, इसलिए 'गूलर का फूल होना' मुहावरे का अर्थ है 'दुर्लभ होना' या बहुत दिनों तक दिखाई न देना।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'यथाशीघ्र' शब्द में कौन सा समास है?", options: ["तत्पुरुष", "द्विगु", "अव्ययीभाव", "बहुव्रीहि"], correct: 2, solution: "'यथाशीघ्र' (जितना शीघ्र हो सके) में पूर्व पद 'यथा' एक अव्यय (अविकारी शब्द) है, इसलिए यह 'अव्ययीभाव समास' का उदाहरण है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "निम्नलिखित में से शुद्ध वर्तनी वाला शब्द चुनें:", options: ["कवित्री", "कवयित्री", "कवियत्री", "कवयीत्री"], correct: 1, solution: "'कवि' का शुद्ध स्त्रीलिंग रूप 'कवयित्री' होता है। एसएससी और अन्य परीक्षाओं में यह सबसे ज्यादा पूछा जाने वाला शब्द है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'मृगेंद्र' किसका पर्यायवाची है?", options: ["हिरण", "शेर (शार्दूल)", "हाथी", "सांप"], correct: 1, solution: "'मृगेंद्र' (मृगों या पशुओं का राजा) 'शेर' (Lion / सिंह, शार्दूल, केसरी) का पर्यायवाची है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'अतिवृष्टि' का विलोम शब्द है:", options: ["अनावृष्टि", "न्यूनवृष्टि", "सूखा", "बंजर"], correct: 0, solution: "'अतिवृष्टि' (अत्यधिक वर्षा होना) का सटीक विलोम 'अनावृष्टि' (बिल्कुल वर्षा न होना) होता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "इनमें से कौन सा शब्द 'पुल्लिंग' नहीं है?", options: ["पानी", "हाथी", "दही", "नदी"], correct: 3, solution: "हिंदी व्याकरण में पानी, हाथी, दही (इकारांत होने के बावजूद) पुल्लिंग (Masculine) शब्द माने जाते हैं। 'नदी' एक स्त्रीलिंग (Feminine) शब्द है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'कान काटना' मुहावरे का अर्थ है:", options: ["चतुर होना (मात देना)", "बहरा होना", "शिकायत करना", "दर्द होना"], correct: 0, solution: "'कान काटना' मुहावरे का अर्थ है किसी को चालाकी या बुद्धिमानी में 'मात देना' या बहुत 'चतुर होना'।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'पीतांबर' में कौन सा समास है?", options: ["कर्मधारय", "बहुव्रीहि", "द्विगु", "तत्पुरुष"], correct: 1, solution: "'पीतांबर' (पीला है अंबर/वस्त्र जिसका) विशेष रूप से भगवान विष्णु या कृष्ण के लिए प्रयुक्त होता है, अतः यहाँ 'बहुव्रीहि समास' प्रमुख है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "निम्नलिखित में से 'तद्भव' शब्द पहचानें:", options: ["अग्नि", "मयूर", "आँख", "कर्ण"], correct: 2, solution: "'आँख' एक तद्भव (हिंदी) शब्द है, जिसका संस्कृत (तत्सम) रूप 'अक्षि' होता है। अग्नि, मयूर और कर्ण तत्सम शब्द हैं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'जंगल में लगने वाली आग' को क्या कहते हैं?", options: ["दावानल", "बड़वानल", "जठरानल", "अनल"], correct: 0, solution: "जंगल की आग को 'दावानल' (या दावाग्नि), समुद्र की आग को 'बड़वानल', और पेट की आग (भूख) को 'जठरानल' कहते हैं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'तरनि तनूजा तट तमाल तरुवर बहु छाए' - इस पंक्ति में कौन सा अलंकार है?", options: ["यमक", "उपमा", "अनुप्रास", "श्लेष"], correct: 2, solution: "इस पंक्ति में 'त' वर्ण की बार-बार आवृत्ति (Repetition) हो रही है। जहाँ एक ही वर्ण बार-बार आए, वहाँ 'अनुप्रास अलंकार' होता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "शुद्ध वाक्य का चयन करें:", options: ["मेरे को बाजार जाना है।", "मुझे बाजार जाना है।", "मुझको बाजार जाना है।", "अपुन को बाजार जाना है।"], correct: 1, solution: "व्याकरण की दृष्टि से 'मुझे बाजार जाना है' पूर्णतः शुद्ध वाक्य है। सर्वनाम के साथ 'को' (मेरे को) का प्रयोग अशुद्ध माना जाता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'पाश्चात्य' का विलोम शब्द क्या है?", options: ["पौर्वात्य", "पूर्वी", "नवीन", "आधुनिक"], correct: 0, solution: "'पाश्चात्य' (पश्चिमी देशों से संबंधित) का शुद्ध विलोम 'पौर्वात्य' (पूर्वी देशों से संबंधित) होता है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'मनोरथ' का संधि विच्छेद क्या होगा?", options: ["मनो + रथ", "मन: + रथ", "मन + ओरथ", "मना + रथ"], correct: 1, solution: "'मनोरथ' का सही संधि विच्छेद 'मनः + रथ' होता है। यह 'विसर्ग संधि' का एक बहुत ही महत्वपूर्ण उदाहरण है।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "जो कभी बूढ़ा न हो, उसे क्या कहते हैं?", options: ["अमर", "अजर", "तरुण", "युवा"], correct: 1, solution: "जो कभी मरे न उसे 'अमर' कहते हैं, और जो कभी बूढ़ा न हो (जिस पर जरा/बुढ़ापा न आए) उसे 'अजर' कहते हैं।" },
            { subject: "Hindi", tabId: "tab-Hindi", q: "'आग में घी डालना' मुहावरे का सही अर्थ है:", options: ["हवन करना", "क्रोध को और अधिक भड़काना", "शांति स्थापित करना", "महंगी वस्तु बर्बाद करना"], correct: 1, solution: "'आग में घी डालना' मुहावरे का अर्थ है किसी विवाद या किसी व्यक्ति के 'क्रोध को और अधिक भड़काना'।" }
        ],       
    };

    const questions = allTestDatabase[testNumber] || allTestDatabase["1"];
    let currentIndex = 0;
    let userAnswers = {}; 
    let timeInSeconds = 60 * 60; // 60 Minutes
    let timerInterval;

    function startTimer() {
        timerInterval = setInterval(() => {
            if (timeInSeconds <= 0) { clearInterval(timerInterval); submitTest(); return; }
            timeInSeconds--;
            document.getElementById('timer').innerText = 
                Math.floor(timeInSeconds / 60).toString().padStart(2, '0') + ":" + (timeInSeconds % 60).toString().padStart(2, '0');
        }, 1000);
    }

    function loadQuestion() {
        const q = questions[currentIndex];
        document.getElementById("q-no").innerText = currentIndex + 1;
        document.getElementById("q-section-name").innerText = q.subject; 
        document.getElementById("question-text").innerText = q.q;
        
        let optionsHTML = "";
        let labels = ["A", "B", "C", "D"];
        q.options.forEach((opt, i) => {
            let isSelected = (userAnswers[currentIndex] === i) ? "selected" : "";
            let isChecked = (userAnswers[currentIndex] === i) ? "checked" : "";
            optionsHTML += `
                <label class="option-card ${isSelected}" onclick="selectOption(${i})">
                    <input type="radio" name="option" value="${i}" ${isChecked}>
                    <span class="opt-label">${labels[i]}.</span><span class="opt-text">${opt}</span>
                </label>`;
        });
        document.getElementById("options-container").innerHTML = optionsHTML;
        document.getElementById("prev-btn").style.display = (currentIndex === 0) ? "none" : "block";
        document.getElementById("next-btn").style.display = (currentIndex === questions.length - 1) ? "none" : "block";
        
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(q.tabId).classList.add('active');
        renderPalette();
    }

    function goToSection(subject) {
        let index = questions.findIndex(q => q.subject === subject);
        if(index !== -1) { 
            let selected = document.querySelector('input[name="option"]:checked');
            if(selected) userAnswers[currentIndex] = parseInt(selected.value);
            currentIndex = index; 
            loadQuestion(); 
        }
    }

    function selectOption(index) {
        document.querySelectorAll(".option-card").forEach(c => c.classList.remove("selected"));
        document.querySelectorAll('input[name="option"]').forEach(i => i.checked = false);
        document.querySelectorAll(".option-card")[index].classList.add("selected");
        document.querySelectorAll('input[name="option"]')[index].checked = true;
    }

    function clearResponse() {
        document.querySelectorAll(".option-card").forEach(c => c.classList.remove("selected"));
        document.querySelectorAll('input[name="option"]').forEach(i => i.checked = false);
        delete userAnswers[currentIndex];
        renderPalette(); 
    }

    function prevQuestion() {
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value);
        if(currentIndex > 0) { currentIndex--; loadQuestion(); }
    }

    function nextQuestion() {
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value);
        if(currentIndex < questions.length - 1) { 
            currentIndex++; loadQuestion(); 
        }
    }

    function saveAndNext() {
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value);
        
        if(currentIndex < questions.length - 1) { 
            currentIndex++; 
            loadQuestion(); 
        } else { 
            alert("यह आखिरी प्रश्न है! अब 'Submit' पर क्लिक करें।"); 
            renderPalette();
        }
    }

    function submitTest() {
        clearInterval(timerInterval);
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value); 

        let resultData = {
            testId: testNumber,
            total: questions.length, score: 0, correct: 0, incorrect: 0, unattempted: 0,
            sections: {
                "Reasoning": { c: 0, i: 0, u: 0, s: 0 },
                "General Knowledge": { c: 0, i: 0, u: 0, s: 0 },
                "Maths": { c: 0, i: 0, u: 0, s: 0 },
                "Hindi": { c: 0, i: 0, u: 0, s: 0 }
            },
            questionsData: questions, 
            answersData: userAnswers
        };

        questions.forEach((q, index) => {
            let ans = userAnswers[index];
            if (ans === undefined) { 
                resultData.unattempted++; resultData.sections[q.subject].u++; 
            } else if (ans === q.correct) { 
                resultData.correct++; 
                resultData.score += 2; // +2 Marks
                resultData.sections[q.subject].c++; 
                resultData.sections[q.subject].s += 2;
            } else { 
                resultData.incorrect++; 
                resultData.score -= 0.25; // -0.25 Negative Marking (1/8 of 2)
                resultData.sections[q.subject].i++;
                resultData.sections[q.subject].s -= 0.25;
            }
        });

        resultData.accuracy = resultData.correct + resultData.incorrect > 0 ? ((resultData.correct / (resultData.correct + resultData.incorrect)) * 100).toFixed(2) : 0;
        
        // हर टेस्ट का डेटा अलग सेव करने के लिए "testNumber" को key में जोड़ें
        localStorage.setItem("mySscGdMockTestResult_" + testNumber, JSON.stringify(resultData));
        window.location.replace("ssc-gd-mock-result.html?test=" + testNumber);
    }

    function togglePalette() {
        document.getElementById('palette-drawer').classList.toggle('open');
        document.getElementById('palette-overlay').classList.toggle('open');
    }

    function renderPalette() {
        const subjects = ["Reasoning", "General Knowledge", "Maths", "Hindi"];
        let html = "";
        subjects.forEach(sub => {
            html += `<div class="palette-section"><h4>${sub}</h4><div class="palette-grid">`;
            questions.forEach((q, i) => {
                if(q.subject === sub) {
                    let stateClass = "";
                    if(userAnswers[i] !== undefined) stateClass = "answered";
                    if(i === currentIndex) stateClass = "current";
                    html += `<div class="q-bubble ${stateClass}" onclick="jumpToQuestion(${i})">${i+1}</div>`;
                }
            });
            html += `</div></div>`;
        });
        document.getElementById('palette-content').innerHTML = html;
    }

    function jumpToQuestion(index) {
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value);
        currentIndex = index;
        loadQuestion();
        togglePalette();
    }

    window.onload = function() { loadQuestion(); startTimer(); };
</script>
