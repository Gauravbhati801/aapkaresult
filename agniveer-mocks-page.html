<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agniveer Test Dashboard - AapkaResult.in</title>
    <link rel="canonical" href="https://aapkaresult.in/agniveer-mocks-page.html">
    <link rel="stylesheet" href="style.css">
    <style>
        .app-container { max-width: 600px; margin: 0 auto; background: rgba(30, 27, 75, 0.4); min-height: 100vh; backdrop-filter: blur(12px); border-left: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1);}
        .top-header { background: rgba(15, 23, 42, 0.8); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 10; }
        .back-btn { font-size: 1.5rem; margin-right: 15px; cursor: pointer; color: #38bdf8;}
        .page-title { font-weight: bold; color: #fff; font-size: 1.1rem; }
        .test-list { padding: 15px; }
        .test-card { background: rgba(255, 255, 255, 0.07); border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        .test-title { font-size: 1.05rem; font-weight: bold; color: #fff; margin-bottom: 5px; }
        .test-meta { font-size: 0.85rem; color: #cbd5e1; margin-bottom: 12px; }
        .test-actions { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 6px; font-weight: bold; font-size: 0.9rem; cursor: pointer; text-align: center; text-decoration: none;}
        .btn-start { background: #38bdf8; color: #0f172a; }
        .btn-view { background: rgba(56, 189, 248, 0.2); color: #38bdf8; border: 1px solid #38bdf8; }
        .btn-reattempt { background: #22c55e; color: white; }
        .share-banner { background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(34, 197, 94, 0.2)); border-radius: 12px; padding: 15px; margin: 15px; border: 1px solid rgba(255,255,255,0.15); text-align: center;}
        .share-title { font-weight: bold; color: #fff; margin-bottom: 5px; font-size: 1rem;}
        .share-desc { color: #cbd5e1; font-size: 0.85rem; margin-bottom: 12px;}
        .btn-share { background: #25d366; color: white; display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: 10px; border-radius: 6px; font-weight: bold; border: none; cursor: pointer;}
    </style>
</head>
<body>
   <div class="main-container">
    <div class="app-container">
        <div class="top-header">
            <span class="back-btn" onclick="window.location.href='index.html'">←</span>
            <span class="page-title">Army Agniveer Free Test Series</span>
        </div>

        <div class="share-banner">
            <div class="share-title">🚀 दोस्तों के साथ शेयर करें!</div>
            <div class="share-desc">अगर आपको हमारे फ्री टेस्ट पसंद आ रहे हैं, तो अपने फौजी भाइयों की मदद के लिए इसे WhatsApp ग्रुप्स में ज़रूर शेयर करें।</div>
            <button class="btn-share" onclick="shareDashboard()">Share on WhatsApp</button>
        </div>

        <div class="test-list">
            <div class="test-card">
                <div class="test-title">Army Agniveer GD - Practice Set 01</div>
                <div class="test-meta">50 Qs • 100 Marks • 60 Mins</div>
                <div class="test-actions" id="action-box-1">
                    <button class="btn btn-start" onclick="window.location.href='agniveer-mock-button.html?test=1'">Start Test</button>
                </div>
            </div>
            </div>
    </div>
   </div>

<script>
    function shareDashboard() {
        const shareText = "जय हिंद भाइयों! 🇮🇳 अगर आप भी Army Agniveer 2026 लिखित परीक्षा की तैयारी कर रहे हैं, तो AapkaResult.in पर 100% फ्री ऑनलाइन मॉक टेस्ट (विस्तृत हल के साथ) ज़रूर दें। अभी टेस्ट शुरू करें:";
        const shareUrl = window.location.href;
        window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(shareText + " " + shareUrl));
    }
</script>
</body>
</html>
