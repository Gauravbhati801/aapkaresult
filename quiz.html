<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Test</title>
    <style>
        /* --- CSS (डिज़ाइन) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #f4f6f9; overflow-x: hidden;}
        .app-container { max-width: 600px; margin: 0 auto; background-color: #fff; min-height: 100vh; display: flex; flex-direction: column; position: relative;}
        
        .top-header { background: #1a233a; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .time-box { display: flex; flex-direction: column;}
        .time { font-size: 1.2rem; font-weight: bold; color: #ffeb3b; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: white; }
        
        .tabs { display: flex; overflow-x: auto; background: #fff; border-bottom: 1px solid #ddd; }
        .tab { padding: 12px 15px; white-space: nowrap; color: #666; font-weight: bold; cursor: pointer; }
        .tab.active { color: #1a233a; border-bottom: 3px solid #1a233a; background: #f8f9fa; }
        
        .question-meta { display: flex; align-items: center; padding: 10px 15px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .q-number { background: #888; color: white; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-weight: bold; font-size: 0.9rem;}
        .q-marks { flex-grow: 1; color: #28a745; font-weight:bold;}
        .q-marks .negative { color: #d9534f; margin-left: 5px; }
        
        .question-area { padding: 20px 15px; flex-grow: 1; background: #f4f6f9; }
        .question-text { font-size: 1.1rem; margin-bottom: 20px; color: #222; line-height: 1.5;}
        .option-card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 15px; display: flex; align-items: center; cursor: pointer; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);}
        .option-card input { display: none; }
        .option-card.selected { border-color: #2b82c9; background-color: #eaf4fc; }
        .opt-label { margin-right: 15px; font-weight: bold; color: #555; }
        
        .bottom-actions { background: #fff; border-top: 1px solid #ddd; padding: 10px; display: flex; gap: 5px; flex-wrap: wrap;}
        .btn { padding: 12px 10px; border-radius: 5px; font-weight: bold; cursor: pointer; flex: 1; border: none; font-size: 0.8rem; min-width: 70px; }
        .btn-submit { background: #ff4d4d; color: white; }
        .btn-clear { background: #fff; color: #333; border: 1px solid #ccc; }
        .btn-prev { background: #6c757d; color: white; }
        .btn-save { background: #2b82c9; color: white; }

        /* =========================================
           Question Palette (साइड पैनल) का डिज़ाइन
           ========================================= */
        .palette-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99; display: none; }
        .palette-overlay.open { display: block; }
        
        .palette-drawer { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: #fff; z-index: 100; box-shadow: -2px 0 10px rgba(0,0,0,0.1); transition: right 0.3s ease; display: flex; flex-direction: column;}
        .palette-drawer.open { right: 0; }
        
        .palette-header { padding: 15px; background: #1a233a; color: white; display: flex; justify-content: space-between; align-items: center; font-weight: bold;}
        .close-btn { cursor: pointer; font-size: 1.2rem; }
        
        .palette-legend { display: flex; justify-content: space-around; padding: 10px; background: #f8f9fa; font-size: 0.8rem; border-bottom: 1px solid #ddd; font-weight: bold;}
        .legend-item { display: flex; align-items: center; gap: 5px; color: #555;}
        .legend-bubble { width: 15px; height: 15px; border-radius: 50%; }
        
        .palette-content { padding: 15px; overflow-y: auto; flex-grow: 1; }
        .palette-section { margin-bottom: 20px; }
        .palette-section h4 { margin-bottom: 10px; font-size: 0.95rem; color: #1a233a; border-bottom: 1px solid #eee; padding-bottom: 5px;}
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        
        .q-bubble { width: 35px; height: 35px; border-radius: 50%; display: flex; justify-content: center; align-items: center; background: #fff; border: 1px solid #ccc; cursor: pointer; font-weight: bold; font-size: 0.85rem; color: #555;}
        .q-bubble.answered { background: #4caf50; color: white; border-color: #4caf50; }
        .q-bubble.current { border: 2px solid #007bff; background: #eaf4fc; color: #007bff;}
    </style>
</head>
<body>
<div class="app-container">
    
    <header class="top-header">
        <div class="time-box">

    <main class="question-area">
        <h3 id="question-text" class="question-text">Loading...</h3>
        <div id="options-container"></div>

    <div id="palette-drawer" class="palette-drawer">
        <div class="palette-header">
            <span>Question Palette</span>

        </div>
        <div id="palette-content" class="palette-content">
            </div>
    </div>

</div>

    let currentIndex = 0;

    function startTimer() {
        timerInterval = setInterval(() => {
            if (timeInSeconds <= 0) { clearInterval(timerInterval); submitTest(); return; }
            timeInSeconds--;
            document.getElementById('timer').innerText = 
                Math.floor(timeInSeconds / 60).toString().padStart(2, '0') + ":" + (timeInSeconds % 60).toString().padStart(2, '0');
        }, 1000);
    }

    function loadQuestion() {
        const q = questions[currentIndex];
        document.getElementById("q-no").innerText = currentIndex + 1;
        document.getElementById("q-section-name").innerText = q.subject; // विषय का नाम दिखाएं
        document.getElementById("question-text").innerText = q.q;
        
        let optionsHTML = "";
        let labels = ["A", "B", "C", "D"];
        q.options.forEach((opt, i) => {
            let isSelected = (userAnswers[currentIndex] === i) ? "selected" : "";
            let isChecked = (userAnswers[currentIndex] === i) ? "checked" : "";
            optionsHTML += `
                <label class="option-card ${isSelected}" onclick="selectOption(${i})">
                    <input type="radio" name="option" value="${i}" ${isChecked}>
                    <span class="opt-label">${labels[i]}.</span><span class="opt-text">${opt}</span>
                </label>`;
        });
        document.getElementById("options-container").innerHTML = optionsHTML;

        document.getElementById("prev-btn").style.display = (currentIndex === 0) ? "none" : "block";
        
        // टैब हाईलाइट करना
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(q.tabId).classList.add('active');

        // चार्ट (Palette) अपडेट करना
        renderPalette();
    }

    function goToSection(subject) {
        let index = questions.findIndex(q => q.subject === subject);
        if(index !== -1) { 
            // अगर कोई ऑप्शन टिक किया था तो उसे सेव कर लें
            let selected = document.querySelector('input[name="option"]:checked');
            if(selected) userAnswers[currentIndex] = parseInt(selected.value);
            
            currentIndex = index; 
            loadQuestion(); 
        }
    }

    function selectOption(index) {
        document.querySelectorAll(".option-card").forEach(c => c.classList.remove("selected"));
        document.querySelectorAll('input[name="option"]').forEach(i => i.checked = false);
        document.querySelectorAll(".option-card")[index].classList.add("selected");
        document.querySelectorAll('input[name="option"]')[index].checked = true;
    }

    function clearResponse() {
        document.querySelectorAll(".option-card").forEach(c => c.classList.remove("selected"));
        document.querySelectorAll('input[name="option"]').forEach(i => i.checked = false);
        delete userAnswers[currentIndex];
        renderPalette(); // चार्ट अपडेट
    }

    function prevQuestion() {
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value);
        if(currentIndex > 0) { currentIndex--; loadQuestion(); }
    }

    function saveAndNext() {
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value);
        
        if(currentIndex < questions.length - 1) { 
            currentIndex++; 
            loadQuestion(); 
        } else { 
            alert("यह आखिरी प्रश्न है! अब 'Submit' पर क्लिक करें।"); 
            renderPalette();
        }
    }

    function submitTest() {
        clearInterval(timerInterval);
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value); 

        let resultData = {
            total: questions.length, score: 0, correct: 0, incorrect: 0, unattempted: 0,
            sections: {
                "General Knowledge": { c: 0, i: 0, u: 0, s: 0 },
                "General Science": { c: 0, i: 0, u: 0, s: 0 },
                "Maths": { c: 0, i: 0, u: 0, s: 0 },
                "Reasoning": { c: 0, i: 0, u: 0, s: 0 }
            },
            questionsData: questions, 
            answersData: userAnswers
        };

        questions.forEach((q, index) => {
            let ans = userAnswers[index];
            if (ans === undefined) { 
                resultData.unattempted++; resultData.sections[q.subject].u++; 
            } else if (ans === q.correct) { 
                resultData.correct++; resultData.score += 2;
                resultData.sections[q.subject].c++; resultData.sections[q.subject].s += 2;
            } else { 
                resultData.incorrect++; 
                resultData.sections[q.subject].i++;
            }
        });

        resultData.accuracy = resultData.correct + resultData.incorrect > 0 ? ((resultData.correct / (resultData.correct + resultData.incorrect)) * 100).toFixed(2) : 0;
        
        localStorage.setItem("myMockTestResult", JSON.stringify(resultData));
        window.location.replace("mock-result.html");
    }

    // ==========================================
    // Question Palette Logic
    // ==========================================
    function togglePalette() {
        document.getElementById('palette-drawer').classList.toggle('open');
        document.getElementById('palette-overlay').classList.toggle('open');
    }

    function renderPalette() {
        const subjects = ["General Knowledge", "General Science", "Maths", "Reasoning"];
        let html = "";
        
        subjects.forEach(sub => {
            html += `<div class="palette-section"><h4>${sub}</h4><div class="palette-grid">`;
            questions.forEach((q, i) => {
                if(q.subject === sub) {
                    let stateClass = "";
                    if(userAnswers[i] !== undefined) stateClass = "answered";
                    if(i === currentIndex) stateClass = "current";
                    
                    // जब कोई गोले पर क्लिक करे तो सीधा उस सवाल पर जाए
                    html += `<div class="q-bubble ${stateClass}" onclick="jumpToQuestion(${i})">${i+1}</div>`;
                }
            });
            html += `</div></div>`;
        });
        document.getElementById('palette-content').innerHTML = html;
    }

    function jumpToQuestion(index) {
        // जाने से पहले मौजूदा सवाल सेव कर लें
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value);
        
        currentIndex = index;
        loadQuestion();
        togglePalette(); // क्लिक करने के बाद पैनल बंद कर दें
    }

    window.onload = function() { loadQuestion(); startTimer(); };
</script>
</body>

</html>
