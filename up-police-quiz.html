            { subject: "General Hindi", tabId: "tab-Hindi", q: "जयशंकर प्रसाद का प्रसिद्ध महाकाव्य कौन सा है?", options: ["साकेत", "कामायनी", "रामचरितमानस", "यामा"], correct: 1, solution: "'कामायनी' जयशंकर प्रसाद द्वारा रचित हिंदी का एक प्रसिद्ध महाकाव्य है। साकेत मैथिलीशरण गुप्त की और रामचरितमानस तुलसीदास की रचना है।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'उज्ज्वल' का सही संधि विच्छेद क्या है?", options: ["उत + ज्वल", "उत् + ज्वल", "उज्ज + वल", "उद् + ज्वल"], correct: 1, solution: "'उज्ज्वल' का सही संधि विच्छेद 'उत् + ज्वल' होता है। यह 'व्यंजन संधि' का एक महत्वपूर्ण उदाहरण है।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'पीतांबर' में कौन सा समास है?", options: ["द्विगु", "तत्पुरुष", "बहुव्रीहि", "अव्ययीभाव"], correct: 2, solution: "'पीतांबर' (पीला है अंबर जिसका) विशेष रूप से भगवान विष्णु (या कृष्ण) के लिए प्रयुक्त होता है, इसलिए इसमें 'बहुव्रीहि समास' है।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'अतिवृष्टि' का विलोम शब्द क्या है?", options: ["अनावृष्टि", "न्यूनवृष्टि", "सुखा", "बंजर"], correct: 0, solution: "अतिवृष्टि (बहुत अधिक बारिश होना) का विलोम 'अनावृष्टि' (बारिश का बिल्कुल न होना / सूखा) होता है।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'चन्द्रमा' का पर्यायवाची शब्द नहीं है:", options: ["शशांक", "राकेश", "सुधांशु", "भानु"], correct: 3, solution: "'भानु' सूर्य का पर्यायवाची है। शशांक, राकेश और सुधांशु चन्द्रमा के पर्यायवाची हैं।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'जिसे जीता न जा सके' के लिए एक शब्द है:", options: ["अमर", "अजेय", "अकथ्य", "अनश्वर"], correct: 1, solution: "जिसे जीता न जा सके उसे 'अजेय' कहते हैं। जो कभी न मरे उसे 'अमर' कहते हैं।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "शुद्ध वर्तनी वाले शब्द का चयन करें:", options: ["कवीत्री", "कवयित्री", "कवियत्री", "कवयीत्री"], correct: 1, solution: "कवि का शुद्ध स्त्रीलिंग शब्द 'कवयित्री' होता है।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'श्रृंगार रस' का स्थायी भाव क्या है?", options: ["उत्साह", "शोक", "रति", "हास्य"], correct: 2, solution: "श्रृंगार रस का स्थायी भाव 'रति' (प्रेम) होता है। इसे 'रसराज' (रसों का राजा) भी कहा जाता है।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'चरण कमल बंदौ हरिराई' पंक्ति में कौन सा अलंकार है?", options: ["उपमा", "यमक", "श्लेष", "रूपक"], correct: 3, solution: "यहाँ 'चरण' (उपमेय) पर 'कमल' (उपमान) का अभेद आरोप है, अर्थात् चरणों को ही कमल मान लिया गया है। अतः यहाँ 'रूपक अलंकार' है।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'अंधे के हाथ बटेर लगना' मुहावरे का सही अर्थ है:", options: ["अंधे को रोशनी मिलना", "अपात्र को बड़ी सफलता मिल जाना", "अंधे व्यक्ति का शिकार करना", "मुसीबत आना"], correct: 1, solution: "'अंधे के हाथ बटेर लगना' मुहावरे का अर्थ है - बिना योग्यता के ही किसी व्यक्ति को बहुत बड़ी सफलता या अच्छी चीज़ मिल जाना।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "इनमें से कौन सा शब्द 'तत्सम' है?", options: ["आँसू", "अश्रु", "आग", "कान"], correct: 1, solution: "'अश्रु' संस्कृत का (तत्सम) शब्द है, जिसका तद्भव 'आँसू' होता है। आग (अग्नि) और कान (कर्ण) तद्भव हैं।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'नयन' शब्द का संधि विच्छेद क्या होगा?", options: ["ने + अन", "नय + अन", "न + अयन", "नौ + अन"], correct: 0, solution: "'नयन' का सही संधि विच्छेद 'ने + अन' होता है। यह 'अयादि स्वर संधि' का उदाहरण है (ए + अ = अय)।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'चौमासा' शब्द में कौन सा समास है?", options: ["द्विगु", "द्वंद्व", "कर्मधारय", "तत्पुरुष"], correct: 0, solution: "'चौमासा' (चार मासों का समूह) में प्रथम पद संख्यावाचक विशेषण है, अतः इसमें 'द्विगु समास' है।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'स्थावर' का विलोम शब्द है:", options: ["अचल", "जंगम", "स्थिर", "चेतन"], correct: 1, solution: "'स्थावर' (एक जगह स्थिर रहने वाला) का सटीक विलोम 'जंगम' (चलने-फिरने वाला) होता है।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "इनमें से कौन सा शब्द 'घोड़ा' का पर्यायवाची है?", options: ["हय", "वारिद", "मृग", "केहरि"], correct: 0, solution: "'हय', बाजि, घोटक, अश्व, तुरंग 'घोड़ा' के पर्यायवाची हैं। वारिद बादल का, मृग हिरन का और केहरि शेर का पर्यायवाची है।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'जो पहले कभी न हुआ हो' के लिए एक शब्द:", options: ["अनोखा", "अद्भुत", "अभूतपूर्व", "अविस्मरणीय"], correct: 2, solution: "वाक्यांश के लिए एक शब्द: 'जो पहले कभी न हुआ हो' उसे 'अभूतपूर्व' कहते हैं।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'कंगाली में आटा गीला' लोकोक्ति का अर्थ है:", options: ["आटा खराब होना", "गरीब होना", "मुसीबत में और मुसीबत आना", "मूर्खता करना"], correct: 2, solution: "इस लोकोक्ति का अर्थ है - पहले से ही परेशानी हो और उसी समय कोई दूसरी 'मुसीबत आ जाना'।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'वीर रस' का स्थायी भाव है:", options: ["उत्साह", "क्रोध", "भय", "वीरता"], correct: 0, solution: "वीर रस का स्थायी भाव 'उत्साह' होता है।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'तरनि तनूजा तट तमाल तरुवर बहु छाए' में कौन सा अलंकार है?", options: ["रूपक", "उपमा", "अनुप्रास", "श्लेष"], correct: 2, solution: "यहाँ 'त' वर्ण की आवृत्ति बार-बार हो रही है, इसलिए यह 'अनुप्रास अलंकार' है।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'आविर्भाव' का सही विलोम क्या होगा?", options: ["प्रभाव", "तिरोभाव", "सम्भाव", "अभाव"], correct: 1, solution: "'आविर्भाव' (प्रकट होना) का सटीक विलोम 'तिरोभाव' (अदृश्य होना) होता है।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'सज्जन' का संधि विच्छेद है:", options: ["सत् + जन", "सज + जन", "सद् + जन", "सजा + जन"], correct: 0, solution: "'सज्जन' का सही संधि विच्छेद 'सत् + जन' होता है (व्यंजन संधि)।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'आसमान सिर पर उठाना' मुहावरे का अर्थ है:", options: ["आसमान देखना", "बहुत शोर करना", "असंभव काम करना", "घमंड करना"], correct: 1, solution: "'आसमान सिर पर उठाना' मुहावरे का अर्थ है - बहुत अधिक 'शोर करना' या उपद्रव मचाना।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "हिंदी में 'सर्वनाम' के कुल कितने भेद होते हैं?", options: ["4", "5", "6", "7"], correct: 2, solution: "हिंदी में सर्वनाम के कुल 6 भेद होते हैं (पुरुषवाचक, निश्चयवाचक, अनिश्चयवाचक, प्रश्नवाचक, संबंधवाचक, निजवाचक)।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'यथासंभव' शब्द में कौन सा समास है?", options: ["तत्पुरुष", "कर्मधारय", "अव्ययीभाव", "बहुव्रीहि"], correct: 2, solution: "'यथासंभव' (संभावना के अनुसार) में पूर्व पद 'यथा' एक अव्यय है, इसलिए यहाँ 'अव्ययीभाव समास' है।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "प्रसिद्ध रचना 'गोदान' के लेखक कौन हैं?", options: ["सुमित्रानंदन पंत", "महादेवी वर्मा", "मुंशी प्रेमचंद", "सूर्यकांत त्रिपाठी 'निराला'"], correct: 2, solution: "'गोदान', 'गबन', 'कर्मभूमि' आदि मुंशी प्रेमचंद के प्रसिद्ध उपन्यास हैं।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'आग में घी डालना' मुहावरे का अर्थ:", options: ["हवन करना", "क्रोध को और भड़काना", "आग बुझाना", "शांति कराना"], correct: 1, solution: "आग में घी डालना मतलब किसी के गुस्से को और अधिक भड़काना।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'नीरोग' का सही संधि विच्छेद है:", options: ["नि + रोग", "नी + रोग", "निः + रोग", "निर्स + रोग"], correct: 2, solution: "'नीरोग' का सही संधि विच्छेद 'निः + रोग' होता है। यह 'विसर्ग संधि' का उदाहरण है।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'राजपुत्र' में कौन सा समास है?", options: ["कर्मधारय", "तत्पुरुष", "अव्ययीभाव", "द्विगु"], correct: 1, solution: "'राजपुत्र' (राजा का पुत्र) में संबंध तत्पुरुष (षष्ठी तत्पुरुष) समास है, क्योंकि इसमें 'का' परसर्ग (कारक) का लोप है।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'मृगेंद्र' किसका पर्यायवाची है?", options: ["हिरण", "शेर (शार्दूल)", "हाथी", "सांप"], correct: 1, solution: "'मृगेंद्र' (मृगों/पशुओं का राजा) शेर (Lion / शार्दूल) का पर्यायवाची है।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'उन्मूलन' का विलोम शब्द क्या है?", options: ["आरोपण", "रोपण", "प्रसार", "विकास"], correct: 1, solution: "उन्मूलन (जड़ से उखाड़ना) का सही विलोम 'रोपण' (लगाना/बोना) होता है।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'अज्ञ' का विलोम शब्द है:", options: ["अल्पज्ञ", "विज्ञ", "बहुज्ञ", "अनजान"], correct: 1, solution: "'अज्ञ' (अज्ञानी/मूर्ख) का विलोम 'विज्ञ' (विद्वान/समझदार) होता है।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'जिसकी कोई उपमा न दी जा सके' के लिए एक शब्द:", options: ["अनुपम", "अद्वितीय", "अतुलनीय", "अनूठा"], correct: 0, solution: "जिसकी कोई उपमा (तुलना) न दी जा सके, उसे 'अनुपम' कहते हैं। अद्वितीय मतलब जिसके समान कोई दूसरा न हो।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'ईद का चाँद होना' मुहावरे का अर्थ है:", options: ["बहुत सुंदर होना", "दर्शन न देना", "बहुत दिनों बाद दिखाई देना", "ईद मनाना"], correct: 2, solution: "'ईद का चाँद होना' मुहावरे का अर्थ है - 'बहुत दिनों बाद दिखाई देना'।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "हिंदी भाषा किस लिपि में लिखी जाती है?", options: ["गुरुमुखी", "देवनागरी", "ब्राह्मी", "रोमन"], correct: 1, solution: "हिंदी भाषा 'देवनागरी' लिपि में लिखी जाती है, जिसका विकास ब्राह्मी लिपि से हुआ है।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "वर्णमाला में संयुक्त व्यंजनों की संख्या कितनी है?", options: ["3", "4", "5", "6"], correct: 1, solution: "हिंदी वर्णमाला में 4 संयुक्त व्यंजन होते हैं: क्ष (क्+ष), त्र (त्+र), ज्ञ (ज्+ञ), और श्र (श्+र)।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "दोहा छंद के प्रत्येक चरण में कितनी मात्राएं होती हैं?", options: ["11, 13", "13, 11", "16, 16", "24, 24"], correct: 1, solution: "दोहा एक अर्धसममात्रिक छंद है। इसके पहले और तीसरे (विषम) चरणों में 13-13 मात्राएँ, तथा दूसरे और चौथे (सम) चरणों में 11-11 मात्राएँ होती हैं।" },
            { subject: "General Hindi", tabId: "tab-Hindi", q: "'अनल' और 'अनिल' का सही अर्थ युग्म है:", options: ["हवा और आग", "आग और हवा", "जल और हवा", "आग और जल"], correct: 1, solution: "समश्रुत भिन्नार्थक शब्द 'अनल' का अर्थ आग (अग्नि) और 'अनिल' का अर्थ हवा (वायु) होता है।" },

            // ================= 38 NUMERICAL ABILITY (MATHS - HARD) - TEST 2 =================
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "A किसी कार्य को 20 दिनों में और B उसी कार्य को 30 दिनों में कर सकता है। दोनों ने मिलकर 5 दिन कार्य किया, फिर A ने कार्य छोड़ दिया। B शेष कार्य को कितने दिनों में पूरा करेगा?", options: ["15 दिन", "17.5 दिन", "20 दिन", "12.5 दिन"], correct: 1, solution: "A और B का 1 दिन का काम = 1/20 + 1/30 = 5/60 = 1/12. <br>5 दिन का काम = 5/12. शेष काम = 1 - 5/12 = 7/12. <br>B शेष काम करेगा = (7/12) × 30 = 210/12 = 17.5 दिन।" },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "यदि एक आयत की लंबाई 20% बढ़ा दी जाए और चौड़ाई 20% घटा दी जाए, तो क्षेत्रफल पर क्या प्रभाव पड़ेगा?", options: ["कोई प्रभाव नहीं", "4% कमी", "4% वृद्धि", "10% कमी"], correct: 1, solution: "क्षेत्रफल में % परिवर्तन का सूत्र = x + y + (xy/100).<br>परिवर्तन = +20 - 20 - (20×20)/100 = -400/100 = -4% (अर्थात 4% की कमी)।" },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "एक बेईमान दुकानदार अपनी वस्तुओं को क्रय मूल्य पर बेचने का दावा करता है, लेकिन 1 किलो की जगह 900 ग्राम के बांट का उपयोग करता है। उसका लाभ प्रतिशत क्या है?", options: ["10%", "11.11%", "9.09%", "12%"], correct: 1, solution: "लाभ = (1000g - 900g) = 100g. <br>लाभ % = (लाभ / दिया गया वजन) × 100 <br>= (100 / 900) × 100 = 100/9 = 11.11%." },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "3000 रुपये का 20% वार्षिक दर से 2 वर्ष का चक्रवृद्धि ब्याज और साधारण ब्याज का अंतर क्या होगा?", options: ["100 रु", "120 रु", "150 रु", "200 रु"], correct: 1, solution: "2 वर्ष के CI और SI के अंतर का सीधा सूत्र: Difference = P(R/100)² <br>अंतर = 3000 × (20/100)² = 3000 × (1/5)² = 3000/25 = 120 रुपये।" },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "दो संख्याओं का LCM 1920 है और HCF 16 है। यदि एक संख्या 128 है, तो दूसरी संख्या ज्ञात करें।", options: ["204", "240", "260", "320"], correct: 1, solution: "सूत्र: पहली संख्या × दूसरी संख्या = HCF × LCM. <br>128 × दूसरी संख्या = 16 × 1920 <br>दूसरी संख्या = (16 × 1920) / 128 = 240." },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "एक रेलगाड़ी 150 मीटर लंबे प्लेटफॉर्म को 15 सेकंड में और एक खंभे को 9 सेकंड में पार करती है। रेलगाड़ी की लंबाई क्या है?", options: ["225 मीटर", "150 मीटर", "200 मीटर", "300 मीटर"], correct: 0, solution: "माना ट्रेन की लंबाई L है। ट्रेन की चाल दोनों स्थितियों में समान होगी। <br>चाल = L/9 = (L+150)/15 <br>तिरछा गुणा: 15L = 9L + 1350 => 6L = 1350 => L = 225 मीटर।" },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "A और B की वर्तमान आयु का अनुपात 4:5 है। 5 वर्ष बाद उनकी आयु का अनुपात 5:6 हो जाएगा। A की वर्तमान आयु क्या है?", options: ["15 वर्ष", "20 वर्ष", "25 वर्ष", "30 वर्ष"], correct: 1, solution: "अनुपात में अंतर (5-4 = 1, 6-5 = 1) समान है। 1 यूनिट का अंतर = 5 वर्ष। <br>A की वर्तमान आयु = 4 यूनिट = 4 × 5 = 20 वर्ष।" },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "एक समबाहु त्रिभुज का क्षेत्रफल 400√3 वर्ग सेमी है। इसका परिमाप (Perimeter) क्या होगा?", options: ["80 सेमी", "120 सेमी", "160 सेमी", "200 सेमी"], correct: 1, solution: "क्षेत्रफल = (√3/4)a² = 400√3 => a² = 1600 => भुजा (a) = 40 सेमी। <br>परिमाप = 3a = 3 × 40 = 120 सेमी।" },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "शांत जल में एक नाव की गति 15 किमी/घंटा है और धारा की गति 3 किमी/घंटा है। नाव को धारा की दिशा में 72 किमी जाने में कितना समय लगेगा?", options: ["3.5 घंटे", "4 घंटे", "4.5 घंटे", "5 घंटे"], correct: 1, solution: "धारा की दिशा में नाव की गति (Downstream speed) = 15 + 3 = 18 किमी/घंटा। <br>समय = दूरी / गति = 72 / 18 = 4 घंटे।" },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "11 संख्याओं का औसत 50 है। यदि पहली 6 संख्याओं का औसत 49 और अंतिम 6 का औसत 52 है, तो छठी संख्या क्या है?", options: ["56", "58", "60", "62"], correct: 0, solution: "11 संख्याओं का कुल योग = 11 × 50 = 550. <br>पहली 6 का योग = 6 × 49 = 294. अंतिम 6 का योग = 6 × 52 = 312. <br>छठी संख्या (जो दो बार गिनी गई) = (294 + 312) - 550 = 606 - 550 = 56." },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "30% और 20% की दो क्रमिक छूट (Successive Discounts) की एकल छूट (Single Discount) क्या होगी?", options: ["50%", "46%", "44%", "40%"], correct: 2, solution: "एकल छूट का सूत्र = x + y - (xy/100). <br>छूट = 30 + 20 - (30×20)/100 = 50 - 6 = 44%." },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "एक चुनाव में दो उम्मीदवार थे। हारने वाले को 40% वोट मिले और वह 2000 वोटों से हार गया। कुल कितने वोट पड़े?", options: ["8000", "10000", "12000", "15000"], correct: 1, solution: "हारने वाले को 40%, तो जीतने वाले को 60% वोट मिले। <br>अंतर = 60% - 40% = 20%. <br>20% = 2000 वोट => 1% = 100 => 100% (कुल वोट) = 10000." },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "यदि x + 1/x = 4 है, तो x² + 1/x² का मान क्या होगा?", options: ["14", "16", "18", "12"], correct: 0, solution: "सूत्र: यदि x + 1/x = a है, तो x² + 1/x² = a² - 2. <br>अतः 4² - 2 = 16 - 2 = 14." },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "किसी धन पर साधारण ब्याज मूलधन का 1/9 है और वर्षों की संख्या दर प्रतिशत के बराबर है। दर प्रतिशत क्या है?", options: ["3%", "3.33%", "4%", "4.5%"], correct: 1, solution: "SI = P/9 और R = T. <br>SI = (P × R × T) / 100 => P/9 = (P × R × R) / 100 <br>R² = 100/9 => R = 10/3 = 3.33%." },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "100 से 200 के बीच कितनी संख्याएँ 3 से पूर्णतः विभाज्य हैं?", options: ["32", "33", "34", "35"], correct: 1, solution: "100 के बाद 3 से कटने वाली पहली संख्या = 102. 200 से पहले अंतिम = 198. <br>पदों की संख्या (n) = [(अंतिम - प्रथम)/3] + 1 <br>= [(198 - 102)/3] + 1 = 96/3 + 1 = 32 + 1 = 33." },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "एक बेलन (Cylinder) की त्रिज्या और ऊँचाई का अनुपात 2:3 है और इसका आयतन 12936 घन सेमी है। इसकी त्रिज्या क्या होगी? (π = 22/7)", options: ["14 सेमी", "21 सेमी", "28 सेमी", "35 सेमी"], correct: 0, solution: "माना त्रिज्या r = 2x, ऊँचाई h = 3x. आयतन = πr²h. <br>(22/7) × (2x)² × 3x = 12936 <br>(22/7) × 12x³ = 12936 => x³ = (12936 × 7) / (22 × 12) = 343 => x = 7. <br>त्रिज्या = 2x = 14 सेमी." },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "50 लीटर के मिश्रण में दूध और पानी का अनुपात 3:2 है। इसमें कितना पानी और मिलाया जाए कि अनुपात 1:1 हो जाए?", options: ["5 लीटर", "10 लीटर", "15 लीटर", "20 लीटर"], correct: 1, solution: "शुरुआत में दूध = 50 × (3/5) = 30L, पानी = 50 × (2/5) = 20L. <br>नया अनुपात 1:1 चाहिए, यानी पानी भी दूध के बराबर (30L) होना चाहिए। <br>मिलाया जाने वाला पानी = 30 - 20 = 10 लीटर।" },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "₹4000 को 2:3:5 में बांटा जाता है। सबसे बड़ा हिस्सा क्या होगा?", options: ["1200 रु", "1500 रु", "2000 रु", "2500 रु"], correct: 2, solution: "कुल अनुपात = 2+3+5 = 10 यूनिट = 4000 रु। <br>1 यूनिट = 400. <br>सबसे बड़ा हिस्सा = 5 यूनिट = 5 × 400 = 2000 रु।" },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "यदि 12 बढ़ई 6 घंटे प्रतिदिन काम करके 24 दिन में 460 कुर्सियां बनाते हैं, तो 18 बढ़ई 8 घंटे काम करके 36 दिन में कितनी कुर्सियां बनाएंगे?", options: ["1260", "1380", "1420", "1560"], correct: 1, solution: "MDH सूत्र: (M1×D1×H1)/W1 = (M2×D2×H2)/W2 <br>(12 × 24 × 6) / 460 = (18 × 36 × 8) / W2 <br>1728 / 460 = 5184 / W2 => W2 = (5184 × 460) / 1728 = 3 × 460 = 1380 कुर्सियां।" },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "एक वर्ग (Square) के विकर्ण की लंबाई 10√2 सेमी है, तो इसका क्षेत्रफल क्या होगा?", options: ["100 वर्ग सेमी", "150 वर्ग सेमी", "200 वर्ग सेमी", "50 वर्ग सेमी"], correct: 0, solution: "वर्ग का विकर्ण = a√2 = 10√2 => भुजा (a) = 10 सेमी. <br>क्षेत्रफल = a² = 10 × 10 = 100 वर्ग सेमी." },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "400 का 15% + 200 का 20% = ?", options: ["80", "100", "120", "140"], correct: 1, solution: "(400 × 15/100) + (200 × 20/100) = 60 + 40 = 100." },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "a:b = 3:4 और b:c = 8:9 है, तो a:c का मान क्या होगा?", options: ["2:3", "3:4", "4:5", "3:8"], correct: 0, solution: "a/c = (a/b) × (b/c) = (3/4) × (8/9) = 24/36 = 2/3 (यानी 2:3)." },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "यदि एक संख्या का 40% 120 है, तो उस संख्या का 60% क्या होगा?", options: ["150", "160", "180", "200"], correct: 2, solution: "संख्या का 40% = 120 => 1% = 3. <br>इसलिए उस संख्या का 60% = 3 × 60 = 180." },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "0.125 को भिन्न (Fraction) में बदलिए:", options: ["1/8", "1/4", "1/5", "1/10"], correct: 0, solution: "0.125 = 125 / 1000. 125 से काटने पर = 1/8." },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "दो संख्याओं का योग 36 है और उनका अंतर 12 है। बड़ी संख्या क्या है?", options: ["20", "24", "26", "30"], correct: 1, solution: "a + b = 36 और a - b = 12. <br>दोनों को जोड़ने पर 2a = 48 => a = 24. (बड़ी संख्या 24 है)।" },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "एक वस्तु को 800 रु में बेचने पर 20% की हानि होती है। 20% लाभ कमाने के लिए उसे कितने में बेचना चाहिए?", options: ["1000", "1100", "1200", "1400"], correct: 2, solution: "CP = (800 / 80) × 100 = 1000 रु। <br>20% लाभ पर SP = 1000 × (120/100) = 1200 रु।" },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "12, 16 और 24 का चतुर्थानुपाती (Fourth Proportional) क्या होगा?", options: ["28", "30", "32", "36"], correct: 2, solution: "सूत्र: a/b = c/x. <br>12/16 = 24/x => x = (16 × 24) / 12 = 32." },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "यदि (a - b)² = 16 और ab = 15 है, तो a² + b² का मान क्या होगा?", options: ["31", "46", "61", "64"], correct: 1, solution: "बीजगणित सूत्र: (a - b)² = a² + b² - 2ab <br>16 = a² + b² - 2(15) => a² + b² = 16 + 30 = 46." },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "एक घनाभ (Cuboid) की विमाएं 10 सेमी x 8 सेमी x 6 सेमी हैं। इसका कुल पृष्ठीय क्षेत्रफल क्या होगा?", options: ["288", "376", "400", "480"], correct: 1, solution: "घनाभ का कुल पृष्ठीय क्षेत्रफल (TSA) = 2(lb + bh + hl) <br>= 2(10×8 + 8×6 + 6×10) = 2(80 + 48 + 60) = 2(188) = 376 वर्ग सेमी." },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "√64 + √36 = ?", options: ["10", "12", "14", "16"], correct: 2, solution: "64 का वर्गमूल 8 है और 36 का वर्गमूल 6 है। <br>8 + 6 = 14." },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "1000 मी की दौड़ में, A, B को 100 मी से हराता है। यदि A की गति 10 मी/से है, तो B की गति क्या है?", options: ["8 मी/से", "9 मी/से", "9.5 मी/से", "10 मी/से"], correct: 1, solution: "A को 1000m पूरी करने में लगा समय = 1000 / 10 = 100 सेकंड। <br>उतने ही समय (100s) में B केवल 900m दौड़ पाता है (1000 - 100)। <br>अतः B की गति = 900 / 100 = 9 मी/से।" },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "25 कुर्सियों का क्रय मूल्य 20 कुर्सियों के विक्रय मूल्य के बराबर है। लाभ % ज्ञात करें।", options: ["20%", "25%", "30%", "33.33%"], correct: 1, solution: "25 CP = 20 SP => CP/SP = 20/25 = 4/5. <br>क्रय मूल्य 4, विक्रय मूल्य 5. लाभ = 1. <br>लाभ % = (1/4) × 100 = 25%." },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "एक पहिये की त्रिज्या 14 सेमी है। 100 चक्कर लगाने में वह कितनी दूरी तय करेगा?", options: ["88 मीटर", "880 मीटर", "8800 मीटर", "8.8 मीटर"], correct: 0, solution: "1 चक्कर में तय दूरी (परिधि) = 2πr = 2 × (22/7) × 14 = 88 सेमी। <br>100 चक्कर में दूरी = 88 × 100 = 8800 सेमी. <br>मीटर में = 8800 / 100 = 88 मीटर।" },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "A, B और C एक काम को क्रमशः 10, 12 और 15 दिन में करते हैं। तीनों मिलकर कितने दिन में करेंगे?", options: ["4 दिन", "5 दिन", "6 दिन", "8 दिन"], correct: 0, solution: "कुल काम (LCM) = 60 यूनिट। <br>A की क्षमता=6, B=5, C=4. कुल क्षमता = 15 यूनिट/दिन। <br>तीनों को लगा समय = 60 / 15 = 4 दिन।" },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "2/3, 4/5 और 6/7 का HCF क्या होगा?", options: ["2/105", "12/105", "2/35", "12/35"], correct: 0, solution: "भिन्नों का HCF = (अंशों का HCF) / (हरों का LCM). <br>HCF(2,4,6) = 2. LCM(3,5,7) = 105. <br>अतः सही उत्तर 2/105 है।" },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "36 और 64 का मध्यानुपाती (Mean proportional) क्या होगा?", options: ["48", "50", "42", "54"], correct: 0, solution: "मध्यानुपाती का सूत्र = √(a × b). <br>√(36 × 64) = 6 × 8 = 48." },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "यदि a = 3, b = 4 है तो a³ + b³ का मान क्या होगा?", options: ["91", "101", "111", "121"], correct: 0, solution: "मान रखने पर: 3³ + 4³ = 27 + 64 = 91." },
            { subject: "Numerical Ability", tabId: "tab-Maths", q: "किसी संख्या के 3/5 भाग का 1/3 भाग 15 है। वह संख्या क्या है?", options: ["45", "60", "75", "100"], correct: 2, solution: "माना संख्या x है। <br>x × (3/5) × (1/3) = 15 <br>x × (1/5) = 15 => x = 15 × 5 = 75." },

            // ================= 37 REASONING (HARD) - TEST 2 =================
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "कथन: सभी पेन पेंसिल हैं। कोई पेंसिल रबर नहीं है। \nनिष्कर्ष: I. कोई रबर पेन नहीं है। II. कुछ पेंसिल पेन हैं。", options: ["केवल I सही है", "केवल II सही है", "I और II दोनों सही हैं", "कोई सही नहीं है"], correct: 2, solution: "वेन आरेख के अनुसार, चूँकि सभी पेन पेंसिल हैं और कोई पेंसिल रबर नहीं है, तो कोई रबर पेन भी नहीं हो सकता (I सही)। और सभी पेन पेंसिल हैं, इसका अर्थ है कुछ पेंसिल पेन हैं (II सही)। अतः दोनों निष्कर्ष सही हैं।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "दी गई श्रृंखला को पूरा करें: 2, 6, 12, 20, 30, ?", options: ["40", "42", "44", "48"], correct: 1, solution: "पैटर्न: संख्याओं के बीच का अंतर +4, +6, +8, +10 है। तो अगला अंतर +12 होगा। 30 + 12 = 42." },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "यदि A * B का अर्थ 'A, B का पिता है'; A + B का अर्थ 'A, B की माँ है'; A - B का अर्थ 'A, B का भाई है'। तो 'P * M + N - Q' में P का Q से क्या संबंध है?", options: ["पिता", "नाना", "दादा", "चाचा"], correct: 1, solution: "P * M (P, M का पिता है), M + N (M, N की माँ है), N - Q (N, Q का भाई है)। इसका मतलब M, Q की माँ है। P, माँ का पिता है, यानी P, Q का 'नाना' है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एक घड़ी में 8:20 बज रहे हैं। घंटे और मिनट की सुई के बीच का कोण ज्ञात करें।", options: ["120°", "130°", "140°", "150°"], correct: 1, solution: "कोण का सूत्र = |30H - 5.5M|. <br>|30×8 - 5.5×20| = |240 - 110| = 130°." },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "रमेश उत्तर की ओर 10 किमी चलता है, फिर दाएँ मुड़कर 5 किमी चलता है, फिर दाएँ मुड़कर 10 किमी चलता है। अब वह अपने प्रारंभिक बिंदु से किस दिशा में है?", options: ["पूर्व", "पश्चिम", "उत्तर", "दक्षिण"], correct: 0, solution: "रमेश उत्तर में 10km गया, फिर दाएँ (पूर्व) 5km, फिर दाएँ (दक्षिण) 10km गया। अब वह अपने प्रारंभिक बिंदु के ठीक सामने 'पूर्व' दिशा में 5km दूर खड़ा है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "विषम चुनें (Find the odd one out):", options: ["कथकली", "भरतनाट्यम", "गरबा", "कुचिपुड़ी"], correct: 2, solution: "'गरबा' गुजरात का एक लोकनृत्य (Folk dance) है, जबकि कथकली, भरतनाट्यम और कुचिपुड़ी भारत के शास्त्रीय नृत्य (Classical dances) हैं।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "यदि 'REASON' को 5 और 'BELIEVED' को 7 लिखा जाता है, तो 'GOVERNMENT' को क्या लिखा जाएगा?", options: ["8", "9", "10", "11"], correct: 1, solution: "पैटर्न: शब्द में अक्षरों की कुल संख्या - 1. <br>REASON (6 अक्षर) - 1 = 5. <br>GOVERNMENT (10 अक्षर) - 1 = 9." },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "यदि 15 अगस्त 2011 को सोमवार था, तो 15 अगस्त 2012 को कौन सा दिन था?", options: ["सोमवार", "मंगलवार", "बुधवार", "रविवार"], correct: 1, solution: "चूँकि 2012 एक लीप वर्ष (366 दिन) है और यहाँ 15 अगस्त की बात हो रही है (जिसमें फरवरी 2012 शामिल है), इसलिए 2 विषम दिन (Odd days) जुड़ेंगे। सोमवार + 2 = बुधवार।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "शब्द 'DICTIONARY' के अक्षरों से कौन सा शब्द नहीं बनाया जा सकता?", options: ["NATION", "RADIO", "DAIRY", "TARDY"], correct: 0, solution: "'DICTIONARY' शब्द में केवल एक 'N' है, जबकि 'NATION' शब्द बनाने के लिए दो 'N' की आवश्यकता है। अतः यह नहीं बनाया जा सकता।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "40 छात्रों की पंक्ति में राहुल का स्थान दाएँ से 14वाँ है। बाएँ से उसका स्थान क्या होगा?", options: ["25वाँ", "26वाँ", "27वाँ", "28वाँ"], correct: 2, solution: "बाएँ से स्थान = (कुल छात्र - दाएँ से स्थान) + 1 <br>= (40 - 14) + 1 = 26 + 1 = 27वाँ।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "लुप्त संख्या ज्ञात करें: 4, 16, 36, 64, ?", options: ["81", "100", "121", "144"], correct: 1, solution: "यह सम संख्याओं (Even numbers) के वर्गों की शृंखला है: 2² (4), 4² (16), 6² (36), 8² (64), तो अगला 10² = 100 होगा।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "पुलिस एप्टीट्यूड: यदि आप चौराहे पर ड्यूटी कर रहे हैं और एंबुलेंस आ रही है, और उसी समय वीआईपी काफिला भी आ रहा है, तो आप किसे पहले रास्ता देंगे?", options: ["वीआईपी काफिले को", "एंबुलेंस को", "जिसकी गाड़ी बड़ी हो", "दोनों को रोक देंगे"], correct: 1, solution: "एक जिम्मेदार पुलिस अधिकारी के रूप में, मानव जीवन बचाना सर्वोच्च प्राथमिकता है, इसलिए हमेशा 'एंबुलेंस' को सबसे पहले रास्ता दिया जाना चाहिए।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "यदि 'A' का अर्थ '+', 'B' का अर्थ '-', 'C' का अर्थ 'x' और 'D' का अर्थ '÷' है, तो 18 C 14 A 6 B 16 D 4 = ?", options: ["254", "250", "248", "260"], correct: 0, solution: "चिह्न बदलने पर: 18 × 14 + 6 - 16 ÷ 4. <br>BODMAS नियम से: 252 + 6 - 4 = 258 - 4 = 254." },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "दिए गए विकल्पों में से संबंधित शब्द चुनें: कुत्ता : पिल्ला :: गाय : ?", options: ["मेमना", "बछड़ा", "शावक", "चूजा"], correct: 1, solution: "जिस प्रकार कुत्ते के बच्चे को 'पिल्ला' (Puppy) कहते हैं, उसी प्रकार गाय के बच्चे को 'बछड़ा' (Calf) कहते हैं।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "6 व्यक्ति एक वृत्ताकार मेज के चारों ओर केंद्र की ओर मुख करके बैठे हैं। A, B के ठीक सामने है। C, A के बाएँ बैठा है। C के सामने कौन है?", options: ["B", "D", "तय नहीं किया जा सकता", "A"], correct: 2, solution: "चूँकि प्रश्न में बाकी बचे 3 व्यक्तियों (D, E, F) की स्थिति के बारे में कोई जानकारी नहीं दी गई है, इसलिए यह तय नहीं किया जा सकता कि C के सामने कौन बैठा है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एक पासे की दो स्थितियों में 1, 3, 5 और 1, 4, 6 दिखाई देते हैं। 1 के विपरीत कौन सा अंक है?", options: ["2", "3", "5", "6"], correct: 0, solution: "दोनों स्थितियों में केवल '1' समान है। 1 के आस-पास (पड़ोसी फलक पर) 3, 5, 4, और 6 हैं। अतः जो अंक नहीं दिख रहा (यानी 2), वही '1' के विपरीत होगा।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "वेन आरेख: 'विद्यार्थी, खिलाड़ी, लड़कियां'", options: ["तीनों अलग", "दो अंदर एक बाहर", "तीनों एक दूसरे को काटते हैं (Intersect)", "एक के अंदर एक"], correct: 2, solution: "कुछ लड़कियां विद्यार्थी हो सकती हैं, कुछ विद्यार्थी खिलाड़ी हो सकते हैं और कुछ लड़कियां विद्यार्थी और खिलाड़ी दोनों हो सकती हैं। अतः 'तीनों वृत्त एक-दूसरे को काटेंगे' (Intersecting)।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "यदि जल प्रतिबिंब (Water Image) में समय 10:15 है, तो वास्तविक समय क्या होगा?", options: ["7:15", "8:15", "8:45", "7:45"], correct: 1, solution: "जल प्रतिबिंब का समय निकालने के लिए दिए गए समय को 18:30 (या 17:90) में से घटाते हैं। <br>18:30 - 10:15 = 8:15." },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "पुलिस एप्टीट्यूड: दंगा भड़कने पर एक पुलिस अधिकारी का पहला कदम क्या होना चाहिए?", options: ["हवा में फायरिंग करना", "भीड़ को चेतावनी देना और शांति की अपील करना", "लाठीचार्ज का आदेश देना", "वहाँ से भाग जाना"], correct: 1, solution: "दंगा भड़कने पर सबसे पहला कदम भीड़ को चेतावनी देना और शांति की अपील करना होता है। बल प्रयोग (लाठीचार्ज या फायरिंग) अंतिम विकल्प होना चाहिए।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "विषम चुनें: 1331, 2197, 3375, 4913", options: ["1331", "2197", "3375", "4913"], correct: 2, solution: "1331 (11³), 2197 (13³) और 4913 (17³) अभाज्य संख्याओं (Prime numbers) के घन हैं, जबकि 3375 (15³) एक भाज्य (Non-prime) संख्या का घन है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एनालॉजी: 42 : 56 :: 72 : ?", options: ["81", "90", "100", "110"], correct: 1, solution: "पैटर्न: लगातार संख्याओं का गुणनफल। <br>6 × 7 = 42, 7 × 8 = 56. <br>उसी प्रकार 8 × 9 = 72, तो 9 × 10 = 90 होगा।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "अक्षर शृंखला: BZA, DYC, FXE, ?", options: ["HWG", "HVF", "GVF", "HWH"], correct: 0, solution: "पहला अक्षर: B(+2)=D(+2)=F(+2)=H. <br>दूसरा अक्षर: Z(-1)=Y(-1)=X(-1)=W. <br>तीसरा अक्षर: A(+2)=C(+2)=E(+2)=G. अतः 'HWG'।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एक शतरंज के बोर्ड में कुल कितने आयत (Rectangles) होते हैं?", options: ["64", "204", "1296", "1024"], correct: 2, solution: "8x8 के चेस बोर्ड में कुल आयतों की संख्या निकालने का सूत्र: (n(n+1)/2)² <br>= (8×9/2)² = 36² = 1296. (वर्गों की संख्या 204 होती है)।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "यदि A=1, AND=19, तो BAT = ?", options: ["20", "21", "22", "23"], correct: 2, solution: "अक्षरों की प्लेस वैल्यू (A=1...Z=26) का योग। <br>B(2) + A(1) + T(20) = 23." },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एक परिवार में एक पुरुष, उसकी पत्नी, उनके 3 बेटे और हर बेटे की 2-2 बेटियां हैं। परिवार में कुल कितनी महिलाएं हैं?", options: ["6", "7", "8", "9"], correct: 1, solution: "दी गई जानकारी के अनुसार: 1 (पुरुष की पत्नी) + 6 (3 बेटों की 2-2 बेटियां) = कुल 7 महिलाएं। (बेटों की पत्नियों का जिक्र नहीं है)।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "दी गई आकृति में कितने त्रिभुज हैं? (मान लें एक वर्ग जिसके दोनों विकर्ण कटे हों)", options: ["4", "6", "8", "10"], correct: 2, solution: "जब एक वर्ग को उसके दोनों विकर्णों द्वारा काटा जाता है, तो उसमें हमेशा कुल 8 त्रिभुज बनते हैं (4 छोटे और 4 बड़े)।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "5 डिब्बे एक के ऊपर एक रखे हैं। A, B के ठीक ऊपर है। C, D के ठीक नीचे है। E, A के ऊपर है। सबसे नीचे कौन सा है?", options: ["A", "B", "C", "D"], correct: 1, solution: "सही व्यवस्था ऊपर से नीचे: D, C, E, A, B. अतः सबसे नीचे डिब्बा 'B' है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "विषम चुनें:", options: ["आँख", "कान", "नाक", "हृदय"], correct: 3, solution: "आँख, कान और नाक शरीर के बाहरी संवेदी अंग (External sensory organs) हैं, जबकि हृदय (Heart) एक आंतरिक अंग है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "शब्द 'COMPREHENSION' में अक्षरों के ऐसे कितने जोड़े हैं जिनके बीच उतने ही अक्षर हैं जितने अंग्रेजी वर्णमाला में होते हैं?", options: ["1", "2", "3", "4 से अधिक"], correct: 3, solution: "अंग्रेजी वर्णमाला के क्रम के अनुसार आगे और पीछे दोनों तरफ से जाँचने पर PR, PS, RS, NO, O-N जैसे 4 से अधिक जोड़े मिलते हैं।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "यदि 'M' 13 है, और 'PEN' 35 है, तो 'COPY' क्या होगा?", options: ["58", "59", "60", "61"], correct: 1, solution: "अक्षरों के संख्यात्मक मान (Place value) का योग: <br>C(3) + O(15) + P(16) + Y(25) = 59." },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "पुलिस एप्टीट्यूड: यदि कोई नागरिक थाने में एफआईआर (FIR) दर्ज कराने आता है और आप ड्यूटी ऑफिसर हैं, तो आप क्या करेंगे?", options: ["उसे भगा देंगे", "उसकी बात शांति से सुनेंगे और एफआईआर दर्ज करेंगे", "रिश्वत मांगेंगे", "उसे अगले दिन आने को कहेंगे"], correct: 1, solution: "एक पुलिस अधिकारी का कर्तव्य है कि वह नागरिक की समस्या को शांति से सुने और नियमानुसार एफआईआर (FIR) दर्ज करे।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "कथन: सभी पक्षी जानवर हैं। सभी जानवर इंसान हैं। निष्कर्ष: 1. सभी पक्षी इंसान हैं।", options: ["सत्य है", "असत्य है", "संभवतः सत्य", "इनमें से कोई नहीं"], correct: 0, solution: "वेन आरेख के अनुसार, पक्षियों का पूरा वृत्त जानवरों के अंदर है, और जानवरों का पूरा वृत्त इंसानों के अंदर है। इसलिए 'सभी पक्षी इंसान हैं' यह बिल्कुल सत्य है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "शृंखला: 5, 11, 24, 51, 106, ?", options: ["215", "217", "219", "221"], correct: 1, solution: "पैटर्न: (×2+1), (×2+2), (×2+3)... <br>उसी प्रकार 106 × 2 + 5 = 212 + 5 = 217." },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एक दर्पण प्रतिबिंब में 'EFFECT' कैसा दिखेगा?", options: ["TCEFFE", "TCEFFE (उल्टा)", "EFFECT (उल्टा)", "TCEFF"], correct: 1, solution: "दर्पण प्रतिबिंब में बायाँ-दायाँ पलट जाता है। अतः यह TCEFFE जैसा दिखेगा जिसमें सभी अक्षर उल्टे (Inverted horizontally) होंगे।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "A, B की बहन है। C, B की माता है। D, C का पिता है। A का D से क्या संबंध है?", options: ["पोती/नातिन", "बेटी", "दादी", "भतीजी"], correct: 0, solution: "C माता है A और B की। D पिता है C का (यानी नाना)। अतः A, D की नातिन/पोती (Granddaughter) है।" },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "एक पंक्ति में राहुल का स्थान बाएँ से 15वाँ और दाएँ से 20वाँ है। पंक्ति में कुल कितने व्यक्ति हैं?", options: ["34", "35", "36", "33"], correct: 0, solution: "कुल व्यक्ति = (बाएँ से स्थान + दाएँ से स्थान) - 1 <br>= 15 + 20 - 1 = 34." },
            { subject: "Reasoning", tabId: "tab-Reasoning", q: "वेन आरेख: 'पुरुष, पिता, डॉक्टर'", options: ["सभी पिता पुरुष हैं, कुछ पिता डॉक्टर हो सकते हैं", "सभी पुरुष पिता हैं", "सभी डॉक्टर पुरुष हैं", "कोई संबंध नहीं"], correct: 0, solution: "सभी 'पिता' निश्चित रूप से पुरुष (Men) होते हैं। और कुछ पिता तथा कुछ पुरुष पेशे से 'डॉक्टर' हो सकते हैं।" }
        ]
    };

    // If test 2 doesn't exist, fallback to 1
    const questions = allTestDatabase[testNumber] || allTestDatabase["1"];
    let currentIndex = 0;
    let userAnswers = {}; 
    let timeInSeconds = 120 * 60; // 120 Minutes for UP Police
    let timerInterval;

    function startTimer() {
        timerInterval = setInterval(() => {
            if (timeInSeconds <= 0) { clearInterval(timerInterval); submitTest(); return; }
            timeInSeconds--;
            let hrs = Math.floor(timeInSeconds / 3600);
            let mins = Math.floor((timeInSeconds % 3600) / 60);
            let secs = timeInSeconds % 60;
            document.getElementById('timer').innerText = 
                (hrs > 0 ? hrs + ":" : "") + mins.toString().padStart(2, '0') + ":" + secs.toString().padStart(2, '0');
        }, 1000);
    }

    function loadQuestion() {
        const q = questions[currentIndex];
        document.getElementById("q-no").innerText = currentIndex + 1;
        document.getElementById("q-section-name").innerText = q.subject; 
        document.getElementById("question-text").innerText = q.q;
        
        let optionsHTML = "";
        let labels = ["A", "B", "C", "D"];
        q.options.forEach((opt, i) => {
            let isSelected = (userAnswers[currentIndex] === i) ? "selected" : "";
            let isChecked = (userAnswers[currentIndex] === i) ? "checked" : "";
            optionsHTML += `
                <label class="option-card ${isSelected}" onclick="selectOption(${i})">
                    <input type="radio" name="option" value="${i}" ${isChecked}>
                    <span class="opt-label">${labels[i]}.</span><span class="opt-text">${opt}</span>
                </label>`;
        });
        document.getElementById("options-container").innerHTML = optionsHTML;
        document.getElementById("prev-btn").style.display = (currentIndex === 0) ? "none" : "block";
        document.getElementById("next-btn").style.display = (currentIndex === questions.length - 1) ? "none" : "block";
        
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(q.tabId).classList.add('active');
        renderPalette();
    }

    function goToSection(subject) {
        let index = questions.findIndex(q => q.subject === subject);
        if(index !== -1) { 
            let selected = document.querySelector('input[name="option"]:checked');
            if(selected) userAnswers[currentIndex] = parseInt(selected.value);
            currentIndex = index; loadQuestion(); 
        }
    }

    function selectOption(index) {
        document.querySelectorAll(".option-card").forEach(c => c.classList.remove("selected"));
        document.querySelectorAll('input[name="option"]').forEach(i => i.checked = false);
        document.querySelectorAll(".option-card")[index].classList.add("selected");
        document.querySelectorAll('input[name="option"]')[index].checked = true;
    }

    function clearResponse() {
        document.querySelectorAll(".option-card").forEach(c => c.classList.remove("selected"));
        document.querySelectorAll('input[name="option"]').forEach(i => i.checked = false);
        delete userAnswers[currentIndex];
        renderPalette(); 
    }

    function prevQuestion() {
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value);
        if(currentIndex > 0) { currentIndex--; loadQuestion(); }
    }

    function nextQuestion() {
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value);
        if(currentIndex < questions.length - 1) { currentIndex++; loadQuestion(); }
    }

    function saveAndNext() {
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value);
        
        if(currentIndex < questions.length - 1) { 
            currentIndex++; loadQuestion(); 
        } else { 
            alert("यह आखिरी प्रश्न है! अब 'Submit' पर क्लिक करें।"); 
            renderPalette();
        }
    }

    function submitTest() {
        clearInterval(timerInterval);
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value); 

        let resultData = {
            testId: testNumber,
            total: questions.length, score: 0, correct: 0, incorrect: 0, unattempted: 0,
            sections: {
                "General Knowledge": { c: 0, i: 0, u: 0, s: 0 },
                "General Hindi": { c: 0, i: 0, u: 0, s: 0 },
                "Numerical Ability": { c: 0, i: 0, u: 0, s: 0 },
                "Reasoning": { c: 0, i: 0, u: 0, s: 0 }
            },
            questionsData: questions, 
            answersData: userAnswers
        };

        questions.forEach((q, index) => {
            let ans = userAnswers[index];
            if (ans === undefined) { 
                resultData.unattempted++; resultData.sections[q.subject].u++; 
            } else if (ans === q.correct) { 
                resultData.correct++; 
                resultData.score += 2; // UP Police +2 Marks
                resultData.sections[q.subject].c++; 
                resultData.sections[q.subject].s += 2;
            } else { 
                resultData.incorrect++; 
                resultData.score -= 0.5; // UP Police -0.5 Negative Marking
                resultData.sections[q.subject].i++;
                resultData.sections[q.subject].s -= 0.5;
            }
        });

        resultData.accuracy = resultData.correct + resultData.incorrect > 0 ? ((resultData.correct / (resultData.correct + resultData.incorrect)) * 100).toFixed(2) : 0;
        
        localStorage.setItem("myUpPoliceMockTestResult_" + testNumber, JSON.stringify(resultData));
        window.location.replace("up-police-mock-result.html?test=" + testNumber);
    }

    function togglePalette() {
        document.getElementById('palette-drawer').classList.toggle('open');
        document.getElementById('palette-overlay').classList.toggle('open');
    }

    function renderPalette() {
        const subjects = ["General Knowledge", "General Hindi", "Numerical Ability", "Reasoning"];
        let html = "";
        subjects.forEach(sub => {
            html += `<div class="palette-section"><h4>${sub}</h4><div class="palette-grid">`;
            questions.forEach((q, i) => {
                if(q.subject === sub) {
                    let stateClass = "";
                    if(userAnswers[i] !== undefined) stateClass = "answered";
                    if(i === currentIndex) stateClass = "current";
                    html += `<div class="q-bubble ${stateClass}" onclick="jumpToQuestion(${i})">${i+1}</div>`;
                }
            });
            html += `</div></div>`;
        });
        document.getElementById('palette-content').innerHTML = html;
    }

    function jumpToQuestion(index) {
        let selected = document.querySelector('input[name="option"]:checked');
        if(selected) userAnswers[currentIndex] = parseInt(selected.value);
        currentIndex = index;
        loadQuestion();
        togglePalette();
    }

    window.onload = function() { loadQuestion(); startTimer(); };
</script>
